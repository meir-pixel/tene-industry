<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תצוגה — מעקב הזמנה</title>
<style>
  :root{ --brand-primary:#2E75B6; --ok:#2ca36b; --gray:#cfd6dd; }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Arial,sans-serif; }
  body{ background:#f4f6f8; padding:20px; display:flex; justify-content:center; }
  .wrap{ width:440px; max-width:96vw; }
  .card{ background:#fff; border-radius:16px; box-shadow:0 4px 18px rgba(0,0,0,.07); padding:22px; margin-bottom:16px; }
  .ohead{ display:flex; justify-content:space-between; align-items:flex-start; }
  .onum{ font-size:20px; font-weight:800; color:#1a1a1a; }
  .odate{ font-size:13px; color:#888; margin-top:3px; }
  .pill{ background:#eaf2fb; color:var(--brand-primary); font-weight:700; font-size:13px; padding:6px 12px; border-radius:20px; }
  .meta{ display:flex; gap:18px; margin-top:14px; font-size:13px; color:#555; }
  .meta b{ display:block; color:#1a1a1a; font-size:15px; }

  .timeline{ margin-top:6px; }
  .step{ display:flex; gap:14px; align-items:flex-start; position:relative; padding-bottom:22px; }
  .step:last-child{ padding-bottom:0; }
  .dotcol{ display:flex; flex-direction:column; align-items:center; }
  .dot{ width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
        font-size:15px; color:#fff; background:var(--gray); flex:0 0 auto; z-index:1; }
  .line{ width:3px; flex:1; background:var(--gray); margin-top:2px; }
  .step.done .dot{ background:var(--ok); }
  .step.current .dot{ background:var(--brand-primary); box-shadow:0 0 0 5px rgba(46,117,182,.18); }
  .step.done .line, .step.current .line{ background:var(--ok); }
  .step.future .stext .t{ color:#9aa3ab; }
  .stext{ padding-top:3px; }
  .stext .t{ font-weight:700; font-size:15px; color:#1a1a1a; }
  .stext .s{ font-size:12.5px; color:#8a929a; margin-top:2px; }
  .eta{ margin-top:10px; background:#f0f8f3; border:1px solid #bfe6cf; color:#1f7a4d;
        border-radius:10px; padding:10px 12px; font-size:13px; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="ohead">
      <div>
        <div class="onum">הזמנה HZ-2026-042</div>
        <div class="odate">נפתחה 08/06/2026</div>
      </div>
      <div class="pill">בייצור</div>
    </div>
    <div class="meta">
      <div>משקל לחיוב<b>1,240 ק"ג</b></div>
      <div>סה"כ<b>₪4,710</b></div>
      <div>אספקה<b>12/06</b></div>
    </div>
  </div>

  <div class="card">
    <div class="timeline">
      <div class="step done">
        <div class="dotcol"><div class="dot">✓</div><div class="line"></div></div>
        <div class="stext"><div class="t">התקבלה</div><div class="s">08/06 09:14 · אושרה על ידך</div></div>
      </div>
      <div class="step done">
        <div class="dotcol"><div class="dot">✓</div><div class="line"></div></div>
        <div class="stext"><div class="t">אושרה לייצור</div><div class="s">08/06 10:02</div></div>
      </div>
      <div class="step current">
        <div class="dotcol"><div class="dot">⚙</div><div class="line"></div></div>
        <div class="stext"><div class="t">בייצור</div><div class="s">החל 10/06 · על מכונה B</div></div>
      </div>
      <div class="step future">
        <div class="dotcol"><div class="dot">📦</div><div class="line"></div></div>
        <div class="stext"><div class="t">מוכנה</div><div class="s">ממתינה</div></div>
      </div>
      <div class="step future">
        <div class="dotcol"><div class="dot">🚚</div></div>
        <div class="stext"><div class="t">נמסרה</div><div class="s">ממתינה</div></div>
      </div>
    </div>
    <div class="eta">📅 צפי מוכנות: 11/06 · אספקה מתוכננת 12/06</div>
  </div>
</div>
</body>
</html>

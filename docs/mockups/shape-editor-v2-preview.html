<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IronBend V2 - Shape Editor Preview</title>
<style>
:root{--bg:#d7d9dc;--panel:#e9ebef;--paper:#fff;--ink:#172235;--muted:#667184;--line:#d6dde6;--dark:#303b4f;--mid:#818b9a;--accent:#00a884;--danger:#ff4545}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:Segoe UI,Arial,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:200px minmax(0,1fr) 350px;background:var(--bg)}.rail{border-left:1px solid #b9c3d0;background:#d3d5d8;padding:68px 22px 22px;display:flex;flex-direction:column;gap:18px}.thumb{height:92px;border:1px solid #e4e7eb;background:#f3f4f6;border-radius:6px;display:grid;place-items:center;overflow:hidden}.thumb svg{width:150px;height:70px}.finish{margin-top:auto;height:44px;border:0;border-radius:6px;background:#5f6b7e;color:#fff;font-weight:900;font-size:20px}.stage{min-width:0;padding:68px 24px 42px;display:flex;flex-direction:column;gap:14px}.stage-top{height:34px;display:flex;align-items:center;justify-content:space-between;color:#23324a;font-size:13px;padding-inline:8px 34px}.ghost{border:1px solid #9aa5b5;border-radius:5px;background:#f8fafc;color:#344054;height:30px;padding:0 14px;font-weight:700}.canvas{flex:1;min-height:560px;background:#fff;border:1px solid #e8ebef;position:relative;overflow:hidden}.canvas.grid{background-image:linear-gradient(#eef1f5 1px,transparent 1px),linear-gradient(90deg,#eef1f5 1px,transparent 1px);background-size:28px 28px}.canvas-label{position:absolute;top:14px;right:18px;display:flex;gap:10px;align-items:center;color:#344054;font-weight:700}.canvas-label input{width:22px;height:22px;accent-color:var(--accent)}#shapeSvg{position:absolute;inset:58px 46px 42px;width:calc(100% - 92px);height:calc(100% - 100px)}.side{background:var(--panel);border-right:1px solid #b9c3d0;display:flex;flex-direction:column;min-width:0}.tabs{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 24px}.tab{min-width:74px;height:28px;border:1px solid #b9c3d0;border-radius:6px;background:#f7f8fa;color:#647083;font-weight:800}.tab.active{background:#fff;color:#172235;border-color:#263449}.scroll{overflow:auto;padding:16px 24px 10px;display:flex;flex-direction:column;gap:16px}.title{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:34px}.title h1{margin:0;font-size:18px;font-weight:900}.chips{display:flex;flex-wrap:wrap;gap:10px}.chip{min-width:70px;height:34px;border:0;border-radius:6px;background:#606b7d;color:#fff;font-weight:900}.chip.active{background:var(--danger)}.shape-grid{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 0;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 12px;justify-items:center}.shape-btn{width:58px;height:58px;border:0;border-radius:50%;background:var(--mid);color:#fff;display:grid;place-items:center}.shape-btn.active{background:var(--dark)}.shape-btn svg{width:38px;height:38px}.shape-btn *{vector-effect:non-scaling-stroke}.section{border-top:1px solid var(--line);padding-top:16px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.section-head h2{margin:0;font-size:16px;font-weight:900}.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}.field{display:grid;gap:5px}.field.wide{grid-column:1/-1}.field label{font-size:12px;font-weight:800;color:#647083}.field input,.field select,.row input{height:38px;border:1px solid #b9c3d0;border-radius:6px;background:#fff;color:#1c2740;text-align:center;padding:0 10px;font-weight:700}.field input:focus,.field select:focus,.row input:focus{outline:2px solid rgba(0,168,132,.22);border-color:var(--accent)}.dims{display:grid;gap:8px}.row{display:grid;grid-template-columns:28px minmax(0,1fr) 76px;gap:10px;align-items:center}.letter{color:#12213a;font-size:18px;font-weight:800;text-align:center}.quick{grid-column:1/-1;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start;padding-inline-start:38px}.quick button{height:28px;min-width:48px;border:1px solid #b9c3d0;border-radius:6px;background:#fff;color:#344054;font-weight:800}.quick button.active{background:var(--dark);color:#fff;border-color:var(--dark)}details{border-top:1px solid var(--line);padding-top:12px}summary{cursor:pointer;font-weight:900;color:#344054}.summary{margin-top:auto;border-top:1px solid var(--line);background:#f4f6f8;display:grid;grid-template-columns:1fr 1fr}.metric{padding:12px 16px;min-height:62px;border-left:1px solid var(--line);text-align:center}.metric span{display:block;color:#687482;font-size:12px;font-weight:800}.metric strong{display:block;color:#263449;font-size:15px;margin-top:4px}.add{margin:14px 24px 10px;height:44px;border:0;border-radius:6px;background:#5d687a;color:#fff;font-size:22px;font-weight:900}.bar{fill:none;stroke:#050505;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.dim{stroke:#9aa1aa;stroke-width:1.2;fill:none}.mesh-line{stroke:#050505;stroke-width:4;stroke-linecap:round}.box{fill:#fff;stroke:#7d8797;stroke-width:1.1}.txt{fill:#152033;font-size:20px;font-weight:600;font-family:Segoe UI,Arial}.lbl{fill:#152033;font-size:17px;font-weight:700;font-family:Segoe UI,Arial}.corner{fill:none;stroke:#c7cdd5;stroke-width:2}@media(max-width:1100px){.app{grid-template-columns:150px minmax(0,1fr) 320px}.rail{padding-inline:14px}.shape-grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:820px){.app{grid-template-columns:1fr}.rail{display:none}.side{order:-1}.stage{padding:16px}.canvas{min-height:420px}}
</style>
</head>
<body>
<main class="app">
<aside class="rail"><div class="thumb" id="thumbOne"></div><div class="thumb"><svg viewBox="0 0 150 70"><path d="M18 35 H132" stroke="#60646c" stroke-width="2"/><text x="75" y="44" text-anchor="middle" font-size="9">1200</text></svg></div><div class="thumb"><svg viewBox="0 0 150 70"><path d="M18 35 H132" stroke="#60646c" stroke-width="2"/><text x="75" y="44" text-anchor="middle" font-size="9">1200</text></svg></div><button class="finish">סיים</button></aside>
<section class="stage"><div class="stage-top"><button class="ghost" id="refreshBtn">רענן</button><span>תצוגה מקדימה</span></div><div class="canvas" id="canvas"><label class="canvas-label"><input id="sym" type="checkbox" checked> צורה סימטרית</label><svg id="shapeSvg" viewBox="0 0 900 560" role="img" aria-label="שרטוט צורה"></svg></div></section>
<aside class="side"><div class="tabs" id="tabs"><button class="tab active" data-family="bars">מוטות</button><button class="tab" data-family="mesh">רשת</button><button class="tab" data-family="piles">כלונסאות</button></div><div class="scroll"><div class="title"><h1>סינון צורות</h1><span id="shapeName" style="font-weight:900;color:#303b4f">מוט מכופף</span></div><div class="chips" id="filters"></div><div class="shape-grid" id="shapeGrid"></div><section class="section"><div class="section-head"><h2 id="formTitle">מידות וזוויות</h2><span style="font-size:12px;color:#687482;font-weight:800">מ"מ</span></div><div id="form"></div></section><details><summary>עוד</summary><div class="field-grid" style="margin-top:12px"><div class="field"><label>סוג פלדה</label><select><option>מצולע</option><option>חלק</option></select></div><div class="field"><label>מכונה</label><select><option>אוטומטי</option><option>ידני</option></select></div><div class="field wide"><label>הערה</label><input placeholder="הערה לפריט"></div></div></details></div><div class="summary"><div class="metric"><span>יחידה</span><strong id="unit">0.00 ק"ג</strong></div><div class="metric"><span>סה"כ</span><strong id="total">0.00 ק"ג</strong></div><div class="metric"><span>אורך</span><strong id="length">0 ס"מ</strong></div><div class="metric"><span>כמות</span><strong id="qty">1</strong></div></div><button class="add">הוסף</button></aside>
</main>
<script>
const filters={bars:['הכל','חישוק','פיגורה','ספירלים','ציפורים','קלמרה','משקפיים'],mesh:['הכל','רשת בסיס','רשת א-סימטרי'],piles:['הכל','בסיס','דיפון']};
const catalog=[
{id:'straight',family:'bars',cat:'פיגורה',name:'מוט ישר',type:'straight',icon:'straight',v:{diameter:8,qty:1,A:120,angleA:0}},
{id:'bent',family:'bars',cat:'פיגורה',name:'מוט מכופף',type:'bent',icon:'bent',v:{diameter:8,qty:1,A:8,angleA:45,B:60,angleB:90,C:15,angleC:90,D:60,angleD:90,E:15,angleE:45,F:8}},
{id:'stirrup',family:'bars',cat:'חישוק',name:'חישוק חפיפה',type:'stirrup',icon:'stirrup',v:{diameter:8,qty:1,A:10,angleA:90,B:50,angleB:90,C:20,angleC:90,D:100,angleD:90,E:10}},
{id:'negative',family:'bars',cat:'קלמרה',name:'קלמרה מדורגת',type:'bent',icon:'negative',v:{diameter:8,qty:1,A:20,angleA:-90,B:50,angleB:90,C:20,angleC:-90,D:60}},
{id:'spiral',family:'bars',cat:'ספירלים',name:'ספירלה',type:'spiral',icon:'spiral',v:{diameter:8,qty:1,spiralDiameter:80,pitch:20,turns:18,tailA:70,tailB:200}},
{id:'mesh',family:'mesh',cat:'רשת בסיס',name:'רשת סימטרית',type:'mesh',icon:'mesh',v:{diameter:8,qty:1,width:600,height:250,pitchX:20,pitchY:20,marginX:10,marginY:5}},
{id:'pile',family:'piles',cat:'בסיס',name:'כלונס בסיס',type:'pile',icon:'pile',v:{diameter:16,qty:1,pileDiameter:80,cageDiameter:70,length:1620,pitchA:10,pitchB:20,bars:14}}
];
let state={family:'bars',filter:'הכל',shapeId:'bent',v:{}};function shape(){return catalog.find(s=>s.id===state.shapeId)||catalog[0]}function init(){state.v={...shape().v};bind();renderFilters();renderGrid();renderForm();draw()}function bind(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.family=b.dataset.family;state.filter='הכל';let s=catalog.find(x=>x.family===state.family);state.shapeId=s.id;state.v={...s.v};document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));renderFilters();renderGrid();renderForm();draw()});refreshBtn.onclick=draw;sym.onchange=draw}
function renderFilters(){filters[state.family];filtersEl=filters[state.family].map(n=>`<button class="chip ${n===state.filter?'active':''}" data-f="${n}">${n}</button>`).join('');document.getElementById('filters').innerHTML=filtersEl;document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.f;renderFilters();renderGrid()})}
function renderGrid(){let list=catalog.filter(s=>s.family===state.family&&(state.filter==='הכל'||s.cat===state.filter));shapeGrid.innerHTML=list.map(s=>`<button class="shape-btn ${s.id===state.shapeId?'active':''}" title="${s.name}" data-s="${s.id}">${icon(s.icon)}</button>`).join('');document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{state.shapeId=b.dataset.s;state.v={...shape().v};renderGrid();renderForm();draw()})}
function renderForm(){let s=shape();shapeName.textContent=s.name;formTitle.textContent=(s.type==='mesh')?'רוחב, גובה ופסיעה':(s.type==='pile')?'כלונס ומוטות':(s.type==='spiral')?'ספירלה':'אורכים וזוויות';let h='';if(['straight','bent','stirrup'].includes(s.type)){h+=`<div class="field-grid"><div class="field"><label>קוטר</label><select data-k="diameter">${[5,6,8,10,12,14,16,20].map(n=>`<option ${+state.v.diameter===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field"><label>כמות</label><input type="number" min="1" data-k="qty" value="${state.v.qty||1}"></div></div><div class="dims" style="margin-top:12px">${rows(s)}</div>`}else if(s.type==='spiral'){h=`<div class="field-grid">${fld('קוטר ברזל','diameter')}${fld('קוטר ספירלה','spiralDiameter')}${fld('פסיעה','pitch')}${fld('כריכות','turns')}${fld('זנב L1','tailA')}${fld('זנב L2','tailB')}${fld('כמות','qty')}</div>`}else if(s.type==='mesh'){h=`<div class="field-grid">${fld('X - רוחב','width')}${fld('Y - גובה','height')}${fld('קוטר','diameter')}${fld('פסיעה X','pitchX')}${fld('פסיעה Y','pitchY')}${fld('כמות','qty')}</div>`}else{h=`<div class="field-grid">${fld('קוטר כלונס D','pileDiameter')}${fld('כלונס בטון d','cageDiameter')}${fld('אורך L','length')}${fld('מוטות אורך','bars')}${fld('קוטר מוט','diameter')}${fld('כמות','qty')}</div>`}form.innerHTML=h;document.querySelectorAll('[data-k]').forEach(i=>i.oninput=()=>{state.v[i.dataset.k]=+i.value||0;draw()});document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{state.v[b.dataset.a]=+b.dataset.v;renderForm();draw()})}
function rows(s){let L=['A','B','C','D','E','F'],n=s.type==='straight'?1:L.filter(k=>state.v[k]!=null).length,h='';for(let i=0;i<n;i++){let k=L[i],ak='angle'+k;h+=`<div class="row"><span class="letter">${k}</span><input type="number" min="1" data-k="${k}" value="${state.v[k]||0}">${i<n-1?`<input type="number" min="-360" max="360" data-k="${ak}" value="${state.v[ak]??90}">`:'<span></span>'}</div>`;if(i<n-1)h+=`<div class="quick">${[90,-90,45,-45,180].map(v=>`<button data-a="${ak}" data-v="${v}" class="${+state.v[ak]===v?'active':''}">${v}°</button>`).join('')}</div>`}return h}function fld(label,k){return`<div class="field"><label>${label}</label><input type="number" data-k="${k}" value="${state.v[k]||0}"></div>`}
function draw(){let s=shape(),svg=shapeSvg;canvas.classList.toggle('grid',s.type==='bent'&&!sym.checked);svg.innerHTML=s.type==='straight'?straight():s.type==='bent'?bent():s.type==='stirrup'?stirrup():s.type==='spiral'?spiral():s.type==='mesh'?mesh():pile();summary();thumbOne.innerHTML=`<svg viewBox="0 0 900 560">${svg.innerHTML}</svg>`}
function straight(){return`<path class="bar" d="M180 280 H720"/>${box(450,250,state.v.A||120,'A')}`}function bent(){let L=['A','B','C','D','E','F'],lens=L.map(k=>+state.v[k]).filter(Boolean),angs=L.slice(0,-1).map(k=>+(state.v['angle'+k]??90)).slice(0,lens.length-1),pts=fit(calc(lens,angs),120,120,720,360),p=pts.map((q,i)=>`${i?'L':'M'} ${q.x.toFixed(1)} ${q.y.toFixed(1)}`).join(' ');let h=`<path class="bar" d="${p}"/>`;for(let i=0;i<pts.length-1;i++){let a=pts[i],b=pts[i+1];h+=box((a.x+b.x)/2,(a.y+b.y)/2-20,lens[i],L[i])}for(let i=1;i<pts.length-1;i++)h+=`<path class="corner" d="M ${pts[i].x-14} ${pts[i].y} h14 v14"/>`;return h}
function stirrup(){let w=(state.v.B||50)*6,h=(state.v.D||100)*2.2,x=450-w/2,y=290-h/2;return`<path class="bar" d="M${x} ${y} H${x+w} V${y+h} H${x} Z"/><path class="bar" d="M${x+w-48} ${y+38} L${x+w+18} ${y-28} M${x+w-22} ${y+66} L${x+w+44} ${y}"/>${corners(x,y,w,h)}${box(x+w/2,y-28,state.v.B||50,'B')}${box(x+w+36,y+h/2,state.v.D||100,'D')}`}
function spiral(){let t=Math.max(8,+state.v.turns||18),c='';for(let i=0;i<t;i++){let x=180+i*26;c+=`M${x} 280 C${x+8} 220 ${x+18} 340 ${x+26} 280 `}return`<path class="bar" d="M120 260 H780 M120 300 H780"/><path d="${c}" fill="none" stroke="#050505" stroke-width="3"/><circle cx="690" cy="392" r="58" fill="none" stroke="#050505" stroke-width="5"/><circle cx="690" cy="392" r="42" fill="none" stroke="#050505" stroke-width="2"/>${box(450,220,1620,'L')}${box(690,472,state.v.spiralDiameter||80,'D')}`}
function mesh(){let x=170,y=155,w=560,h=250,o=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="#050505"/>`;for(let i=0;i<=24;i++){let xx=x+i*w/24;o+=`<line class="mesh-line" x1="${xx}" y1="${y}" x2="${xx}" y2="${y+h}"/>`}for(let i=0;i<=10;i++){let yy=y+i*h/10;o+=`<line class="mesh-line" x1="${x}" y1="${yy}" x2="${x+w}" y2="${yy}"/>`}return o+box(x+w/2,y-34,state.v.width||600,'X')+box(x-52,y+h/2,state.v.height||250,'Y')}
function pile(){let x=150,w=560,c='',dots='';for(let i=0;i<34;i++){let xx=x+i*16;c+=`M${xx} 280 C${xx+5} 245 ${xx+11} 315 ${xx+16} 280 `}for(let i=0;i<14;i++){let a=i*Math.PI*2/14;dots+=`<circle cx="${690+Math.cos(a)*48}" cy="${405+Math.sin(a)*48}" r="6" fill="#050505"/>`}return`<path class="bar" d="M${x} 262 H${x+w} M${x} 302 H${x+w}"/><path d="${c}" fill="none" stroke="#050505" stroke-width="3"/><circle cx="690" cy="405" r="68" fill="none" stroke="#050505" stroke-width="5"/><circle cx="690" cy="405" r="52" fill="none" stroke="#050505" stroke-width="2"/>${dots}${box(430,220,state.v.length||1620,'L')}${box(772,405,state.v.pileDiameter||80,'D')}`}
function box(x,y,v,l){return`<g><text class="lbl" x="${x}" y="${y-18}" text-anchor="middle">${l}</text><rect class="box" x="${x-34}" y="${y-12}" width="68" height="24" rx="5"/><text class="txt" x="${x}" y="${y+6}" text-anchor="middle">${v}</text></g>`}function corners(x,y,w,h){return`<path class="corner" d="M${x+18} ${y} v18 h-18 M${x+w-18} ${y} v18 h18 M${x+w-18} ${y+h} v-18 h18 M${x+18} ${y+h} v-18 h-18"/>`}function calc(lens,angs){let pts=[{x:0,y:0}],dir=0;for(let i=0;i<lens.length;i++){let a=dir*Math.PI/180,last=pts.at(-1);pts.push({x:last.x+lens[i]*Math.cos(a),y:last.y+lens[i]*Math.sin(a)});if(i<angs.length)dir-=(180-angs[i])}return pts}function fit(pts,x,y,w,h){let xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),sc=Math.min(w/((maxX-minX)||1),h/((maxY-minY)||1)),ox=x+(w-(maxX-minX)*sc)/2,oy=y+(h-(maxY-minY)*sc)/2;return pts.map(p=>({x:ox+(p.x-minX)*sc,y:oy+(p.y-minY)*sc}))}
function summary(){let s=shape(),len=0;if(s.type==='mesh'){let vx=Math.floor((state.v.width||600)/(state.v.pitchX||20))+1,hy=Math.floor((state.v.height||250)/(state.v.pitchY||20))+1;len=vx*(state.v.height||250)+hy*(state.v.width||600)}else if(s.type==='spiral'){len=Math.round(Math.PI*(state.v.spiralDiameter||80)*(state.v.turns||18)+(state.v.tailA||0)+(state.v.tailB||0))}else if(s.type==='pile'){len=+state.v.length||1620}else{len=['A','B','C','D','E','F'].reduce((sum,k)=>sum+(+state.v[k]||0),0)*10}let kgm=(+state.v.diameter||8)**2*.00617,unitKg=len/1000*kgm,q=+state.v.qty||1;unit.textContent=unitKg.toFixed(2)+' ק"ג';total.textContent=(unitKg*q).toFixed(2)+' ק"ג';length.textContent=Math.round(len/10)+' ס"מ';qty.textContent=q}
function icon(k){let st='stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"';if(k==='straight')return`<svg viewBox="0 0 44 44"><path ${st} d="M8 22 H36"/></svg>`;if(k==='bent')return`<svg viewBox="0 0 44 44"><path ${st} d="M10 10 V32 H34"/></svg>`;if(k==='stirrup')return`<svg viewBox="0 0 44 44"><path ${st} d="M10 10 H34 V34 H10 Z"/><path ${st} d="M26 18 h8 v8"/></svg>`;if(k==='negative')return`<svg viewBox="0 0 44 44"><path ${st} d="M8 28 H20 V16 H34"/></svg>`;if(k==='spiral')return`<svg viewBox="0 0 44 44"><path ${st} d="M8 24 C12 8 18 38 22 22 C26 8 32 38 36 20"/></svg>`;if(k==='mesh')return`<svg viewBox="0 0 44 44"><path ${st} d="M10 12 H34 M10 22 H34 M10 32 H34 M14 8 V36 M24 8 V36 M34 8 V36"/></svg>`;return`<svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="14" ${st}/><circle cx="22" cy="10" r="2" fill="currentColor"/><circle cx="32" cy="22" r="2" fill="currentColor"/><circle cx="22" cy="34" r="2" fill="currentColor"/><circle cx="10" cy="22" r="2" fill="currentColor"/></svg>`}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תצוגה — מסך כניסה ממותג</title>
<style>
  :root{ --brand-primary:#2E75B6; --brand-2:#1b4f80; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Segoe UI',Arial,sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--brand-primary),var(--brand-2));
  }
  .card{
    width:380px; max-width:92vw; background:#fff; border-radius:18px;
    box-shadow:0 24px 70px rgba(0,0,0,.28); padding:38px 34px 26px; text-align:center;
  }
  .logo{
    width:72px; height:72px; border-radius:18px; margin:0 auto 14px;
    background:var(--brand-primary); display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:34px; font-weight:800;
  }
  .brand-name{ font-size:22px; font-weight:800; color:#1a1a1a; }
  .brand-sub{ font-size:13px; color:#888; margin-top:3px; margin-bottom:26px; }
  label{ display:block; text-align:right; font-size:13px; color:#555; margin:14px 4px 6px; font-weight:600; }
  input{
    width:100%; padding:13px 14px; border:1.5px solid #e2e6ea; border-radius:11px;
    font-size:15px; outline:none; transition:border-color .15s;
  }
  input:focus{ border-color:var(--brand-primary); }
  .btn{
    width:100%; margin-top:22px; padding:14px; border:0; border-radius:11px;
    background:var(--brand-primary); color:#fff; font-size:16px; font-weight:700; cursor:pointer;
  }
  .note{
    margin-top:16px; font-size:12px; color:#9a6a00; background:#fff8e6;
    border:1px solid #ffe3a3; border-radius:9px; padding:9px 11px; text-align:right;
  }
  .footer{ margin-top:22px; font-size:12px; color:#aaa; }
  .footer a{ color:var(--brand-primary); text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo" data-brand-logo>מ</div>
    <div class="brand-name" data-brand-name>מפעל כהן ברזל</div>
    <div class="brand-sub">מערכת ניהול ייצור</div>

    <label>שם משתמש</label>
    <input type="text" value="manager" />

    <label>סיסמה</label>
    <input type="password" value="••••••••" />

    <button class="btn">כניסה</button>

    <div class="note">🔑 כניסה ראשונה — תתבקש/י להחליף סיסמה זמנית</div>

    <div class="footer">תמיכה: <a href="#">050-1234567</a></div>
  </div>
</body>
</html>

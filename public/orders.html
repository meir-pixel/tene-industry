<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>הזמנות – IronBend</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e07b39">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/auth-client.js"></script>
<script src="/status-contracts-client.js"></script>
<script src="/safe-dom.js" defer></script>
<script src="/nav.js" defer></script>
<script src="/shape-renderer.js" defer></script>
<script src="/shape-editor.js?v=46"></script>
<style>
:root{
  --accent:#c9621a; --accent-light:#e07b39;
  --success:#1a7a42; --danger:#b83227; --warning:#a86b00; --info:#1560a8;
  --text:#1a2533; --dim:#526070; --muted:#8fa0b0;
  --bg:#f0f4f8; --card:#ffffff; --border:rgba(0,0,0,0.09);
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);}

.page{max-width:1280px;margin:0 auto;padding:14px 14px 32px;}

/* ── WS indicator ── */
.ws-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ws-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600;}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0;transition:background .3s;}
.ws-dot.connected{background:var(--success);}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;align-items:center;margin-bottom:12px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  color:var(--dim);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;
  white-space:nowrap;flex-shrink:0;min-height:40px;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.filter-btn.active{background:rgba(224,123,57,0.12);border-color:var(--accent);color:var(--accent);}
.search-wrap{flex:1;min-width:140px;position:relative;}
.search-box{width:100%;padding:8px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;
  direction:rtl;min-height:40px;}
.search-box:focus{outline:none;border-color:var(--accent);}
.new-order-btn{padding:8px 16px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  border:none;color:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;text-decoration:none;min-height:40px;display:inline-flex;
  align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}

/* ── TABLE WRAP ── */
.orders-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:680px;}
th{text-align:right;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.02);white-space:nowrap;}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(0,0,0,0.03);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,0,0,0.015);cursor:pointer;}
.order-num{color:var(--accent);font-weight:800;font-size:14px;}
.weight-tag{color:var(--accent);font-weight:700;}

/* ── STATUS BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.s-wait    {background:rgba(122,147,171,0.15);color:var(--dim);}
.s-prod    {background:rgba(224,123,57,0.18);color:var(--accent);}
.s-done    {background:rgba(26,122,66,0.15);color:var(--success);}
.s-approved{background:rgba(21,96,168,0.15);color:var(--info);}

/* ── ROW ACTIONS ── */
.actions{display:flex;gap:5px;flex-wrap:nowrap;}
.btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(0,0,0,0.02);
  color:var(--dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;
  display:inline-flex;align-items:center;-webkit-tap-highlight-color:transparent;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.success:hover{border-color:var(--success);color:var(--success);}

/* ── MOBILE CARDS ── */
@media(max-width:640px){
  .page{padding:10px 10px 28px;}
  /* hide table, show cards */
  .table-scroll{display:none;}
  .mobile-cards{display:block;}

  .m-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
    margin-bottom:8px;padding:14px;cursor:pointer;transition:box-shadow .15s;}
  .m-card:active{box-shadow:0 0 0 2px var(--accent);}
  .m-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .m-card-num{font-size:15px;font-weight:800;color:var(--accent);}
  .m-card-customer{font-size:14px;font-weight:700;color:var(--text);margin-top:2px;}
  .m-card-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-bottom:8px;}
  .m-card-meta span{display:flex;align-items:center;gap:3px;}
  .m-card-actions{display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
  .m-card-actions .btn-sm{font-size:12px;padding:6px 12px;}

  /* filters horizontal scroll */
  .filters{flex-wrap:nowrap;}
  .search-wrap{min-width:120px;}
}
@media(min-width:641px){
  .mobile-cards{display:none;}
}

/* ── DETAIL PANEL ── */
.detail-overlay{position:fixed;inset:56px 0 0;background:rgba(2,26,72,0.34);z-index:500;
  display:flex;align-items:flex-start;justify-content:center;padding:22px;
  opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(5px);}
.detail-overlay.show{opacity:1;pointer-events:all;}
.detail-panel{width:min(1040px,calc(100vw - 44px));max-height:calc(100vh - 104px);overflow-y:auto;
  background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);border:1px solid rgba(2,26,72,0.12);
  border-radius:22px;transform:translateY(12px) scale(.985);transition:transform .18s;
  box-shadow:0 24px 80px rgba(2,26,72,0.26);}
.detail-overlay.show .detail-panel{transform:translateY(0) scale(1);}
.detail-header{padding:18px 22px;border-bottom:1px solid rgba(2,26,72,0.10);position:sticky;top:0;
  background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);z-index:10;
  display:flex;align-items:center;justify-content:space-between;gap:12px;}
.detail-order-num{font-size:24px;font-weight:900;color:var(--accent);line-height:1;}
.detail-customer{font-size:13px;color:var(--dim);margin-top:2px;}
.detail-close{width:38px;height:38px;background:rgba(0,0,0,0.04);border:1px solid var(--border);
  border-radius:8px;color:var(--text);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-body{padding:18px 22px 24px;display:flex;flex-direction:column;gap:14px;}
.detail-hero{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;align-items:stretch;}
.hero-card{background:#fff;border:1px solid rgba(2,26,72,0.10);border-radius:18px;padding:18px;
  box-shadow:0 8px 28px rgba(2,26,72,0.07);}
.hero-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px;}
.hero-main{font-size:22px;font-weight:900;color:var(--text);line-height:1.25;}
.hero-metric{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;}
.metric-box{background:#f4f7fb;border-radius:12px;padding:10px 12px;}
.metric-label{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px;}
.metric-value{font-size:15px;font-weight:900;color:var(--text);}
.d-section{background:#fff;border:1px solid rgba(2,26,72,0.09);border-radius:16px;padding:16px;
  box-shadow:0 6px 20px rgba(2,26,72,0.05);}
.d-title{font-size:12px;font-weight:900;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.info-label{font-size:10px;font-weight:700;color:var(--dim);margin-bottom:3px;}
.info-value{font-size:14px;font-weight:700;}
.status-actions{display:flex;gap:6px;flex-wrap:wrap;}
.status-btn{padding:8px 13px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.02);
  color:var(--dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;min-height:40px;-webkit-tap-highlight-color:transparent;}
.status-btn:hover,.status-btn.cur{border-color:var(--accent);color:var(--accent);background:rgba(224,123,57,0.08);}
.item-row{display:grid;grid-template-columns:230px 1fr auto;gap:14px;padding:14px;border:1px solid rgba(2,26,72,0.08);border-radius:14px;
  margin-bottom:10px;background:#fbfcfe;align-items:stretch;}
.item-row:last-child{border-bottom:none;}
.item-visual{background:#fff;border:1px solid rgba(2,26,72,0.08);border-radius:12px;min-height:126px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.item-main{display:flex;flex-direction:column;gap:8px;min-width:0;}
.item-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.item-diameter{font-size:24px;font-weight:900;color:var(--accent);line-height:1;}
.item-shape{font-size:15px;font-weight:900;color:var(--text);}
.item-kpis{display:grid;grid-template-columns:repeat(4,minmax(90px,1fr));gap:8px;}
.item-kpi{background:#f4f7fb;border-radius:10px;padding:8px 10px;}
.item-kpi-label{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:2px;}
.item-kpi-value{font-size:14px;font-weight:900;color:var(--text);}
.item-dims{display:flex;flex-wrap:wrap;gap:5px;}
.dim-chip{background:#e8f0fb;color:#1a2533;border-radius:8px;padding:4px 8px;font-size:12px;font-weight:800;}
.note-chip{background:#fff3cd;color:#8a5a00;border-radius:10px;padding:6px 9px;font-size:12px;line-height:1.45;}
.review-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.review-status{border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900}
.review-pending{background:#fff3cd;color:#8a5a00}
.review-approved{background:#e7f8ed;color:#166b37}
.review-btn{border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 10px;font-family:inherit;font-size:12px;font-weight:900;cursor:pointer;color:var(--text)}
.review-btn.primary{border-color:var(--success);background:#f2fbf5;color:var(--success)}
.review-btn.danger{border-color:var(--danger);background:#fff5f5;color:var(--danger)}
.add-choice-overlay{position:fixed;inset:0;background:rgba(2,26,72,.50);z-index:750;display:none;padding:18px;backdrop-filter:blur(4px)}
.add-choice-overlay.show{display:flex}
.add-choice-panel{background:#fff;border:1px solid var(--border);border-radius:16px;width:min(520px,100%);margin:auto;overflow:hidden;box-shadow:0 24px 80px rgba(2,26,72,.30)}
.add-choice-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#f8fafc}
.add-choice-title{font-size:20px;font-weight:900;color:var(--text)}
.add-choice-body{padding:18px;display:grid;gap:12px}
.add-choice-btn{border:1px solid var(--border);background:#fff;border-radius:12px;padding:16px;text-align:right;font-family:inherit;cursor:pointer;color:var(--text);display:grid;gap:5px}
.add-choice-btn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(224,123,57,.12)}
.add-choice-btn b{font-size:16px;color:var(--text)}
.add-choice-btn span{font-size:12px;color:var(--dim);line-height:1.45}
.raw-data{border:1px dashed rgba(2,26,72,.18);background:#fff;border-radius:10px;padding:8px 10px;font-size:12px;color:var(--dim);line-height:1.55}
.raw-data b{color:var(--text)}
.shape-warning{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:10px;padding:7px 10px;font-size:12px;font-weight:900}
.item-visual{cursor:pointer}
.item-visual:hover{box-shadow:0 0 0 2px rgba(224,123,57,.25)}
.edit-overlay{position:fixed;inset:0;background:rgba(2,26,72,.56);z-index:760;display:none;padding:18px;backdrop-filter:blur(4px)}
.edit-overlay.show{display:flex}
.edit-panel{background:#fff;border:1px solid var(--border);border-radius:16px;width:min(720px,100%);max-height:min(760px,100%);margin:auto;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(2,26,72,.30)}
.edit-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#f8fafc}
.edit-title{font-size:18px;font-weight:900;color:var(--text)}
.edit-body{padding:16px;overflow:auto;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.edit-field{display:flex;flex-direction:column;gap:5px}
.edit-field label{font-size:11px;font-weight:900;color:var(--dim)}
.edit-field input,.edit-field textarea{border:1px solid var(--border);border-radius:10px;padding:9px 10px;font-family:inherit;font-size:14px;background:#f8fafc;color:var(--text)}
.edit-field textarea{min-height:110px;resize:vertical;direction:ltr;text-align:left}
.edit-wide{grid-column:1/-1}
.edit-actions{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-start;background:#fff}
.edit-save{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;border:0;border-radius:10px;padding:10px 18px;font-family:inherit;font-weight:900;cursor:pointer}
.edit-cancel{background:#fff;color:var(--dim);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-family:inherit;font-weight:900;cursor:pointer}
@media(max-width:640px){.edit-body{grid-template-columns:1fr}.edit-overlay{padding:0}.edit-panel{height:100%;max-height:100%;border-radius:0}}
.source-overlay{position:fixed;inset:0;background:rgba(2,26,72,.55);z-index:720;display:none;padding:18px;backdrop-filter:blur(3px)}
.source-overlay.show{display:flex}
.source-panel{background:#fff;border:1px solid var(--border);border-radius:14px;width:min(1200px,100%);height:min(860px,100%);margin:auto;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(2,26,72,.28)}
.source-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fafc}
.source-title{font-size:18px;font-weight:900}
.source-body{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(360px,.9fr);gap:0;min-height:0;flex:1}
.source-original{background:#f7f9fc;border-left:1px solid var(--border);padding:12px;overflow:auto}
.source-original img,.source-original iframe{width:100%;height:100%;min-height:620px;border:1px solid var(--border);border-radius:10px;background:#fff;object-fit:contain}
.source-parsed{padding:12px;overflow:auto}
.source-parsed table{min-width:0;width:100%;border-collapse:collapse}
.source-parsed th,.source-parsed td{border-bottom:1px solid var(--border);padding:8px;text-align:right;font-size:12px}
.source-parsed th{background:#f8fafc;color:var(--muted);font-weight:900}
@media(max-width:820px){.source-body{grid-template-columns:1fr}.source-original{border-left:0;border-bottom:1px solid var(--border)}.source-original img,.source-original iframe{min-height:420px}}
.item-status{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.is-wait{background:rgba(122,147,171,0.15);color:var(--dim);}
.is-prod{background:rgba(224,123,57,0.18);color:var(--accent);}
.is-done{background:rgba(26,122,66,0.15);color:var(--success);}
.prog-bar{height:3px;background:rgba(0,0,0,0.06);border-radius:2px;margin-top:4px;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.print-btns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.print-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;
  justify-content:center;text-decoration:none;border-radius:12px;font-size:14px;font-weight:800;font-family:inherit;color:#fff;
  border:1px solid transparent;box-shadow:0 8px 22px rgba(2,26,72,0.12);transition:transform .16s ease,box-shadow .16s ease;}
.print-btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(2,26,72,0.16);}
.print-btn.cards{background:linear-gradient(135deg,#021A48,#17356f) !important;}
.print-btn.a4{background:linear-gradient(135deg,#1a7a42,#0f5a2f) !important;}
.print-btn.delivery{background:linear-gradient(135deg,#6d217d,#481652) !important;}

@media(max-width:640px){
  .detail-overlay{inset:56px 0 0;padding:0;background:rgba(2,26,72,0.24);}
  .detail-panel{width:100vw;max-height:calc(100vh - 56px);border-radius:18px 18px 0 0;border-left:none;border-right:none;border-bottom:none;}
  .detail-body{padding:14px;}
  .detail-hero{grid-template-columns:1fr;}
  .info-grid{grid-template-columns:1fr;}
  .hero-metric{grid-template-columns:1fr 1fr;}
  .item-row{grid-template-columns:1fr;}
  .item-visual{min-height:150px;}
  .item-kpis{grid-template-columns:repeat(2,1fr);}
  .print-btns{flex-direction:column;}
  .print-btns{display:flex;}
  .print-btn{justify-content:center;}
}
</style>
</head>
<body data-page="orders">

<div class="page">
  <!-- WS + title row -->
  <div class="ws-row">
    <span style="font-size:18px;font-weight:900;color:var(--text)">📋 הזמנות</span>
    <span class="ws-badge"><span class="ws-dot" id="wsDot"></span><span id="wsLabel">מתחבר...</span></span>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <span id="statusFilterButtons" style="display:contents"></span>
    <div class="search-wrap">
      <input class="search-box" id="searchBox" placeholder="🔍 חיפוש..." oninput="applyFilter()">
    </div>
    <a href="/index.html" class="new-order-btn">➕ חדשה</a>
  </div>

  <!-- DESKTOP TABLE -->
  <div class="orders-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>מספר</th><th>לקוח</th><th>אספקה</th><th>עדיפות</th>
            <th>משקל</th><th>סטטוס</th><th>נוצרה</th><th></th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="8" style="text-align:center;padding:48px;color:var(--muted)">טוען...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- MOBILE CARDS -->
    <div class="mobile-cards" id="mobileCards">
      <div style="text-align:center;padding:40px;color:var(--muted)">טוען...</div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <div class="detail-order-num" id="detailOrderNum">—</div>
        <div class="detail-customer" id="detailCustomer"></div>
      </div>
      <button class="detail-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<div class="add-choice-overlay" id="addChoiceOverlay" onclick="closeAddChoiceOverlay(event)">
  <div class="add-choice-panel">
    <div class="add-choice-head">
      <div>
        <div class="add-choice-title">הוסף להזמנה</div>
        <div class="detail-customer" id="addChoiceMeta"></div>
      </div>
      <button class="detail-close" onclick="closeAddChoicePanel()">✕</button>
    </div>
    <div class="add-choice-body">
      <button class="add-choice-btn" onclick="openAddFromOcr(event)">
        <b>הוסף מ־OCR</b>
        <span>פתח את מקור הקליטה והפענוח שנשמרו להזמנה, ובחר שורה להוספה.</span>
      </button>
      <button class="add-choice-btn" onclick="openAddManualItem(event)">
        <b>הוסף צורה ידנית</b>
        <span>פתח טופס צורה, קוטר, כמות וצלעות להוספה ידנית להזמנה.</span>
      </button>
    </div>
  </div>
</div>

<div class="source-overlay" id="sourceOverlay" onclick="closeSourceOverlay(event)">
  <div class="source-panel">
    <div class="source-head">
      <div>
        <div class="source-title" id="sourceTitle">מקור קליטה</div>
        <div class="detail-customer" id="sourceMeta"></div>
      </div>
      <button class="detail-close" onclick="closeSourcePanel()">✕</button>
    </div>
    <div class="source-body">
      <div class="source-original" id="sourceOriginal"></div>
      <div class="source-parsed" id="sourceParsed"></div>
    </div>
  </div>
</div>

<script>
let allOrders = [], activeStatus = '', ws, _wsDelay = 1000, currentDetailOrder = null, addChoiceOrderId = null, ocrAddItems = [];
let orderShapeEditor = null, pendingShapeEdit = null;
const STATUS_CONTRACT = window.IronBendStatus || {};
const ORDER_STATUS = STATUS_CONTRACT.ORDER_STATUS || {};
const allowedOrderTransitions = STATUS_CONTRACT.allowedOrderTransitions || (() => []);
const ORDER_ACTION_LABELS = new Map([
  [ORDER_STATUS.APPROVED_WAITING_PRODUCTION, '✓ אשר'],
  [ORDER_STATUS.PRODUCTION_QUEUE, '▶ לתור'],
  [ORDER_STATUS.IN_PRODUCTION, '▶ ייצור'],
  [ORDER_STATUS.DONE_WAITING_PICKUP, '✓ הושלם'],
  [ORDER_STATUS.ON_THE_WAY, '🚚 בדרך'],
  [ORDER_STATUS.SENT, '📤 נשלחה'],
  [ORDER_STATUS.DELIVERED_CONFIRMED, '✓ סופק'],
  [ORDER_STATUS.CANCELLED, 'בטל'],
]);
const ORDER_STATUS_FILTERS = [
  { label: 'הכל', status: '' },
  { label: 'ממתינות', status: ORDER_STATUS.PENDING_APPROVAL },
  { label: 'אושרו', status: ORDER_STATUS.APPROVED_WAITING_PRODUCTION },
  { label: 'בייצור', status: ORDER_STATUS.IN_PRODUCTION },
  { label: 'הושלמו', status: ORDER_STATUS.DONE_WAITING_PICKUP },
];

function escHtml(value) {
  return window.IronBendSafe
    ? window.IronBendSafe.escapeHtml(value)
    : String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function jsArg(value) {
  return JSON.stringify(String(value ?? ''));
}
function jsAttr(value) {
  return escHtml(jsArg(value));
}

// ── WebSocket ──────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(window.IronBendAuth?.webSocketUrl?.('/') || `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`);
  ws.onopen  = () => {
    document.getElementById('wsDot').classList.add('connected');
    document.getElementById('wsLabel').textContent = 'מחובר';
    _wsDelay = 1000;
  };
  ws.onerror = () => ws.close();
  ws.onclose = () => {
    document.getElementById('wsDot').classList.remove('connected');
    document.getElementById('wsLabel').textContent = 'מתחבר...';
    _wsDelay = Math.min(_wsDelay * 2, 30000);
    setTimeout(connectWS, _wsDelay);
  };
  ws.onmessage = e => {
    const { type } = JSON.parse(e.data);
    if (['new_order','order_status','order_complete'].includes(type)) fetchOrders();
  };
}

// ── Data ───────────────────────────────────────────────────────────────
async function fetchOrders() {
  try {
    const url = '/api/orders' + (activeStatus ? '?status=' + encodeURIComponent(activeStatus) : '');
    const response = await fetch(url);
    if (!response.ok) throw new Error(`orders ${response.status}`);
    allOrders = await response.json();
  } catch (error) {
    console.error('fetchOrders failed', error);
    allOrders = [];
  }
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  let list = allOrders;
  if (q) list = list.filter(o =>
    o.order_num?.toLowerCase().includes(q) ||
    o.customer_name?.toLowerCase().includes(q) ||
    o.delivery_address?.toLowerCase().includes(q)
  );
  renderTable(list);
  renderCards(list);
}

function renderStatusFilters() {
  const target = document.getElementById('statusFilterButtons');
  target.innerHTML = ORDER_STATUS_FILTERS.map((filter, index) =>
    `<button class="filter-btn${index === 0 ? ' active' : ''}" data-status="${filter.status}">${filter.label}</button>`
  ).join('');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = btn.dataset.status;
      fetchOrders();
    });
  });
}

// ── Badge helpers ──────────────────────────────────────────────────────
function sBadgeClass(s) {
  if (!s) return 's-wait';
  if (s.includes('הושלם') || s.includes('נמסרה') || s.includes('סופק')) return 's-done';
  if (s === 'בייצור') return 's-prod';
  if (s.includes('אושרה'))  return 's-approved';
  return 's-wait';
}
function urgentLabel(o) {
  return o.priority === 'דחוף'
    ? '<span style="color:var(--danger);font-weight:700">⚡ דחוף</span>'
    : '<span style="color:var(--muted)">רגיל</span>';
}
function actionBtns(o, stopProp = true, includePrints = true) {
  const sp = stopProp ? 'onclick="event.stopPropagation()"' : '';
  const transitions = allowedOrderTransitions(o.status).filter(status => status !== ORDER_STATUS.CANCELLED);
  const transitionButtons = transitions.map(status => {
    const label = ORDER_ACTION_LABELS.get(status) || status;
    const cls = status === ORDER_STATUS.APPROVED_WAITING_PRODUCTION ? 'btn-sm success' : 'btn-sm';
    return `<button class="${cls}" onclick="event.stopPropagation();setStatus(${o.id},${jsAttr(status)})">${escHtml(label)}</button>`;
  }).join('');
  const printButtons = includePrints ? `
    <a class="btn-sm" href="/order-print.html?id=${o.id}&kind=print-cards" target="_blank" title="כרטיסיות">🖨️</a>
    <a class="btn-sm" href="/order-print.html?id=${o.id}&kind=delivery-certificate" target="_blank" title="תעודת משלוח">📋</a>
  ` : '';
  return `<div class="actions" ${sp}>
    ${transitionButtons}
    ${printButtons}
  </div>`;
}

// ── Desktop table ──────────────────────────────────────────────────────
function renderTable(orders) {
  const body = document.getElementById('ordersBody');
  if (!orders.length) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">אין הזמנות</td></tr>';
    return;
  }
  body.innerHTML = orders.map(o => `
    <tr onclick="openDetail(${o.id})">
      <td><span class="order-num">${escHtml(o.order_num)}</span></td>
      <td>${escHtml(o.customer_name ?? '—')}</td>
      <td style="white-space:nowrap">${escHtml(o.delivery_date ?? '—')}</td>
      <td>${urgentLabel(o)}</td>
      <td class="weight-tag">${(o.total_weight||0).toFixed(0)} ק"ג</td>
      <td><span class="badge ${sBadgeClass(o.status)}">${escHtml(o.status)}</span></td>
      <td style="color:var(--muted);font-size:12px">${new Date(o.created_at).toLocaleDateString('he-IL')}</td>
      <td>${actionBtns(o)}</td>
    </tr>`).join('');
}

// ── Mobile cards ───────────────────────────────────────────────────────
function renderCards(orders) {
  const wrap = document.getElementById('mobileCards');
  if (!orders.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">אין הזמנות</div>';
    return;
  }
  wrap.innerHTML = orders.map(o => `
    <div class="m-card" onclick="openDetail(${o.id})">
      <div class="m-card-top">
        <div>
          <div class="m-card-num">${escHtml(o.order_num)}</div>
          <div class="m-card-customer">${escHtml(o.customer_name ?? '—')}</div>
        </div>
        <span class="badge ${sBadgeClass(o.status)}">${escHtml(o.status)}</span>
      </div>
      <div class="m-card-meta">
        ${o.delivery_date ? `<span>📅 ${escHtml(o.delivery_date)}</span>` : ''}
        <span>⚖️ ${(o.total_weight||0).toFixed(0)} ק"ג</span>
        ${o.priority === 'דחוף' ? '<span style="color:var(--danger);font-weight:700">⚡ דחוף</span>' : ''}
      </div>
      <div class="m-card-actions">
        ${actionBtns(o, false, false)}
        <a class="btn-sm" href="/order-print.html?id=${o.id}&kind=print-cards" target="_blank" onclick="event.stopPropagation()">🖨️ כרטיסיות</a>
        <a class="btn-sm" href="/order-print.html?id=${o.id}&kind=delivery-certificate" target="_blank" onclick="event.stopPropagation()">📋 תעודה</a>
      </div>
    </div>`).join('');
}

// ── Status update ──────────────────────────────────────────────────────
async function setStatus(id, status) {
  const response = await fetch(`/api/orders/${id}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  const result = await response.json().catch(() => ({}));
  if (response.status === 401 || response.status === 403) {
    alert(response.status === 401
      ? 'נדרשת התחברות מחדש כדי לאשר הזמנה.'
      : 'אין למשתמש הנוכחי הרשאה לאשר הזמנה.');
    return false;
  }
  if (!response.ok || !result.success) {
    const allowed = result.allowed?.length ? ` אפשרי: ${result.allowed.join(' / ')}` : '';
    alert((result.error || 'עדכון סטטוס נכשל') + allowed);
    return false;
  }
  fetchOrders();
  return true;
}

// ── Detail panel ───────────────────────────────────────────────────────
async function openDetail(id) {
  const [r, pkgR] = await Promise.all([
    fetch(`/api/orders/${id}`),
    fetch(`/api/packages?order_id=${id}`)
  ]);
  const o = await r.json();
  const pkgs = await pkgR.json().catch(() => []);
  currentDetailOrder = o;
  document.getElementById('detailOrderNum').textContent = o.order_num;
  document.getElementById('detailCustomer').textContent = o.customer_name ?? '';
  document.getElementById('detailBody').innerHTML = buildDetailHTML(o, pkgs);
  document.getElementById('detailOverlay').classList.add('show');
  requestAnimationFrame(renderDetailShapes);
  history.replaceState(null, '', `?id=${id}`);
}

function safeJson(value, fallback = []) {
  if (!value) return fallback;
  if (Array.isArray(value)) return value;
  try { return JSON.parse(value); } catch(e) { return fallback; }
}

function segmentLength(segment) {
  if (segment && typeof segment === 'object') return Number(segment.length_mm ?? segment.length ?? 0);
  return Number(segment || 0);
}

function normalizeDisplaySegments(shapeName, rawSegments) {
  const segments = (rawSegments || []).map(segment => (
    segment && typeof segment === 'object'
      ? { ...segment, length_mm: segmentLength(segment) }
      : { length_mm: segmentLength(segment), angle_deg: 180 }
  ));
  const name = String(shapeName || '').toLowerCase();
  const lengths = segments.map(segment => segment.length_mm);
  const isOpenU = /open|hook|anchor|צורת ח|צורת u|פתוח|פתוחה|\bu\b/.test(name);
  const isClosed = /closed|stirrup|overlap|חישוק|חפיפה|מסגרת/.test(name);

  if (isClosed && lengths.length === 6 && lengths[1] === lengths[3] && lengths[2] === lengths[4] && lengths[0] === lengths[5]) {
    return segments;
  }
  if (isClosed && lengths.length === 6 && lengths[0] === lengths[2] && lengths[1] === lengths[3] && lengths[4] === lengths[5]) {
    return [
      { ...segments[4], angle_deg: 90 },
      { ...segments[0], angle_deg: 90 },
      { ...segments[1], angle_deg: 90 },
      { ...segments[2], angle_deg: 90 },
      { ...segments[3], angle_deg: 90 },
      { ...segments[5], angle_deg: segments[5].angle_deg ?? 0 },
    ];
  }
  if (isOpenU && lengths.length === 3) {
    const [a, b, c] = lengths;
    if (a === b && b !== c) return [{ ...segments[0], angle_deg: 90 }, { ...segments[2], angle_deg: 90 }, segments[1]];
    if (b === c && a !== b) return [{ ...segments[1], angle_deg: 90 }, { ...segments[0], angle_deg: 90 }, segments[2]];
  }

  return segments;
}

function itemLength(item) {
  const direct = Number(item.total_length_mm ?? item.length ?? 0);
  if (Number.isFinite(direct) && direct > 0) return direct;
  if (isRealSpiralItem(item)) return Math.round(Math.PI * Number(item.spiral_diameter_mm) * Number(item.spiral_turns));
  return normalizeDisplaySegments(item.shape_name, safeJson(item.segments)).reduce((sum, segment) => sum + segmentLength(segment), 0);
}

function itemWeight(item) {
  const total = Number(item.total_weight ?? 0);
  if (Number.isFinite(total) && total > 0) return total;
  const perUnit = Number(item.weight_per_unit ?? item.weight ?? 0);
  const qty = Number(item.quantity ?? 1);
  const calc = perUnit * qty;
  return Number.isFinite(calc) ? calc : 0;
}

function itemDimensions(item) {
  if (isRealSpiralItem(item)) return `קוטר ספיראלה ${item.spiral_diameter_mm} / ${item.spiral_turns} כריכות`;
  const values = normalizeDisplaySegments(item.shape_name, safeJson(item.segments)).map(segmentLength).filter(n => Number.isFinite(n) && n > 0);
  return values.length ? values.join(' / ') : '';
}

function itemSegments(item) {
  if (isRealSpiralItem(item)) return [];
  return normalizeDisplaySegments(item.shape_name, safeJson(item.segments)).map(segmentLength).filter(n => Number.isFinite(n) && n > 0);
}

function itemAngles(item) {
  if (isRealSpiralItem(item)) return [];
  const segs = normalizeDisplaySegments(item.shape_name, safeJson(item.segments));
  return segs.slice(0, -1).map(segment => {
    const angle = segment && typeof segment === 'object' ? Number(segment.angle_deg) : 180;
    return Number.isFinite(angle) && angle > 0 ? angle : 180;
  });
}

function rawItemSegments(item) {
  if (isRealSpiralItem(item)) return [];
  return safeJson(item.segments).map(segment => (
    segment && typeof segment === 'object'
      ? { length_mm: segmentLength(segment), angle_deg: Number(segment.angle_deg ?? segment.angle ?? 180) }
      : { length_mm: segmentLength(segment), angle_deg: 180 }
  )).filter(segment => Number.isFinite(segment.length_mm) && segment.length_mm > 0);
}

function isOpenUShape(item, sides) {
  const name = String(item?.shape_name || '').toLowerCase();
  const angleList = itemAngles(item);
  const hasTwoRightBends = angleList.length >= 2
    && angleList.slice(0, 2).every(angle => Math.abs(Number(angle) - 90) <= 1);
  return !isRealSpiralItem(item)
    && Array.isArray(sides)
    && sides.length === 3
    && (/open|hook|anchor|צורת ח|צורת u|פתוח|פתוחה|\bu\b/.test(name) || hasTwoRightBends);
}

function openULegWarning(item, sides) {
  if (!isOpenUShape(item, sides)) return '';
  const first = Number(sides[0]);
  const last = Number(sides[2]);
  if (!Number.isFinite(first) || !Number.isFinite(last)) return '';
  if (Math.abs(first - last) <= 1) return '';
  return `צורת ח עם צלעות מקבילות לא שוות: צלע א ${first} מ"מ מול צלע ג ${last} מ"מ. דרוש תיקון לפני ייצור.`;
}

function itemMachineSequence(item) {
  const segments = rawItemSegments(item);
  if (isRealSpiralItem(item)) {
    return `ספיראלה: קוטר ברזל ${item.diameter || '-'}, קוטר ספיראלה ${item.spiral_diameter_mm || '-'}, כריכות ${item.spiral_turns || '-'}`;
  }
  return segments.map((segment, idx) => `צלע ${idx + 1}: ${Math.round(segment.length_mm)} מ"מ | זווית אחרי: ${Number.isFinite(segment.angle_deg) ? segment.angle_deg : 180}°`).join(' · ');
}

function renderDetailShapes() {
  if (!window.IronBendShapes) {
    setTimeout(renderDetailShapes, 80);
    return;
  }
  document.querySelectorAll('[data-spiral-shape]').forEach(el => {
    const diameter = Number(el.dataset.spiralDiameter || 0);
    const turns = Number(el.dataset.spiralTurns || 0);
    el.innerHTML = buildSpiralSvg(diameter, turns);
  });
  document.querySelectorAll('[data-detail-shape]').forEach(el => {
    try {
      const sides = JSON.parse(decodeURIComponent(el.dataset.sides || '%5B%5D'));
      const angles = JSON.parse(decodeURIComponent(el.dataset.angles || '%5B%5D'));
      window.IronBendShapes.render2D(el, sides, angles, {
        width: el.clientWidth || 220,
        height: 130,
        padding: 22,
        color: '#DF5000',
        strokeWidth: 5,
        showDimensions: true,
        bgColor: '#ffffff',
      });
    } catch (e) {
      el.textContent = 'אין צורה';
    }
  });
}

function buildSpiralSvg(diameter, turns) {
  return `<svg viewBox="0 0 220 130" aria-label="spiral" style="width:100%;height:100%">
    <circle cx="110" cy="62" r="42" stroke="#DF5000" stroke-width="6" fill="none"/>
    <circle cx="110" cy="62" r="30" stroke="#ef8a42" stroke-width="4" fill="none" opacity=".75"/>
    <circle cx="110" cy="62" r="18" stroke="#f3b074" stroke-width="4" fill="none" opacity=".7"/>
    <text x="110" y="118" text-anchor="middle" font-size="11" fill="#1f2937">קוטר ${escHtml(diameter)} מ"מ · ${escHtml(turns)} כריכות</text>
  </svg>`;
}

function isSingleSegmentShape(sides) {
  return !Array.isArray(sides) || sides.filter(n => Number.isFinite(Number(n)) && Number(n) > 0).length <= 1;
}

function isSpiralOrRingName(shapeName) {
  return /spiral|ring|coil|ספיר|טבעת|סליל|לולאה/i.test(String(shapeName || ''));
}

function isRealSpiralItem(item) {
  const shape = String(item?.shape_name || item?.shapeName || item?.shape || '');
  return /spiral|ring|coil|ספיר|ספירלה|טבעת|סליל|לולאה|קפיץ/i.test(shape)
    && Number(item?.spiral_diameter_mm) > 0
    && Number(item?.spiral_turns) > 0;
}

function shapeLabel(shapeName, sides, item = null) {
  if (item && isRealSpiralItem(item)) return 'ספיראלה';
  const name = String(shapeName || '').toLowerCase();
  if (isSingleSegmentShape(sides)) return 'מוט ישר';
  if (name.includes('open u') || name.includes('open bar')) return 'צורת ח פתוחה';
  if (name.includes('closed') || name.includes('stirrup')) return 'חישוק סגור';
  if (name.includes('straight')) return 'מוט ישר';
  return shapeName || 'מותאם';
}

function shapeMismatchWarning(item, sides) {
  if (isRealSpiralItem(item)) return false;
  return isSingleSegmentShape(sides) && isSpiralOrRingName(item.shape_name);
}

function actualWeight(item) {
  const value = Number(item.actual_weight_kg);
  return Number.isFinite(value) && value > 0 ? value : null;
}

function weightDeviationPct(item) {
  const stored = Number(item.weight_deviation_pct);
  if (Number.isFinite(stored)) return stored;
  const actual = actualWeight(item);
  const target = Number(item.total_weight ?? item.weight ?? 0);
  return actual && target > 0 ? ((actual - target) / target) * 100 : null;
}

function weightDeviationClass(pct) {
  if (pct == null) return '';
  const abs = Math.abs(pct);
  if (abs > 10) return ' style="background:#fef2f2;color:#991b1b"';
  if (abs > 5) return ' style="background:#fff7ed;color:#9a3412"';
  return ' style="background:#ecfdf5;color:#166534"';
}

function needsReview(item) {
  return /review|required|unclear|uncertain|verify|ambiguous|not clear|דורש|לא ברור/i.test(item.note || '');
}

function isTechnicalRecognitionNote(value) {
  const note = String(value || '').trim();
  if (!note) return false;
  if (note.length > 220) return true;
  return /cover page|row\s+\d+|interpreted|sketch|review required|reported total|segment sum|length surplus|unclear|uncertain|conservatively|tassa|pdf/i.test(note);
}

function visibleItemNote(note) {
  if (!note) return '';
  return isTechnicalRecognitionNote(note) ? 'דורש אימות מול מקור הקליטה' : note;
}

function visibleOrderNote(note) {
  if (!note || isTechnicalRecognitionNote(note)) return '';
  return note;
}

function isReviewApproved(item) {
  return String(item.review_status || '').toLowerCase() === 'approved';
}

function needsItemReview(item, sides) {
  if (isReviewApproved(item)) return false;
  return needsReview(item) || shapeMismatchWarning(item, sides || itemSegments(item));
}

function reviewStatusHtml(item) {
  if (isReviewApproved(item)) {
    return '<span class="review-status review-approved">אומת</span>';
  }
  return '<span class="review-status review-pending">ממתין לאימות</span>';
}

function buildDetailHTML(o, pkgs) {
  const totalItems = (o.pallets || []).reduce((sum, p) => sum + (p.items || []).length, 0);
  const reviewItems = (o.pallets || []).reduce((sum, p) => sum + (p.items || []).filter(item => needsItemReview(item)).length, 0);
  const totalPallets = (o.pallets || []).length;
  const driverNotes = visibleOrderNote(o.driver_notes);

  const hero = `<div class="detail-hero">
    <div class="hero-card">
      <div class="hero-title">לקוח / הזמנה</div>
      <div class="hero-main">${escHtml(o.customer_name ?? '—')}</div>
      <div style="margin-top:8px"><span class="badge ${sBadgeClass(o.status)}">${escHtml(o.status)}</span></div>
      <div class="hero-metric">
        <div class="metric-box"><div class="metric-label">אספקה</div><div class="metric-value">${escHtml(o.delivery_date ?? '—')}</div></div>
        <div class="metric-box"><div class="metric-label">משקל</div><div class="metric-value" style="color:var(--accent)">${(o.total_weight||0).toFixed(1)} ק"ג</div></div>
      </div>
    </div>
    <div class="hero-card">
      <div class="hero-title">סיכום ייצור</div>
      <div class="hero-metric" style="margin-top:0">
        <div class="metric-box"><div class="metric-label">משטחים</div><div class="metric-value">${totalPallets}</div></div>
        <div class="metric-box"><div class="metric-label">פריטים</div><div class="metric-value">${totalItems}</div></div>
        <div class="metric-box"><div class="metric-label">דורש בדיקה</div><div class="metric-value" style="color:${reviewItems ? 'var(--warning)' : 'var(--success)'}">${reviewItems}</div></div>
        <div class="metric-box"><div class="metric-label">עדיפות</div><div class="metric-value">${escHtml(o.priority || 'רגיל')}</div></div>
      </div>
    </div>
  </div>`;

  // ── Print buttons
  const prints = `<div class="print-btns">
    <a class="print-btn cards" href="/order-print.html?id=${o.id}&kind=print-cards" target="_blank" rel="noopener">&#128424;&#65039; &#1499;&#1512;&#1496;&#1497;&#1505;&#1497;&#1493;&#1514; &#1497;&#1497;&#1510;&#1493;&#1512;</a>
    <a class="print-btn a4" href="/order-print.html?id=${o.id}&kind=print-a4" target="_blank" rel="noopener">&#128196; &#1492;&#1491;&#1508;&#1505;&#1514; A4</a>
    <a class="print-btn delivery" href="/order-print.html?id=${o.id}&kind=delivery-certificate" target="_blank" rel="noopener">&#128203; &#1514;&#1506;&#1493;&#1491;&#1514; &#1502;&#1513;&#1500;&#1493;&#1495;</a>
  </div>`;

  // ── Info
  const info = `<div class="d-section">
    <div class="d-title">📌 פרטי הזמנה</div>
    <div class="info-grid">
      <div><div class="info-label">לקוח</div><div class="info-value">${escHtml(o.customer_name??'—')}</div></div>
      <div><div class="info-label">ערוץ</div><div class="info-value">${escHtml(o.channel??'—')}</div></div>
      <div><div class="info-label">תאריך אספקה</div><div class="info-value">${escHtml(o.delivery_date??'—')}</div></div>
      <div><div class="info-label">משקל כולל</div><div class="info-value" style="color:var(--accent)">${(o.total_weight||0).toFixed(1)} ק"ג</div></div>
      ${o.delivery_address?`<div style="grid-column:span 2"><div class="info-label">כתובת</div><div class="info-value">${escHtml(o.delivery_address)}</div></div>`:''}
      ${driverNotes?`<div style="grid-column:span 2"><div class="info-label">הערות לנהג</div><div class="info-value">${escHtml(driverNotes)}</div></div>`:''}
      ${o.struct_element?`<div><div class="info-label">אלמנט</div><div class="info-value">${escHtml(o.struct_element)}</div></div>`:''}
      ${o.struct_floor?`<div><div class="info-label">קומה</div><div class="info-value">${escHtml(o.struct_floor)}</div></div>`:''}
      ${o.sheet_num?`<div><div class="info-label">גיליון</div><div class="info-value">${escHtml(o.sheet_num)}</div></div>`:''}
    </div>
  </div>`; // BUG-25: added struct_element / struct_floor / sheet_num

  // ── Status
  const statuses = [o.status, ...allowedOrderTransitions(o.status)]
    .filter((status, index, list) => status && list.indexOf(status) === index);
  const statusSec = `<div class="d-section">
    <div class="d-title">🔁 עדכון סטטוס</div>
    <div class="status-actions">
      ${statuses.map(s => `<button class="status-btn${o.status===s?' cur':''}"
        ${o.status===s?'disabled':''}
        onclick="setStatusAndClose(${o.id},${jsAttr(s)})">${escHtml(s)}</button>`).join('')}
    </div>
  </div>`;

  // ── Items
  const palletsHtml = (o.pallets||[]).map((p, pi) => {
    const done = (p.items||[]).filter(i => i.status==='הושלם').length;
    const pct  = p.items?.length ? Math.round(done / p.items.length * 100) : 0;
    const totalW = (p.items||[]).reduce((s,i) => s + itemWeight(i), 0);
    const items = (p.items||[]).map(item => {
      const ic = item.status==='הושלם' ? 'is-done' : item.status==='בייצור' ? 'is-prod' : 'is-wait';
      const qty = item.quantity||0;
      const produced = item.produced_qty||0;
      const length = itemLength(item);
      const weight = itemWeight(item);
      const sides = itemSegments(item);
      const angles = itemAngles(item);
      const dims = sides.length ? sides.join(' / ') : itemDimensions(item);
      const shapeMismatch = shapeMismatchWarning(item, sides);
      const openUWarning = openULegWarning(item, sides);
      const review = needsItemReview(item, sides);
      const displayNote = visibleItemNote(item.note);
      const measuredWeight = actualWeight(item);
      const deviationPct = weightDeviationPct(item);
      const visualHtml = isRealSpiralItem(item)
        ? `<div class="item-visual" data-spiral-shape="1" data-spiral-diameter="${escHtml(item.spiral_diameter_mm)}" data-spiral-turns="${escHtml(item.spiral_turns)}" onclick="openItemEdit(event, ${o.id}, ${item.id})" title="ערוך צורה"></div>`
        : `<div class="item-visual"
          data-detail-shape="1"
          data-sides="${encodeURIComponent(JSON.stringify(sides))}"
          data-angles="${encodeURIComponent(JSON.stringify(angles))}"
          onclick="openItemEdit(event, ${o.id}, ${item.id})"
          title="ערוך צורה"></div>`;
      return `<div class="item-row">
        ${visualHtml}
        <div class="item-main">
          <div class="item-head">
            <span class="item-diameter">⌀${escHtml(item.diameter)}</span>
            <span class="item-shape">${escHtml(shapeLabel(item.shape_name, sides, item))}</span>
            ${item.is_3d ? ' <span style="background:#7c3aed;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px">3D</span>' : ''}
            ${review || isReviewApproved(item) ? reviewStatusHtml(item) : ''}
          </div>
          <div class="item-kpis">
            <div class="item-kpi"><div class="item-kpi-label">כמות</div><div class="item-kpi-value">${qty} יח'</div></div>
            <div class="item-kpi"><div class="item-kpi-label">אורך פתיחה</div><div class="item-kpi-value">${Math.round(length)} מ"מ</div></div>
            <div class="item-kpi"><div class="item-kpi-label">משקל רצוי</div><div class="item-kpi-value">${weight.toFixed(1)} ק"ג</div></div>
            <div class="item-kpi"><div class="item-kpi-label">יוצר</div><div class="item-kpi-value">${produced}/${qty}</div></div>
          </div>
          <div class="raw-data"><b>מה שמור לפריט:</b> ${escHtml(itemMachineSequence(item))}</div>
          ${openUWarning ? `<div class="shape-warning">⚠ ${escHtml(openUWarning)}</div>` : ''}
          ${dims ? `<div class="item-dims">${dims.split(' / ').map((d, idx) => `<span class="dim-chip">${String.fromCharCode(0x05D0 + idx)}: ${d} מ"מ</span>`).join('')}</div>` : ''}
          ${measuredWeight ? `<div class="item-dims"><span class="dim-chip">משקל מצוי: ${measuredWeight.toFixed(1)} ק"ג</span><span class="dim-chip"${weightDeviationClass(deviationPct)}>סטייה: ${deviationPct > 0 ? '+' : ''}${deviationPct.toFixed(1)}%</span></div>` : ''}
          ${shapeMismatch && !isReviewApproved(item) ? `<div class="note-chip">⚠ שם הצורה המקורי היה "${escHtml(item.shape_name)}", אבל הגיאומטריה כוללת צלע אחת בלבד ולכן מוצג כמוט ישר.</div>` : ''}
          ${displayNote ? `<div class="note-chip">⚠ ${escHtml(displayNote)}</div>` : ''}
          <div class="review-actions">
            <button class="review-btn danger" onclick="deleteOrderItem(event, ${o.id}, ${item.id})">מחק פריט</button>
          </div>
          ${review ? `<div class="review-actions">
            <button class="review-btn" onclick="openOrderIntakeSource(event, ${o.id})">פתח מקור להשוואה</button>
            <button class="review-btn" onclick="openItemEdit(event, ${o.id}, ${item.id})">ערוך פריט</button>
            <button class="review-btn primary" onclick="approveItemReview(event, ${o.id}, ${item.id})">אשר הערה</button>
          </div>` : ''}
          ${item.status==='בייצור'&&qty>0?`<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,produced/qty*100).toFixed(0)}%"></div></div><div style="font-size:11px;color:var(--muted)">${produced}/${qty}</div>`:''}
        </div>
        <span class="item-status ${ic}">${escHtml(item.status)}</span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;color:var(--text);margin-bottom:6px">📦 משטח ${pi+1} — ${totalW.toFixed(0)} ק"ג | ${pct}%</div>
      <div class="prog-bar" style="margin-bottom:8px"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${items||'<div style="color:var(--muted);font-size:12px;padding:4px 0">אין פריטים</div>'}
    </div>`;
  }).join('');

  const itemsSec = `<div class="d-section">
    <div class="d-title" style="justify-content:space-between"><span>📦 פריטים לייצור</span><button class="review-btn primary" onclick="openAddItem(event, ${o.id})">➕ הוסף להזמנה</button></div>
    ${palletsHtml||'<div style="color:var(--muted);font-size:13px">אין פריטים</div>'}
  </div>`;

  // ── Packages
  let pkgSec = '';
  if (pkgs && pkgs.length) {
    const pkgRows = pkgs.map(p => {
      const label = p.status==='shipped'?'נשלח':p.status==='staged'?'מוכן לטעינה':'ארוז';
      const col = p.status==='shipped'?'var(--success)':p.status==='staged'?'var(--warning)':'var(--accent)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)">
        <div>
          <div style="font-weight:700;font-size:13px">📦 ${escHtml(p.package_code)}</div>
          <div style="font-size:11px;color:var(--muted)">${(p.weight||0).toFixed(0)} ק"ג${p.diameter?' | ⌀'+escHtml(p.diameter):''}${p.zone?' | אזור '+escHtml(p.zone):''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:${col}">${escHtml(label)}</span>
          <button class="btn-sm" onclick="printQR(${jsAttr(p.package_code)},${jsAttr(p.order_num)},${Number(p.weight)||0},${Number(p.diameter)||0})">🖨️ QR</button>
        </div>
      </div>`;
    }).join('');
    pkgSec = `<div class="d-section"><div class="d-title">🏷️ חבילות</div>${pkgRows}</div>`;
  }

  return hero + prints + info + statusSec + itemsSec + pkgSec;
}

function closeDetail(e) { if (e.target===document.getElementById('detailOverlay')) closeDetailPanel(); }
function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('show');
  history.replaceState(null, '', '/orders.html');
}

async function setStatusAndClose(id, status) {
  const ok = await setStatus(id, status);
  if (ok) closeDetailPanel();
}

function sourceOriginalHtml(row) {
  if (!row) return '<div class="note-chip">לא נמצא מקור קליטה להזמנה הזאת.</div>';
  if (row.original_data_url) {
    const mime = String(row.original_mime || '');
    if (mime.includes('pdf')) {
      return `<iframe src="${escHtml(row.original_data_url)}" title="מקור הזמנה"></iframe>`;
    }
    return `<img src="${escHtml(row.original_data_url)}" alt="מקור הזמנה">`;
  }
  return `<pre class="raw-content">${escHtml(row.raw_content || 'אין מקור שמור')}</pre>`;
}

function parsedItemsHtml(parsed, options = {}) {
  const items = Array.isArray(parsed?.items) ? parsed.items : [];
  ocrAddItems = options.canAdd ? items : [];
  if (!items.length) return '<div class="note-chip">לא נשמרו פריטים בפענוח המקורי.</div>';
  const actionHead = options.canAdd ? '<th></th>' : '';
  return `<table>
    <thead><tr><th>#</th><th>קוטר</th><th>כמות</th><th>אורך</th><th>צורה / צלעות</th><th>הערה</th>${actionHead}</tr></thead>
    <tbody>${items.map((item, index) => {
      const sides = Array.isArray(item.sides)
        ? item.sides
        : Array.isArray(item.segments)
          ? item.segments.map(seg => typeof seg === 'object' ? (seg.length_mm || seg.length || '') : seg)
          : [];
      return `<tr>
        <td>${index + 1}</td>
        <td>${escHtml(item.diameter ?? item.diameter_mm ?? '-')}</td>
        <td>${escHtml(item.qty ?? item.quantity ?? '-')}</td>
        <td>${escHtml(item.length ?? item.length_mm ?? item.total_length_mm ?? '-')}</td>
        <td>${escHtml(item.shape_name || item.shapeName || item.shape || '')}<br><span class="detail-customer">${escHtml(sides.join(' / '))}</span></td>
        <td>${escHtml(item.note || item.notes || '')}</td>
        ${options.canAdd ? `<td><button class="review-btn primary" onclick="addParsedItemToOrder(event, ${index})">הוסף שורה</button></td>` : ''}
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

async function openOrderIntakeSource(event, orderId, mode = 'view') {
  event?.stopPropagation?.();
  const overlay = document.getElementById('sourceOverlay');
  document.getElementById('sourceTitle').textContent = 'טוען מקור קליטה...';
  document.getElementById('sourceMeta').textContent = '';
  document.getElementById('sourceOriginal').innerHTML = '<div class="note-chip">טוען...</div>';
  document.getElementById('sourceParsed').innerHTML = '';
  overlay.classList.add('show');
  try {
    const response = await fetch(`/api/orders/${orderId}/intake-source`);
    const row = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(row.error || 'לא נמצא מקור קליטה להזמנה');
    document.getElementById('sourceTitle').textContent = `מקור קליטה - ${row.order_num || ''}`;
    document.getElementById('sourceMeta').textContent = `${row.customer_name || ''} · ${row.source || ''} · ${row.created_at || ''}`;
    document.getElementById('sourceOriginal').innerHTML = sourceOriginalHtml(row);
    const canAdd = mode === 'add';
    const parsedTitle = canAdd ? 'בחר שורה מה־OCR להוספה להזמנה' : 'פענוח שנשמר לפני יצירת ההזמנה';
    document.getElementById('sourceParsed').innerHTML = `<div class="d-title">${parsedTitle}</div>${parsedItemsHtml(row.parsed || {}, { canAdd, orderId })}`;
  } catch (error) {
    document.getElementById('sourceTitle').textContent = '\u05de\u05e7\u05d5\u05e8 \u05e7\u05dc\u05d9\u05d8\u05d4 \u05dc\u05d0 \u05e0\u05de\u05e6\u05d0';
    document.getElementById('sourceMeta').textContent = '';
    document.getElementById('sourceOriginal').innerHTML = `<div class="note-chip">${escHtml(error.message)}</div>`;
    document.getElementById('sourceParsed').innerHTML = mode === 'add'
      ? `<div class="d-title">\u05d0\u05d9\u05df OCR \u05e9\u05de\u05d5\u05e8 \u05dc\u05d4\u05d6\u05de\u05e0\u05d4 \u05d4\u05d6\u05d5</div>
        <div class="note-chip">\u05d0\u05e4\u05e9\u05e8 \u05dc\u05d4\u05d5\u05e1\u05d9\u05e3 \u05d9\u05d3\u05e0\u05d9\u05ea \u05d3\u05e8\u05da \u05e2\u05d5\u05e8\u05da \u05e6\u05d5\u05e8\u05d5\u05ea \u05d4\u05d1\u05e8\u05d6\u05dc \u05d4\u05e7\u05d9\u05d9\u05dd.</div>
        <div class="review-actions" style="margin-top:10px">
          <button class="review-btn" onclick="closeSourcePanel(); openAddItem(event, ${Number(orderId) || 0})">\u05d7\u05d6\u05d5\u05e8 \u05dc\u05d1\u05d7\u05d9\u05e8\u05d4</button>
          <button class="review-btn primary" onclick="closeSourcePanel(); openOrderShapeEditorForAdd(event, ${Number(orderId) || 0})">\u05d4\u05d5\u05e1\u05e3 \u05e6\u05d5\u05e8\u05d4 \u05d9\u05d3\u05e0\u05d9\u05ea</button>
        </div>`
      : '<div class="note-chip">\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0 \u05de\u05e7\u05d5\u05e8 OCR \u05e9\u05de\u05d5\u05e8 \u05dc\u05d4\u05d6\u05de\u05e0\u05d4 \u05d4\u05d6\u05d5.</div>';
  }
}

function closeSourceOverlay(event) {
  if (event.target === document.getElementById('sourceOverlay')) closeSourcePanel();
}

function closeSourcePanel() {
  document.getElementById('sourceOverlay').classList.remove('show');
}

function findDetailItem(orderId, itemId) {
  const order = currentDetailOrder && Number(currentDetailOrder.id) === Number(orderId) ? currentDetailOrder : null;
  if (!order) return null;
  for (const pallet of order.pallets || []) {
    const found = (pallet.items || []).find(item => Number(item.id) === Number(itemId));
    if (found) return found;
  }
  return null;
}


function closeAddChoiceOverlay(event) {
  if (event.target === document.getElementById('addChoiceOverlay')) closeAddChoicePanel();
}

function closeAddChoicePanel() {
  document.getElementById('addChoiceOverlay').classList.remove('show');
}

function openAddItem(event, orderId) {
  event?.stopPropagation?.();
  addChoiceOrderId = orderId;
  document.getElementById('addChoiceMeta').textContent = currentDetailOrder?.order_num ? `הזמנה ${currentDetailOrder.order_num}` : `הזמנה ${orderId}`;

}

function openAddFromOcr(event) {

function openAddManualItem(event) {

  closeAddChoicePanel();
  openOrderShapeEditorForAdd(event, orderId);
}

function ensureOrderShapeEditor() {
  if (orderShapeEditor) return orderShapeEditor;
  if (typeof ShapeEditorModal === 'undefined') {
    alert('\u05e2\u05d5\u05e8\u05da \u05d4\u05e6\u05d5\u05e8\u05d5\u05ea \u05dc\u05d0 \u05e0\u05d8\u05e2\u05df. \u05e8\u05e2\u05e0\u05df \u05d0\u05ea \u05d4\u05de\u05e1\u05da \u05d5\u05e0\u05e1\u05d4 \u05e9\u05d5\u05d1.');
    return null;
  }
  orderShapeEditor = new ShapeEditorModal(shapeSelectedFromOrder);
  return orderShapeEditor;
}

function orderShapeSegmentsFromEditor(data) {
  const sides = Array.isArray(data?.sides) ? data.sides : [];
  const angles = Array.isArray(data?.angles) ? data.angles : [];
  return sides
    .map((side, index) => ({
      length_mm: Number(side) || 0,
      angle_deg: Number(angles[index] ?? (index < sides.length - 1 ? 180 : 0)) || 0,
    }))
    .filter(segment => Number.isFinite(segment.length_mm) && segment.length_mm > 0);
}

function orderShapeDataFromItem(item) {
  const segments = rawItemSegments(item);
  return {
    sides: segments.length ? segments.map(segment => Math.round(segment.length_mm)) : [1000],
    angles: segments.length ? segments.slice(0, -1).map(segment => Number(segment.angle_deg ?? 180) || 180) : [],
    shapeName: item?.shape_name || '\u05d9\u05e9\u05e8',
    presetName: item?.shape_name || '\u05d9\u05e9\u05e8',
    diameter: Number(item?.diameter) || 12,
    is3d: item?.is_3d ? 1 : 0,
  };
}

function openOrderShapeEditorForAdd(event, orderId) {
  event?.stopPropagation?.();
  const editor = ensureOrderShapeEditor();
  if (!editor || !orderId) return;
  const quantityText = prompt('\u05db\u05de\u05d5\u05ea \u05dc\u05e4\u05e8\u05d9\u05d8 \u05d4\u05d7\u05d3\u05e9', '1');
  if (quantityText === null) return;
  const quantity = Number(quantityText);
  if (!Number.isFinite(quantity) || quantity <= 0) {
    alert('\u05db\u05de\u05d5\u05ea \u05dc\u05d0 \u05ea\u05e7\u05d9\u05e0\u05d4');
    return;
  }
  pendingShapeEdit = { mode: 'add', orderId: Number(orderId), itemId: null, quantity, note: '\u05e0\u05d5\u05e1\u05e3 \u05d9\u05d3\u05e0\u05d9\u05ea \u05d1\u05e2\u05d5\u05e8\u05da \u05d4\u05e6\u05d5\u05e8\u05d5\u05ea' };
  editor.open({ sides: [1000], angles: [], shapeName: '\u05d9\u05e9\u05e8', presetName: '\u05d9\u05e9\u05e8', diameter: 12, is3d: 0 });
}

async function shapeSelectedFromOrder(data) {
  if (!pendingShapeEdit) return;
  const ctx = pendingShapeEdit;
  pendingShapeEdit = null;
  const segments = orderShapeSegmentsFromEditor(data);
  const totalLength = segments.reduce((sum, segment) => sum + Number(segment.length_mm || 0), 0);
  const payload = {
    shape_name: String(data?.shapeName || data?.presetName || '\u05d9\u05e9\u05e8').trim(),
    diameter: Number(data?.diameter) || 12,
    quantity: Number(ctx.quantity) || 1,
    total_length_mm: totalLength,
    spiral_diameter_mm: null,
    spiral_turns: null,
    segments,
    note: ctx.note || '',
  };
  const isNewItem = ctx.mode === 'add';
  const url = isNewItem ? `/api/orders/${ctx.orderId}/items` : `/api/orders/${ctx.orderId}/items/${ctx.itemId}`;
  const response = await fetch(url, {
    method: isNewItem ? 'POST' : 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok) {
    alert(result.error || (isNewItem ? '\u05d4\u05d5\u05e1\u05e4\u05ea \u05d4\u05e6\u05d5\u05e8\u05d4 \u05dc\u05d4\u05d6\u05de\u05e0\u05d4 \u05e0\u05db\u05e9\u05dc\u05d4' : '\u05e9\u05de\u05d9\u05e8\u05ea \u05d4\u05e6\u05d5\u05e8\u05d4 \u05e0\u05db\u05e9\u05dc\u05d4'));
    return;
  }
  await openDetail(ctx.orderId);
}

function openItemEdit(event, orderId, itemId) {
  event?.stopPropagation?.();
  const item = findDetailItem(orderId, itemId);
  if (!item) {
    alert('\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0 \u05d4\u05e4\u05e8\u05d9\u05d8 \u05dc\u05e2\u05e8\u05d9\u05db\u05d4. \u05e1\u05d2\u05d5\u05e8 \u05d5\u05e4\u05ea\u05d7 \u05d0\u05ea \u05d4\u05d4\u05d6\u05de\u05e0\u05d4 \u05de\u05d7\u05d3\u05e9.');
    return;
  }
  if (isRealSpiralItem(item)) {
    alert('\u05e1\u05e4\u05d9\u05e8\u05dc\u05d4 \u05e2\u05d3\u05d9\u05d9\u05df \u05e0\u05e2\u05e8\u05db\u05ea \u05d3\u05e8\u05da \u05e0\u05ea\u05d5\u05e0\u05d9 \u05d4\u05e4\u05e8\u05d9\u05d8 \u05d4\u05e9\u05de\u05d5\u05e8\u05d9\u05dd, \u05dc\u05d0 \u05d3\u05e8\u05da \u05e2\u05d5\u05e8\u05da \u05d4\u05e6\u05d5\u05e8\u05d5\u05ea.');
    return;
  }
  const editor = ensureOrderShapeEditor();
  if (!editor) return;
  pendingShapeEdit = {
    mode: 'edit',
    orderId: Number(orderId),
    itemId: Number(itemId),
    quantity: Number(item.quantity) || 1,
    note: item.note || '',
  };
  editor.open(orderShapeDataFromItem(item));
}

function parsedOcrSegments(item) {
  if (Array.isArray(item?.segments) && item.segments.length) {
    return item.segments.map(segment => ({
      length_mm: Number(segment?.length_mm ?? segment?.length ?? segment) || 0,
      angle_deg: Number(segment?.angle_deg ?? segment?.angle ?? 180) || 180,
    }));
  }
  if (Array.isArray(item?.sides) && item.sides.length) {
    const angles = Array.isArray(item?.angles) ? item.angles : [];
    return item.sides.map((side, index) => ({
      length_mm: Number(side) || 0,
      angle_deg: Number(angles[index] ?? 180) || 180,
    }));
  }
  const length = Number(item?.length_mm ?? item?.length ?? item?.total_length_mm) || 0;
  return length ? [{ length_mm: length, angle_deg: 180 }] : [];
}

function parsedOcrItemPayload(item) {
  const segments = parsedOcrSegments(item);
  const totalLength = Number(item?.total_length_mm ?? item?.length_mm ?? item?.length) || segments.reduce((sum, segment) => sum + Number(segment.length_mm || 0), 0);
  return {
    shape_name: String(item?.shape_name || item?.shapeName || item?.shape || 'ישר').trim(),
    diameter: Number(item?.diameter ?? item?.diameter_mm) || 12,
    quantity: Number(item?.quantity ?? item?.qty) || 1,
    total_length_mm: totalLength,
    spiral_diameter_mm: item?.spiral_diameter_mm ? Number(item.spiral_diameter_mm) : null,
    spiral_turns: item?.spiral_turns ? Number(item.spiral_turns) : null,
    segments,
    note: item?.note || item?.notes || 'נוסף מ־OCR להזמנה קיימת',
  };
}

async function addParsedItemToOrder(event, index) {
  event?.stopPropagation?.();
  const orderId = addChoiceOrderId || currentDetailOrder?.id;
  const item = ocrAddItems[index];
  if (!orderId || !item) return;
  const response = await fetch(`/api/orders/${orderId}/items`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(parsedOcrItemPayload(item)),
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok) {
    alert(result.error || 'הוספת שורת OCR נכשלה');
    return;
  }
  closeSourcePanel();
  await openDetail(orderId);
}

async function deleteOrderItem(event, orderId, itemId) {
  event?.stopPropagation?.();
  if (!confirm('\u05dc\u05de\u05d7\u05d5\u05e7 \u05d0\u05ea \u05d4\u05e4\u05e8\u05d9\u05d8 \u05d4\u05d6\u05d4 \u05de\u05d4\u05d4\u05d6\u05de\u05e0\u05d4?')) return;
  const response = await fetch(`/api/orders/${orderId}/items/${itemId}`, { method: 'DELETE' });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result.success) {
    alert(result.error || '\u05de\u05d7\u05d9\u05e7\u05ea \u05d4\u05e4\u05e8\u05d9\u05d8 \u05e0\u05db\u05e9\u05dc\u05d4');
    return;
  }
  await openDetail(orderId);
}
async function approveItemReview(event, orderId, itemId) {
  event?.stopPropagation?.();
  const response = await fetch(`/api/orders/${orderId}/items/${itemId}/review`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'approved' }),
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result.success) {
    alert(result.error || 'אישור ההערה נכשל');
    return;
  }
  await openDetail(orderId);
}

function printQR(code, orderNum, weight, diameter) {
  const w = window.open('', '_blank', 'width=400,height=350');
  const safeCode = escHtml(code);
  const safeOrderNum = escHtml(orderNum);
  const qrPayload = JSON.stringify(String(code ?? ''));
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">
  <title>QR - ${safeCode}</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"><\/script>
  <style>body{font-family:'Heebo',sans-serif;text-align:center;padding:20px}
  h2{font-size:18px;margin:0 0 4px}p{font-size:12px;color:#526070;margin:2px 0}
  canvas{margin:12px auto;display:block}@media print{button{display:none}}</style>
  </head><body>
  <h2>📦 ${safeCode}</h2><p>הזמנה: ${safeOrderNum}</p>
  <p>${weight.toFixed(0)} ק"ג${diameter?' | ⌀'+diameter:''}</p>
  <canvas id="qrCanvas"></canvas><br>
  <button onclick="window.print()">🖨️ הדפס</button>
  <script>QRCode.toCanvas(document.getElementById('qrCanvas'),${qrPayload},{width:200,margin:1},function(){});<\/script>
  </body></html>`);
  w.document.close();
}

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>הזמנות – IronBend</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e07b39">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronBend">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --steel:#0f1923;--steel-mid:#1a2637;--steel-light:#243447;
    --accent:#e07b39;--accent-light:#f0954d;
    --success:#27ae60;--danger:#e74c3c;--warning:#f39c12;
    --text:#e8edf3;--text-dim:#7a93ab;
    --border:rgba(255,255,255,0.07);--card:rgba(255,255,255,0.04);
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Heebo',sans-serif;background:var(--steel);color:var(--text);min-height:100vh;}

  .topnav{background:var(--steel-mid);border-bottom:1px solid var(--border);padding:0 20px;height:56px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
    box-shadow:0 2px 16px rgba(0,0,0,0.4);}
  .logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-light));
    border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .top-nav-links{display:flex;gap:2px;}
  .nav-link{padding:7px 13px;border-radius:7px;text-decoration:none;color:var(--text-dim);font-size:13px;font-weight:600;transition:all 0.2s;white-space:nowrap;}
  .nav-link:hover{background:rgba(255,255,255,0.06);color:var(--text);}
  .nav-link.active{background:rgba(224,123,57,0.15);color:var(--accent);}
  .ws-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;flex-shrink:0;}
  .ws-dot.connected{background:var(--success);}

  .page{max-width:1280px;margin:0 auto;padding:16px;}

  /* FILTERS */
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .filter-btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);
    color:var(--text-dim);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;
    transition:all 0.2s;min-height:42px;-webkit-tap-highlight-color:transparent;}
  .filter-btn.active{background:rgba(224,123,57,0.15);border-color:var(--accent);color:var(--accent);}
  .search-box{flex:1;min-width:160px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);
    background:rgba(255,255,255,0.05);color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;
    direction:rtl;min-height:42px;}
  .search-box:focus{outline:none;border-color:var(--accent);}
  .new-order-btn{padding:9px 18px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-light));
    border:none;color:white;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;text-decoration:none;min-height:42px;display:flex;align-items:center;white-space:nowrap;}

  /* ORDERS LIST (desktop table / mobile cards) */
  .orders-table-wrap{background:var(--steel-mid);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .table-inner{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;min-width:600px;}
  th{text-align:right;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;
    letter-spacing:0.5px;padding:11px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
  td{padding:13px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.025);cursor:pointer;}
  .order-num{color:var(--accent);font-weight:800;}
  .weight-tag{color:var(--accent);font-weight:700;}
  .status-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .s-wait    {background:rgba(122,147,171,0.15);color:var(--text-dim);}
  .s-prod    {background:rgba(224,123,57,0.2);color:var(--accent);}
  .s-done    {background:rgba(39,174,96,0.15);color:var(--success);}
  .s-approved{background:rgba(46,134,222,0.2);color:#5dade2;}
  .actions{display:flex;gap:6px;}
  .btn-sm{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);
    color:var(--text-dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
    cursor:pointer;transition:all 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm.success:hover{border-color:var(--success);color:var(--success);}

  /* ORDER DETAIL PANEL */
  .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;
    display:flex;align-items:flex-start;justify-content:flex-start;
    opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(4px);}
  .detail-overlay.show{opacity:1;pointer-events:all;}
  .detail-panel{width:600px;max-width:100vw;height:100vh;overflow-y:auto;
    background:var(--steel-mid);border-left:1px solid var(--border);
    transform:translateX(-30px);transition:transform 0.25s;box-shadow:4px 0 40px rgba(0,0,0,0.5);}
  .detail-overlay.show .detail-panel{transform:translateX(0);}
  .detail-header{padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;
    background:var(--steel-mid);z-index:10;display:flex;align-items:center;justify-content:space-between;}
  .detail-order-num{font-size:20px;font-weight:900;color:var(--accent);}
  .detail-close{width:40px;height:40px;background:var(--card);border:1px solid var(--border);
    border-radius:8px;color:var(--text);cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .detail-body{padding:18px;display:flex;flex-direction:column;gap:16px;}
  .detail-section{background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;}
  .detail-section-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .info-label{font-size:10px;color:var(--text-dim);margin-bottom:2px;}
  .info-value{font-size:13px;font-weight:600;}
  .status-actions{display:flex;gap:7px;flex-wrap:wrap;}
  .status-btn{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);
    color:var(--text-dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
    cursor:pointer;transition:all 0.2s;min-height:42px;}
  .status-btn:hover{border-color:var(--accent);color:var(--accent);}
  .item-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;font-size:13px;flex-wrap:wrap;}
  .item-status{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .is-wait{background:rgba(122,147,171,0.15);color:var(--text-dim);}
  .is-prod{background:rgba(224,123,57,0.2);color:var(--accent);}
  .is-done{background:rgba(39,174,96,0.15);color:var(--success);}
  .prog-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:4px;}
  .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s;}

  /* MOBILE */
  @media(max-width:640px){
    .page{padding:10px;}
    /* Table → cards */
    .table-inner table,.table-inner thead,.table-inner tbody,
    .table-inner th,.table-inner td,.table-inner tr{display:block;min-width:unset;}
    .table-inner thead{display:none;}
    .table-inner tr{background:rgba(255,255,255,0.03);border:1px solid var(--border);
      border-radius:10px;margin:8px 0;padding:14px;cursor:pointer;}
    .table-inner td{padding:4px 0;border:none;display:flex;justify-content:space-between;align-items:center;}
    .table-inner td::before{content:attr(data-label);color:var(--text-dim);font-size:11px;font-weight:700;text-transform:uppercase;margin-left:8px;flex-shrink:0;}
    .table-inner td:has(.actions){justify-content:flex-end;}
    .table-inner td:has(.actions)::before{display:none;}
    /* Detail panel full width on mobile */
    .detail-panel{width:100vw;border-left:none;}
    .info-grid{grid-template-columns:1fr;}
    .filters{gap:6px;}
    .filter-btn{padding:8px 12px;font-size:12px;}
  }
</style>
</head>
<body data-page="orders">
<script src="/nav.js"></script>

<nav class="topnav">
  <div class="logo"><div class="logo-icon">🔩</div><span>IronBend</span></div>
  <div class="top-nav-links">
    <a href="/dashboard.html" class="nav-link">📊 דשבורד</a>
    <a href="/orders.html"    class="nav-link active">📋 הזמנות</a>
    <a href="/index.html"     class="nav-link">➕ חדשה</a>
    <a href="/machine.html"   class="nav-link">🔧 מכונה</a>
  </div>
  <span class="ws-dot" id="wsDot"></span>
</nav>

<div class="page">
  <div class="filters">
    <button class="filter-btn active" data-status="">הכל</button>
    <button class="filter-btn" data-status="ממתינה לאישור">ממתינות</button>
    <button class="filter-btn" data-status="אושרה">אושרו</button>
    <button class="filter-btn" data-status="בייצור">בייצור</button>
    <button class="filter-btn" data-status="הושלם – ממתין לאיסוף">הושלמו</button>
    <input class="search-box" id="searchBox" placeholder="🔍 חיפוש..." oninput="applyFilter()">
    <a href="/index.html" class="new-order-btn">➕ חדשה</a>
  </div>

  <div class="orders-table-wrap">
    <div class="table-inner">
      <table>
        <thead>
          <tr>
            <th>מספר</th><th>לקוח</th><th>אספקה</th><th>עדיפות</th><th>משקל</th><th>סטטוס</th><th>נוצרה</th><th></th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="8" style="text-align:center;padding:48px;color:var(--text-dim)">טוען...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <div class="detail-order-num" id="detailOrderNum">—</div>
        <div id="detailCustomer" style="font-size:13px;color:var(--text-dim);margin-top:3px"></div>
      </div>
      <button class="detail-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
let allOrders = [], activeStatus = '', ws;

function connectWS() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onopen  = () => document.getElementById('wsDot').classList.add('connected');
  ws.onclose = () => { document.getElementById('wsDot').classList.remove('connected'); setTimeout(connectWS,3000); };
  ws.onmessage = e => {
    const { type } = JSON.parse(e.data);
    if (['new_order','order_status','order_complete'].includes(type)) fetchOrders();
  };
}

async function fetchOrders() {
  try {
    const url = '/api/orders' + (activeStatus ? '?status=' + encodeURIComponent(activeStatus) : '');
    const r = await fetch(url);
    allOrders = await r.json();
  } catch {
    // offline – use cached
  }
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = allOrders;
  if (q) list = list.filter(o =>
    o.order_num?.toLowerCase().includes(q) ||
    o.customer_name?.toLowerCase().includes(q) ||
    o.delivery_address?.toLowerCase().includes(q)
  );
  renderTable(list);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    fetchOrders();
  });
});

function sBadgeClass(s) {
  if (s?.includes('הושלם')) return 's-done';
  if (s === 'בייצור') return 's-prod';
  if (s === 'אושרה')  return 's-approved';
  return 's-wait';
}

function renderTable(orders) {
  if (!orders.length) {
    document.getElementById('ordersBody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-dim)">אין הזמנות</td></tr>';
    return;
  }
  document.getElementById('ordersBody').innerHTML = orders.map(o => `
    <tr onclick="openDetail(${o.id})">
      <td data-label="מספר"><span class="order-num">${o.order_num}</span></td>
      <td data-label="לקוח">${o.customer_name??'—'}</td>
      <td data-label="אספקה">${o.delivery_date??'—'}</td>
      <td data-label="עדיפות">${o.priority==='דחוף'?'<span style="color:var(--danger);font-weight:700">⚡ דחוף</span>':'רגיל'}</td>
      <td data-label="משקל" class="weight-tag">${(o.total_weight||0).toFixed(0)} ק"ג</td>
      <td data-label="סטטוס"><span class="status-badge ${sBadgeClass(o.status)}">${o.status}</span></td>
      <td data-label="נוצרה" style="color:var(--text-dim);font-size:12px">${new Date(o.created_at).toLocaleDateString('he-IL')}</td>
      <td onclick="event.stopPropagation()">
        <div class="actions">
          ${o.status==='ממתינה לאישור'?`<button class="btn-sm success" onclick="setStatus(${o.id},'אושרה')">אשר</button>`:''}
          ${o.status==='אושרה'?`<button class="btn-sm" onclick="setStatus(${o.id},'בייצור')">ייצור</button>`:''}
        </div>
      </td>
    </tr>`).join('');
}

async function setStatus(id, status) {
  await fetch(`/api/orders/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
  fetchOrders();
}

async function openDetail(id) {
  const r = await fetch(`/api/orders/${id}`);
  const o = await r.json();
  document.getElementById('detailOrderNum').textContent = o.order_num;
  document.getElementById('detailCustomer').textContent = o.customer_name ?? '';
  document.getElementById('detailBody').innerHTML = buildDetailHTML(o);
  document.getElementById('detailOverlay').classList.add('show');
  history.replaceState(null,'',`?id=${id}`);
}

function buildDetailHTML(o) {
  const info = `<div class="detail-section">
    <div class="detail-section-title">פרטי הזמנה</div>
    <div class="info-grid">
      <div><div class="info-label">לקוח</div><div class="info-value">${o.customer_name??'—'}</div></div>
      <div><div class="info-label">ערוץ</div><div class="info-value">${o.channel??'—'}</div></div>
      <div><div class="info-label">תאריך אספקה</div><div class="info-value">${o.delivery_date??'—'}</div></div>
      <div><div class="info-label">משקל כולל</div><div class="info-value" style="color:var(--accent)">${(o.total_weight||0).toFixed(1)} ק"ג</div></div>
      <div style="grid-column:span 2"><div class="info-label">כתובת</div><div class="info-value">${o.delivery_address??'—'}</div></div>
      ${o.driver_notes?`<div style="grid-column:span 2"><div class="info-label">הערות לנהג</div><div class="info-value">${o.driver_notes}</div></div>`:''}
    </div>
  </div>`;

  const statusHtml = `<div class="detail-section">
    <div class="detail-section-title">עדכון סטטוס</div>
    <div class="status-actions">
      ${['ממתינה לאישור','אושרה','בייצור','הושלם – ממתין לאיסוף','נמסרה'].map(s =>
        `<button class="status-btn" onclick="setStatus(${o.id},'${s}');closeDetailPanel()"
          style="${o.status===s?'border-color:var(--accent);color:var(--accent)':''}">${s}</button>`
      ).join('')}
    </div>
  </div>`;

  const palletsHtml = (o.pallets||[]).map((p,pi) => {
    const totalW = (p.items||[]).reduce((s,i)=>s+(i.weight*(i.quantity||1)),0);
    const done   = (p.items||[]).filter(i=>i.status==='הושלם').length;
    const pct    = p.items?.length ? Math.round(done/p.items.length*100) : 0;
    const items  = (p.items||[]).map(item => {
      const ic = item.status==='הושלם'?'is-done':item.status==='בייצור'?'is-prod':'is-wait';
      const produced = item.produced_qty||0; const qty = item.quantity||0;
      return `<div class="item-row">
        <div style="flex:1">
          <div><strong>⌀${item.diameter}</strong> × ${item.length}מ"מ × ${qty}יח'
            ${item.shape_name?` <span style="color:var(--text-dim);font-size:12px">${item.shape_name}</span>`:''}
          </div>
          <div style="font-size:11px;color:var(--text-dim)">${(item.weight*qty).toFixed(1)} ק"ג${item.note?' | '+item.note:''}</div>
          ${item.status==='בייצור'&&qty>0?`<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,produced/qty*100).toFixed(0)}%"></div></div><div style="font-size:11px;color:var(--text-dim)">${produced}/${qty}</div>`:''}
        </div>
        <span class="item-status ${ic}">${item.status}</span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:14px">
      <div style="font-weight:700;font-size:12px;color:var(--text-dim);margin-bottom:6px">📦 משטח ${pi+1} — ${totalW.toFixed(0)} ק"ג | ${pct}%</div>
      <div class="prog-bar" style="margin-bottom:8px"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${items||'<div style="color:var(--text-dim);font-size:12px">אין פריטים</div>'}
    </div>`;
  }).join('');

  return info + statusHtml + `<div class="detail-section"><div class="detail-section-title">פריטים</div>${palletsHtml}</div>`;
}

function closeDetail(e) { if (e.target===document.getElementById('detailOverlay')) closeDetailPanel(); }
function closeDetailPanel() { document.getElementById('detailOverlay').classList.remove('show'); history.replaceState(null,'','/orders.html'); }

const urlId = new URLSearchParams(location.search).get('id');
if (urlId) openDetail(urlId);

connectWS();
fetchOrders();
setInterval(fetchOrders, 20000);
</script>
</body>
</html>

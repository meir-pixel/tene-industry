<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>הזמנות – IronBend</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e07b39">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/status-contracts-client.js"></script>
<script src="/safe-dom.js" defer></script>
<script src="/nav.js" defer></script>
<script src="/shape-renderer.js" defer></script>
<style>
:root{
  --accent:#c9621a; --accent-light:#e07b39;
  --success:#1a7a42; --danger:#b83227; --warning:#a86b00; --info:#1560a8;
  --text:#1a2533; --dim:#526070; --muted:#8fa0b0;
  --bg:#f0f4f8; --card:#ffffff; --border:rgba(0,0,0,0.09);
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);}

.page{max-width:1280px;margin:0 auto;padding:14px 14px 32px;}

/* ── WS indicator ── */
.ws-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ws-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600;}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0;transition:background .3s;}
.ws-dot.connected{background:var(--success);}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;align-items:center;margin-bottom:12px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  color:var(--dim);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;
  white-space:nowrap;flex-shrink:0;min-height:40px;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.filter-btn.active{background:rgba(224,123,57,0.12);border-color:var(--accent);color:var(--accent);}
.search-wrap{flex:1;min-width:140px;position:relative;}
.search-box{width:100%;padding:8px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;
  direction:rtl;min-height:40px;}
.search-box:focus{outline:none;border-color:var(--accent);}
.new-order-btn{padding:8px 16px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  border:none;color:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;text-decoration:none;min-height:40px;display:inline-flex;
  align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}

/* ── TABLE WRAP ── */
.orders-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:680px;}
th{text-align:right;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.02);white-space:nowrap;}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(0,0,0,0.03);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,0,0,0.015);cursor:pointer;}
.order-num{color:var(--accent);font-weight:800;font-size:14px;}
.weight-tag{color:var(--accent);font-weight:700;}

/* ── STATUS BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.s-wait    {background:rgba(122,147,171,0.15);color:var(--dim);}
.s-prod    {background:rgba(224,123,57,0.18);color:var(--accent);}
.s-done    {background:rgba(26,122,66,0.15);color:var(--success);}
.s-approved{background:rgba(21,96,168,0.15);color:var(--info);}

/* ── ROW ACTIONS ── */
.actions{display:flex;gap:5px;flex-wrap:nowrap;}
.btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(0,0,0,0.02);
  color:var(--dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;
  display:inline-flex;align-items:center;-webkit-tap-highlight-color:transparent;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.success:hover{border-color:var(--success);color:var(--success);}

/* ── MOBILE CARDS ── */
@media(max-width:640px){
  .page{padding:10px 10px 28px;}
  /* hide table, show cards */
  .table-scroll{display:none;}
  .mobile-cards{display:block;}

  .m-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
    margin-bottom:8px;padding:14px;cursor:pointer;transition:box-shadow .15s;}
  .m-card:active{box-shadow:0 0 0 2px var(--accent);}
  .m-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .m-card-num{font-size:15px;font-weight:800;color:var(--accent);}
  .m-card-customer{font-size:14px;font-weight:700;color:var(--text);margin-top:2px;}
  .m-card-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-bottom:8px;}
  .m-card-meta span{display:flex;align-items:center;gap:3px;}
  .m-card-actions{display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
  .m-card-actions .btn-sm{font-size:12px;padding:6px 12px;}

  /* filters horizontal scroll */
  .filters{flex-wrap:nowrap;}
  .search-wrap{min-width:120px;}
}
@media(min-width:641px){
  .mobile-cards{display:none;}
}

/* ── DETAIL PANEL ── */
.detail-overlay{position:fixed;inset:56px 0 0;background:rgba(2,26,72,0.34);z-index:500;
  display:flex;align-items:flex-start;justify-content:center;padding:22px;
  opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(5px);}
.detail-overlay.show{opacity:1;pointer-events:all;}
.detail-panel{width:min(1040px,calc(100vw - 44px));max-height:calc(100vh - 104px);overflow-y:auto;
  background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);border:1px solid rgba(2,26,72,0.12);
  border-radius:22px;transform:translateY(12px) scale(.985);transition:transform .18s;
  box-shadow:0 24px 80px rgba(2,26,72,0.26);}
.detail-overlay.show .detail-panel{transform:translateY(0) scale(1);}
.detail-header{padding:18px 22px;border-bottom:1px solid rgba(2,26,72,0.10);position:sticky;top:0;
  background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);z-index:10;
  display:flex;align-items:center;justify-content:space-between;gap:12px;}
.detail-order-num{font-size:24px;font-weight:900;color:var(--accent);line-height:1;}
.detail-customer{font-size:13px;color:var(--dim);margin-top:2px;}
.detail-close{width:38px;height:38px;background:rgba(0,0,0,0.04);border:1px solid var(--border);
  border-radius:8px;color:var(--text);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-body{padding:18px 22px 24px;display:flex;flex-direction:column;gap:14px;}
.detail-hero{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;align-items:stretch;}
.hero-card{background:#fff;border:1px solid rgba(2,26,72,0.10);border-radius:18px;padding:18px;
  box-shadow:0 8px 28px rgba(2,26,72,0.07);}
.hero-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px;}
.hero-main{font-size:22px;font-weight:900;color:var(--text);line-height:1.25;}
.hero-metric{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;}
.metric-box{background:#f4f7fb;border-radius:12px;padding:10px 12px;}
.metric-label{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px;}
.metric-value{font-size:15px;font-weight:900;color:var(--text);}
.d-section{background:#fff;border:1px solid rgba(2,26,72,0.09);border-radius:16px;padding:16px;
  box-shadow:0 6px 20px rgba(2,26,72,0.05);}
.d-title{font-size:12px;font-weight:900;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.info-label{font-size:10px;font-weight:700;color:var(--dim);margin-bottom:3px;}
.info-value{font-size:14px;font-weight:700;}
.status-actions{display:flex;gap:6px;flex-wrap:wrap;}
.status-btn{padding:8px 13px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.02);
  color:var(--dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;min-height:40px;-webkit-tap-highlight-color:transparent;}
.status-btn:hover,.status-btn.cur{border-color:var(--accent);color:var(--accent);background:rgba(224,123,57,0.08);}
.item-row{display:grid;grid-template-columns:230px 1fr auto;gap:14px;padding:14px;border:1px solid rgba(2,26,72,0.08);border-radius:14px;
  margin-bottom:10px;background:#fbfcfe;align-items:stretch;}
.item-row:last-child{border-bottom:none;}
.item-visual{background:#fff;border:1px solid rgba(2,26,72,0.08);border-radius:12px;min-height:126px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.item-main{display:flex;flex-direction:column;gap:8px;min-width:0;}
.item-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.item-diameter{font-size:24px;font-weight:900;color:var(--accent);line-height:1;}
.item-shape{font-size:15px;font-weight:900;color:var(--text);}
.item-kpis{display:grid;grid-template-columns:repeat(4,minmax(90px,1fr));gap:8px;}
.item-kpi{background:#f4f7fb;border-radius:10px;padding:8px 10px;}
.item-kpi-label{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:2px;}
.item-kpi-value{font-size:14px;font-weight:900;color:var(--text);}
.item-dims{display:flex;flex-wrap:wrap;gap:5px;}
.dim-chip{background:#e8f0fb;color:#1a2533;border-radius:8px;padding:4px 8px;font-size:12px;font-weight:800;}
.note-chip{background:#fff3cd;color:#8a5a00;border-radius:10px;padding:6px 9px;font-size:12px;line-height:1.45;}
.item-status{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.is-wait{background:rgba(122,147,171,0.15);color:var(--dim);}
.is-prod{background:rgba(224,123,57,0.18);color:var(--accent);}
.is-done{background:rgba(26,122,66,0.15);color:var(--success);}
.prog-bar{height:3px;background:rgba(0,0,0,0.06);border-radius:2px;margin-top:4px;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.print-btns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.print-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;
  justify-content:center;text-decoration:none;border-radius:12px;font-size:14px;font-weight:800;font-family:inherit;color:#fff;
  border:1px solid transparent;box-shadow:0 8px 22px rgba(2,26,72,0.12);transition:transform .16s ease,box-shadow .16s ease;}
.print-btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(2,26,72,0.16);}
.print-btn.cards{background:linear-gradient(135deg,#021A48,#17356f) !important;}
.print-btn.a4{background:linear-gradient(135deg,#1a7a42,#0f5a2f) !important;}
.print-btn.delivery{background:linear-gradient(135deg,#6d217d,#481652) !important;}

@media(max-width:640px){
  .detail-overlay{inset:56px 0 0;padding:0;background:rgba(2,26,72,0.24);}
  .detail-panel{width:100vw;max-height:calc(100vh - 56px);border-radius:18px 18px 0 0;border-left:none;border-right:none;border-bottom:none;}
  .detail-body{padding:14px;}
  .detail-hero{grid-template-columns:1fr;}
  .info-grid{grid-template-columns:1fr;}
  .hero-metric{grid-template-columns:1fr 1fr;}
  .item-row{grid-template-columns:1fr;}
  .item-visual{min-height:150px;}
  .item-kpis{grid-template-columns:repeat(2,1fr);}
  .print-btns{flex-direction:column;}
  .print-btns{display:flex;}
  .print-btn{justify-content:center;}
}
</style>
</head>
<body data-page="orders">

<div class="page">
  <!-- WS + title row -->
  <div class="ws-row">
    <span style="font-size:18px;font-weight:900;color:var(--text)">📋 הזמנות</span>
    <span class="ws-badge"><span class="ws-dot" id="wsDot"></span><span id="wsLabel">מתחבר...</span></span>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <span id="statusFilterButtons" style="display:contents"></span>
    <div class="search-wrap">
      <input class="search-box" id="searchBox" placeholder="🔍 חיפוש..." oninput="applyFilter()">
    </div>
    <a href="/index.html" class="new-order-btn">➕ חדשה</a>
  </div>

  <!-- DESKTOP TABLE -->
  <div class="orders-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>מספר</th><th>לקוח</th><th>אספקה</th><th>עדיפות</th>
            <th>משקל</th><th>סטטוס</th><th>נוצרה</th><th></th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="8" style="text-align:center;padding:48px;color:var(--muted)">טוען...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- MOBILE CARDS -->
    <div class="mobile-cards" id="mobileCards">
      <div style="text-align:center;padding:40px;color:var(--muted)">טוען...</div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <div class="detail-order-num" id="detailOrderNum">—</div>
        <div class="detail-customer" id="detailCustomer"></div>
      </div>
      <button class="detail-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
let allOrders = [], activeStatus = '', ws, _wsDelay = 1000;
const STATUS_CONTRACT = window.IronBendStatus || {};
const ORDER_STATUS = STATUS_CONTRACT.ORDER_STATUS || {};
const allowedOrderTransitions = STATUS_CONTRACT.allowedOrderTransitions || (() => []);
const ORDER_ACTION_LABELS = new Map([
  [ORDER_STATUS.APPROVED_WAITING_PRODUCTION, '✓ אשר'],
  [ORDER_STATUS.PRODUCTION_QUEUE, '▶ לתור'],
  [ORDER_STATUS.IN_PRODUCTION, '▶ ייצור'],
  [ORDER_STATUS.DONE_WAITING_PICKUP, '✓ הושלם'],
  [ORDER_STATUS.ON_THE_WAY, '🚚 בדרך'],
  [ORDER_STATUS.SENT, '📤 נשלחה'],
  [ORDER_STATUS.DELIVERED_CONFIRMED, '✓ סופק'],
  [ORDER_STATUS.CANCELLED, 'בטל'],
]);
const ORDER_STATUS_FILTERS = [
  { label: 'הכל', status: '' },
  { label: 'ממתינות', status: ORDER_STATUS.PENDING_APPROVAL },
  { label: 'אושרו', status: ORDER_STATUS.APPROVED_WAITING_PRODUCTION },
  { label: 'בייצור', status: ORDER_STATUS.IN_PRODUCTION },
  { label: 'הושלמו', status: ORDER_STATUS.DONE_WAITING_PICKUP },
];

function escHtml(value) {
  return window.IronBendSafe
    ? window.IronBendSafe.escapeHtml(value)
    : String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function jsArg(value) {
  return JSON.stringify(String(value ?? ''));
}

// ── WebSocket ──────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen  = () => {
    document.getElementById('wsDot').classList.add('connected');
    document.getElementById('wsLabel').textContent = 'מחובר';
    _wsDelay = 1000;
  };
  ws.onerror = () => ws.close();
  ws.onclose = () => {
    document.getElementById('wsDot').classList.remove('connected');
    document.getElementById('wsLabel').textContent = 'מתחבר...';
    _wsDelay = Math.min(_wsDelay * 2, 30000);
    setTimeout(connectWS, _wsDelay);
  };
  ws.onmessage = e => {
    const { type } = JSON.parse(e.data);
    if (['new_order','order_status','order_complete'].includes(type)) fetchOrders();
  };
}

// ── Data ───────────────────────────────────────────────────────────────
async function fetchOrders() {
  try {
    const url = '/api/orders' + (activeStatus ? '?status=' + encodeURIComponent(activeStatus) : '');
    allOrders = await (await fetch(url)).json();
  } catch {}
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  let list = allOrders;
  if (q) list = list.filter(o =>
    o.order_num?.toLowerCase().includes(q) ||
    o.customer_name?.toLowerCase().includes(q) ||
    o.delivery_address?.toLowerCase().includes(q)
  );
  renderTable(list);
  renderCards(list);
}

function renderStatusFilters() {
  const target = document.getElementById('statusFilterButtons');
  target.innerHTML = ORDER_STATUS_FILTERS.map((filter, index) =>
    `<button class="filter-btn${index === 0 ? ' active' : ''}" data-status="${filter.status}">${filter.label}</button>`
  ).join('');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = btn.dataset.status;
      fetchOrders();
    });
  });
}

// ── Badge helpers ──────────────────────────────────────────────────────
function sBadgeClass(s) {
  if (!s) return 's-wait';
  if (s.includes('הושלם') || s.includes('נמסרה') || s.includes('סופק')) return 's-done';
  if (s === 'בייצור') return 's-prod';
  if (s.includes('אושרה'))  return 's-approved';
  return 's-wait';
}
function urgentLabel(o) {
  return o.priority === 'דחוף'
    ? '<span style="color:var(--danger);font-weight:700">⚡ דחוף</span>'
    : '<span style="color:var(--muted)">רגיל</span>';
}
function actionBtns(o, stopProp = true, includePrints = true) {
  const sp = stopProp ? 'onclick="event.stopPropagation()"' : '';
  const transitions = allowedOrderTransitions(o.status).filter(status => status !== ORDER_STATUS.CANCELLED);
  const transitionButtons = transitions.map(status => {
    const label = ORDER_ACTION_LABELS.get(status) || status;
    const cls = status === ORDER_STATUS.APPROVED_WAITING_PRODUCTION ? 'btn-sm success' : 'btn-sm';
    return `<button class="${cls}" onclick="event.stopPropagation();setStatus(${o.id},${jsArg(status)})">${escHtml(label)}</button>`;
  }).join('');
  const printButtons = includePrints ? `
    <a class="btn-sm" href="/api/orders/${o.id}/print-cards" target="_blank" title="כרטיסיות">🖨️</a>
    <a class="btn-sm" href="/api/orders/${o.id}/delivery-certificate" target="_blank" title="תעודת משלוח">📋</a>
  ` : '';
  return `<div class="actions" ${sp}>
    ${transitionButtons}
    ${printButtons}
  </div>`;
}

// ── Desktop table ──────────────────────────────────────────────────────
function renderTable(orders) {
  const body = document.getElementById('ordersBody');
  if (!orders.length) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">אין הזמנות</td></tr>';
    return;
  }
  body.innerHTML = orders.map(o => `
    <tr onclick="openDetail(${o.id})">
      <td><span class="order-num">${escHtml(o.order_num)}</span></td>
      <td>${escHtml(o.customer_name ?? '—')}</td>
      <td style="white-space:nowrap">${escHtml(o.delivery_date ?? '—')}</td>
      <td>${urgentLabel(o)}</td>
      <td class="weight-tag">${(o.total_weight||0).toFixed(0)} ק"ג</td>
      <td><span class="badge ${sBadgeClass(o.status)}">${escHtml(o.status)}</span></td>
      <td style="color:var(--muted);font-size:12px">${new Date(o.created_at).toLocaleDateString('he-IL')}</td>
      <td>${actionBtns(o)}</td>
    </tr>`).join('');
}

// ── Mobile cards ───────────────────────────────────────────────────────
function renderCards(orders) {
  const wrap = document.getElementById('mobileCards');
  if (!orders.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">אין הזמנות</div>';
    return;
  }
  wrap.innerHTML = orders.map(o => `
    <div class="m-card" onclick="openDetail(${o.id})">
      <div class="m-card-top">
        <div>
          <div class="m-card-num">${escHtml(o.order_num)}</div>
          <div class="m-card-customer">${escHtml(o.customer_name ?? '—')}</div>
        </div>
        <span class="badge ${sBadgeClass(o.status)}">${escHtml(o.status)}</span>
      </div>
      <div class="m-card-meta">
        ${o.delivery_date ? `<span>📅 ${escHtml(o.delivery_date)}</span>` : ''}
        <span>⚖️ ${(o.total_weight||0).toFixed(0)} ק"ג</span>
        ${o.priority === 'דחוף' ? '<span style="color:var(--danger);font-weight:700">⚡ דחוף</span>' : ''}

        <a class="btn-sm" href="/api/orders/${o.id}/delivery-certificate" target="_blank" onclick="event.stopPropagation()">📋 תעודה</a>
      </div>

}

// ── Status update ──────────────────────────────────────────────────────
async function setStatus(id, status) {
  const response = await fetch(`/api/orders/${id}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result.success) {
    const allowed = result.allowed?.length ? ` אפשרי: ${result.allowed.join(' / ')}` : '';
    alert((result.error || 'עדכון סטטוס נכשל') + allowed);
    return false;
  }
  fetchOrders();
  return true;
}

// ── Detail panel ───────────────────────────────────────────────────────
async function openDetail(id) {
  const [r, pkgR] = await Promise.all([
    fetch(`/api/orders/${id}`),
    fetch(`/api/packages?order_id=${id}`)
  ]);
  const o = await r.json();
  const pkgs = await pkgR.json().catch(() => []);
  document.getElementById('detailOrderNum').textContent = o.order_num;
  document.getElementById('detailCustomer').textContent = o.customer_name ?? '';
  document.getElementById('detailBody').innerHTML = buildDetailHTML(o, pkgs);
  document.getElementById('detailOverlay').classList.add('show');
  requestAnimationFrame(renderDetailShapes);
  history.replaceState(null, '', `?id=${id}`);
}

function safeJson(value, fallback = []) {
  if (!value) return fallback;
  if (Array.isArray(value)) return value;
  try { return JSON.parse(value); } catch(e) { return fallback; }
}

function segmentLength(segment) {
  if (segment && typeof segment === 'object') return Number(segment.length_mm ?? segment.length ?? 0);
  return Number(segment || 0);
}

function itemLength(item) {
  const direct = Number(item.total_length_mm ?? item.length ?? 0);
  if (Number.isFinite(direct) && direct > 0) return direct;
  return safeJson(item.segments).reduce((sum, segment) => sum + segmentLength(segment), 0);
}

function itemWeight(item) {
  const total = Number(item.total_weight ?? 0);
  if (Number.isFinite(total) && total > 0) return total;
  const perUnit = Number(item.weight_per_unit ?? item.weight ?? 0);
  const qty = Number(item.quantity ?? 1);
  const calc = perUnit * qty;
  return Number.isFinite(calc) ? calc : 0;
}

function itemDimensions(item) {
  const values = safeJson(item.segments).map(segmentLength).filter(n => Number.isFinite(n) && n > 0);
  return values.length ? values.join(' / ') : '';
}

function itemSegments(item) {
  return safeJson(item.segments).map(segmentLength).filter(n => Number.isFinite(n) && n > 0);
}

function itemAngles(item) {
  const segs = safeJson(item.segments);
  return segs.slice(0, -1).map(segment => {
    const angle = segment && typeof segment === 'object' ? Number(segment.angle_deg) : 180;
    return Number.isFinite(angle) && angle > 0 ? angle : 180;
  });
}

function renderDetailShapes() {
  if (!window.IronBendShapes) {
    setTimeout(renderDetailShapes, 80);
    return;
  }
  document.querySelectorAll('[data-detail-shape]').forEach(el => {
    try {
      const sides = JSON.parse(decodeURIComponent(el.dataset.sides || '%5B%5D'));
      const angles = JSON.parse(decodeURIComponent(el.dataset.angles || '%5B%5D'));
      window.IronBendShapes.render2D(el, sides, angles, {
        width: el.clientWidth || 220,
        height: 130,
        padding: 22,
        color: '#DF5000',
        strokeWidth: 5,
        showDimensions: true,
        bgColor: '#ffffff',
      });
    } catch (e) {
      el.textContent = 'אין צורה';
    }
  });
}

function shapeLabel(shapeName) {
  const name = String(shapeName || '').toLowerCase();
  if (name.includes('open u') || name.includes('open bar')) return 'צורת ח פתוחה';
  if (name.includes('closed') || name.includes('stirrup')) return 'חישוק סגור';
  if (name.includes('straight')) return 'מוט ישר';
  return shapeName || 'מותאם';
}

function needsReview(item) {
  return /review|required|unclear|uncertain|verify|ambiguous|not clear|דורש|לא ברור/i.test(item.note || '');
}

function buildDetailHTML(o, pkgs) {
  const totalItems = (o.pallets || []).reduce((sum, p) => sum + (p.items || []).length, 0);
  const reviewItems = (o.pallets || []).reduce((sum, p) => sum + (p.items || []).filter(needsReview).length, 0);
  const totalPallets = (o.pallets || []).length;

  const hero = `<div class="detail-hero">
    <div class="hero-card">
      <div class="hero-title">לקוח / הזמנה</div>
      <div class="hero-main">${escHtml(o.customer_name ?? '—')}</div>
      <div style="margin-top:8px"><span class="badge ${sBadgeClass(o.status)}">${escHtml(o.status)}</span></div>
      <div class="hero-metric">
        <div class="metric-box"><div class="metric-label">אספקה</div><div class="metric-value">${escHtml(o.delivery_date ?? '—')}</div></div>
        <div class="metric-box"><div class="metric-label">משקל</div><div class="metric-value" style="color:var(--accent)">${(o.total_weight||0).toFixed(1)} ק"ג</div></div>
      </div>
    </div>
    <div class="hero-card">
      <div class="hero-title">סיכום ייצור</div>
      <div class="hero-metric" style="margin-top:0">
        <div class="metric-box"><div class="metric-label">משטחים</div><div class="metric-value">${totalPallets}</div></div>
        <div class="metric-box"><div class="metric-label">פריטים</div><div class="metric-value">${totalItems}</div></div>
        <div class="metric-box"><div class="metric-label">דורש בדיקה</div><div class="metric-value" style="color:${reviewItems ? 'var(--warning)' : 'var(--success)'}">${reviewItems}</div></div>
        <div class="metric-box"><div class="metric-label">עדיפות</div><div class="metric-value">${escHtml(o.priority || 'רגיל')}</div></div>
      </div>
    </div>
  </div>`;

  // ── Print buttons
  const prints = `<div class="print-btns">
    <a class="print-btn cards" href="/api/orders/${o.id}/print-cards" target="_blank">🖨️ כרטיסיות ייצור</a>
    <a class="print-btn a4" href="/api/orders/${o.id}/print-a4" target="_blank">📄 הדפסת A4</a>
    <a class="print-btn delivery" href="/api/orders/${o.id}/delivery-certificate" target="_blank">📋 תעודת משלוח</a>
  </div>`;

  // ── Info
  const info = `<div class="d-section">
    <div class="d-title">📌 פרטי הזמנה</div>
    <div class="info-grid">
      <div><div class="info-label">לקוח</div><div class="info-value">${escHtml(o.customer_name??'—')}</div></div>
      <div><div class="info-label">ערוץ</div><div class="info-value">${escHtml(o.channel??'—')}</div></div>
      <div><div class="info-label">תאריך אספקה</div><div class="info-value">${escHtml(o.delivery_date??'—')}</div></div>
      <div><div class="info-label">משקל כולל</div><div class="info-value" style="color:var(--accent)">${(o.total_weight||0).toFixed(1)} ק"ג</div></div>
      ${o.delivery_address?`<div style="grid-column:span 2"><div class="info-label">כתובת</div><div class="info-value">${escHtml(o.delivery_address)}</div></div>`:''}
      ${o.driver_notes?`<div style="grid-column:span 2"><div class="info-label">הערות לנהג</div><div class="info-value">${escHtml(o.driver_notes)}</div></div>`:''}
      ${o.struct_element?`<div><div class="info-label">אלמנט</div><div class="info-value">${escHtml(o.struct_element)}</div></div>`:''}
      ${o.struct_floor?`<div><div class="info-label">קומה</div><div class="info-value">${escHtml(o.struct_floor)}</div></div>`:''}
      ${o.sheet_num?`<div><div class="info-label">גיליון</div><div class="info-value">${escHtml(o.sheet_num)}</div></div>`:''}
    </div>
  </div>`; // BUG-25: added struct_element / struct_floor / sheet_num

  // ── Status
  const statuses = [o.status, ...allowedOrderTransitions(o.status)]
    .filter((status, index, list) => status && list.indexOf(status) === index);
  const statusSec = `<div class="d-section">
    <div class="d-title">🔁 עדכון סטטוס</div>
    <div class="status-actions">
      ${statuses.map(s => `<button class="status-btn${o.status===s?' cur':''}"
        ${o.status===s?'disabled':''}
        onclick="setStatus(${o.id},${jsArg(s)}).then(ok=>{if(ok)closeDetailPanel()})">${escHtml(s)}</button>`).join('')}
    </div>
  </div>`;

  // ── Items
  const palletsHtml = (o.pallets||[]).map((p, pi) => {
    const done = (p.items||[]).filter(i => i.status==='הושלם').length;
    const pct  = p.items?.length ? Math.round(done / p.items.length * 100) : 0;
    const totalW = (p.items||[]).reduce((s,i) => s + itemWeight(i), 0);
    const items = (p.items||[]).map(item => {
      const ic = item.status==='הושלם' ? 'is-done' : item.status==='בייצור' ? 'is-prod' : 'is-wait';
      const qty = item.quantity||0;
      const produced = item.produced_qty||0;
      const length = itemLength(item);
      const weight = itemWeight(item);
      const sides = itemSegments(item);
      const angles = itemAngles(item);
      const dims = sides.length ? sides.join(' / ') : itemDimensions(item);
      const review = needsReview(item);
      return `<div class="item-row">
        <div class="item-visual"
          data-detail-shape="1"
          data-sides="${encodeURIComponent(JSON.stringify(sides))}"
          data-angles="${encodeURIComponent(JSON.stringify(angles))}"></div>
        <div class="item-main">
          <div class="item-head">
            <span class="item-diameter">⌀${escHtml(item.diameter)}</span>
            <span class="item-shape">${escHtml(shapeLabel(item.shape_name))}</span>
            ${item.is_3d ? ' <span style="background:#7c3aed;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px">3D</span>' : ''}
            ${review ? ' <span style="background:#fff3cd;color:#8a5a00;font-size:11px;font-weight:900;padding:3px 8px;border-radius:999px">דורש בדיקה</span>' : ''}

            <div class="item-kpi"><div class="item-kpi-label">אורך פתיחה</div><div class="item-kpi-value">${Math.round(length)} מ"מ</div></div>
            <div class="item-kpi"><div class="item-kpi-label">משקל</div><div class="item-kpi-value">${weight.toFixed(1)} ק"ג</div></div>
            <div class="item-kpi"><div class="item-kpi-label">יוצר</div><div class="item-kpi-value">${produced}/${qty}</div></div>
          </div>
          ${dims ? `<div class="item-dims">${dims.split(' / ').map((d, idx) => `<span class="dim-chip">${String.fromCharCode(0x05D0 + idx)}: ${d} מ"מ</span>`).join('')}</div>` : ''}
          ${item.note ? `<div class="note-chip">⚠ ${escHtml(item.note)}</div>` : ''}
          ${item.status==='בייצור'&&qty>0?`<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,produced/qty*100).toFixed(0)}%"></div></div><div style="font-size:11px;color:var(--muted)">${produced}/${qty}</div>`:''}
        </div>
        <span class="item-status ${ic}">${escHtml(item.status)}</span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;color:var(--text);margin-bottom:6px">📦 משטח ${pi+1} — ${totalW.toFixed(0)} ק"ג | ${pct}%</div>
      <div class="prog-bar" style="margin-bottom:8px"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${items||'<div style="color:var(--muted);font-size:12px;padding:4px 0">אין פריטים</div>'}
    </div>`;
  }).join('');

  const itemsSec = `<div class="d-section">
    <div class="d-title">📦 פריטים לייצור</div>
    ${palletsHtml||'<div style="color:var(--muted);font-size:13px">אין פריטים</div>'}
  </div>`;

  // ── Packages
  let pkgSec = '';
  if (pkgs && pkgs.length) {
    const pkgRows = pkgs.map(p => {
      const label = p.status==='shipped'?'נשלח':p.status==='staged'?'מוכן לטעינה':'ארוז';
      const col = p.status==='shipped'?'var(--success)':p.status==='staged'?'var(--warning)':'var(--accent)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)">
        <div>
          <div style="font-weight:700;font-size:13px">📦 ${escHtml(p.package_code)}</div>
          <div style="font-size:11px;color:var(--muted)">${(p.weight||0).toFixed(0)} ק"ג${p.diameter?' | ⌀'+escHtml(p.diameter):''}${p.zone?' | אזור '+escHtml(p.zone):''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:${col}">${escHtml(label)}</span>

        </div>
      </div>`;
    }).join('');
    pkgSec = `<div class="d-section"><div class="d-title">🏷️ חבילות</div>${pkgRows}</div>`;
  }

  return hero + prints + info + statusSec + itemsSec + pkgSec;

function closeDetail(e) { if (e.target===document.getElementById('detailOverlay')) closeDetailPanel(); }
function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('show');
  history.replaceState(null, '', '/orders.html');
}

function printQR(code, orderNum, weight, diameter) {
  const w = window.open('', '_blank', 'width=400,height=350');
  const safeCode = escHtml(code);
  const safeOrderNum = escHtml(orderNum);
  const qrPayload = JSON.stringify(String(code ?? ''));
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">
  <title>QR - ${safeCode}</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"><\/script>
  <style>body{font-family:'Heebo',sans-serif;text-align:center;padding:20px}
  h2{font-size:18px;margin:0 0 4px}p{font-size:12px;color:#526070;margin:2px 0}
  canvas{margin:12px auto;display:block}@media print{button{display:none}}</style>
  </head><body>
  <h2>📦 ${safeCode}</h2><p>הזמנה: ${safeOrderNum}</p>
  <p>${weight.toFixed(0)} ק"ג${diameter?' | ⌀'+diameter:''}</p>
  <canvas id="qrCanvas"></canvas><br>
  <button onclick="window.print()">🖨️ הדפס</button>
  <script>QRCode.toCanvas(document.getElementById('qrCanvas'),${qrPayload},{width:200,margin:1},function(){});<\/script>
  </body></html>`);
  w.document.close();
}

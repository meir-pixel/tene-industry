<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תור ייצור – IronBend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<style>
  :root {
    --accent:  #e07b39;
    --success: #27ae60;
    --danger:  #e74c3c;
    --warning: #f39c12;
    --info:    #3498db;
    --bg:      #eef3f7;
    --card:    #ffffff;
    --soft:    #f8fbfd;
    --border:  #d8e2ec;
    --text:    #182636;
    --muted:   #6b7a8b;
    --radius:  12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  .nav { display:none !important; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px;
         align-items: center; gap: 8px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { margin-left: auto; display:flex; align-items:center; }
  .nav-brand img { width: 156px; height: 42px; object-fit: contain; display:block; filter:drop-shadow(0 2px 6px rgba(2,26,72,.12)); }
  .nav a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 6px 12px;
           border-radius: 6px; transition: all .2s; }
  .nav a:hover, .nav a.active { background: rgba(224,123,57,.15); color: var(--accent); }

  /* HEADER */
  .page-header { max-width: 1440px; margin: 0 auto; padding: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .page-title { font-size: 22px; font-weight: 800; }
  .header-actions { display: flex; gap: 8px; margin-right: auto; flex-wrap: wrap; }

  /* MACHINE FILTER TABS */
  .machine-tabs { max-width: 1440px; margin: 0 auto; display: flex; gap: 8px; padding: 0 24px 16px; flex-wrap: wrap; }
  .machine-tab { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
                 background: var(--card); color: var(--muted); cursor: pointer; font-size: 14px;
                 font-family: 'Heebo', sans-serif; transition: all .2s; }
  .machine-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(224,123,57,.1); }
  .machine-tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* SHIFT BAR */
  .shift-bar { background: var(--card); border-block: 1px solid var(--border);
               padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
               box-shadow: 0 8px 24px rgba(2,26,72,.06); }
  .shift-info { display: flex; align-items: center; gap: 24px; flex: 1; flex-wrap: wrap; }
  .shift-stat { min-width: 110px; display: flex; flex-direction: column; gap: 2px;
                background: #f6f9fc; border: 1px solid rgba(2,26,72,.07);
                border-radius: 12px; padding: 9px 12px; }
  .shift-stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .shift-stat .value { font-size: 18px; font-weight: 700; color: var(--text); }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer;
         font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600; transition: all .2s; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-success  { background: var(--success); color: #fff; }
  .btn-danger   { background: var(--danger);  color: #fff; }
  .btn-warning  { background: var(--warning); color: #fff; }
  .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn:hover    { opacity: .85; transform: translateY(-1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* CONTENT */
  .content { max-width: 1440px; margin: 0 auto; padding: 0 24px 48px; }

  /* MACHINE COLUMNS */
  .machines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(390px, 1fr)); gap: 20px; }

  .machine-col { background: var(--card); border-radius: 18px; border: 1px solid var(--border); overflow: hidden;
                 box-shadow: 0 12px 30px rgba(2,26,72,.08); }
  .machine-col-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px;
                         border-bottom: 1px solid var(--border); position: relative; }
  .machine-badge { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg,var(--accent),#f08a24);
                   display: flex; align-items: center; justify-content: center;
                   font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .machine-col-title { font-size: 15px; font-weight: 700; }
  .machine-status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: auto; }
  .dot-green  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot-red    { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
  .dot-gray   { background: var(--muted); }
  .machine-col-count { font-size: 11px; color: var(--muted); }
  .stop-btn-small { background: rgba(231,76,60,.15); color: var(--danger); border: 1px solid var(--danger);
                    padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
                    font-family: 'Heebo', sans-serif; }

  /* QUEUE ITEMS */
  .queue-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 640px; overflow-y: auto; }
  .queue-item { background: var(--soft); border-radius: 15px; padding: 12px;
                 border: 1px solid var(--border); cursor: pointer; transition: all .2s;
                 display: grid; grid-template-columns: 150px 1fr; gap: 12px; align-items: stretch; }
  .queue-item:hover { border-color: var(--accent); box-shadow: 0 8px 20px rgba(24,38,54,.08); transform: translateY(-1px); }
  .queue-item.active-item { border-color: var(--success); background: #effaf4; }
  .queue-item.active-item .item-status-badge { background: rgba(39,174,96,.2); color: var(--success); }
  .queue-shape { min-height: 116px; border-radius: 13px; border: 1px solid rgba(2,26,72,.08);
                 background: #fff; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .queue-info { min-width: 0; display:flex; flex-direction:column; gap:7px; }
  .item-top { display: flex; align-items: center; gap: 8px; }
  .item-order { font-size: 13px; font-weight: 700; color: var(--accent); }
  .item-customer { font-size: 12px; color: var(--muted); }
  .item-priority-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .badge-urgent { background: rgba(231,76,60,.2); color: var(--danger); }
  .badge-high   { background: rgba(243,156,18,.2); color: var(--warning); }
  .badge-normal { background: rgba(52,152,219,.12); color: var(--info); }
  .item-details { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 7px; }
  .item-detail  { font-size: 12px; color: var(--muted); background:#fff; border:1px solid rgba(2,26,72,.06);
                  border-radius:9px; padding:6px 8px; }
  .item-detail strong { color: var(--text); }
  .item-status-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px;
                       background: rgba(127,136,152,.15); color: var(--muted); margin-right: auto; }
  .item-actions { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .item-btn { padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer;
              font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 600; }
  .item-btn-start { background: rgba(39,174,96,.2); color: var(--success); border: 1px solid var(--success); }
  .item-btn-done  { background: rgba(52,152,219,.2); color: var(--info);    border: 1px solid var(--info); }
  .item-btn-waste { background: rgba(243,156,18,.2); color: var(--warning); border: 1px solid var(--warning); }
  .item-btn:hover { opacity: .8; }

  .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

  /* PROGRESS BAR */
  .item-progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 2px; overflow: hidden; }
  .item-progress-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width .3s; }
  @media (max-width: 520px) {
    .queue-item { grid-template-columns: 1fr; }
    .queue-shape { min-height: 120px; }
  }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
                   display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
           width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
                  display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border);
                  display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .form-control { background: var(--soft); border: 1px solid var(--border); border-radius: 8px;
                  padding: 10px 14px; color: var(--text); font-family: 'Heebo', sans-serif;
                  font-size: 14px; width: 100%; }
  .form-control:focus { outline: none; border-color: var(--accent); }
  select.form-control option { background: var(--card); }

  /* STOP REASON PILLS */
  .reason-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .reason-pill { padding: 8px 16px; border-radius: 8px; border: 2px solid var(--border);
                 cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
  .reason-pill.selected { border-color: var(--accent); background: rgba(224,123,57,.15); color: var(--accent); }
  .reason-pill:hover:not(.selected) { border-color: var(--muted); }

  /* SCAN OVERLAY */
  .scan-indicator { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
                    background: var(--card); border: 1px solid var(--accent); border-radius: 12px;
                    padding: 12px 24px; display: flex; align-items: center; gap: 10px;
                    box-shadow: 0 4px 20px rgba(224,123,57,.3); z-index: 500; }
  .scan-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success);
              animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .machines-grid { grid-template-columns: 1fr; }
    .page-header { padding: 16px; }
    .content { padding: 0 12px 48px; }
    .machine-tabs { padding: 0 12px 12px; }
  }
</style>
<script src="/auth-client.js"></script>
<script src="/safe-dom.js"></script>
<script src="/status-contracts-client.js"></script>

<script src="/nav.js" defer></script>

<nav class="nav">

  <span class="nav-brand"><img src="/brand/tene-logo.svg" alt="טנא תעשיות ברזל"></span>
</nav>

<!-- SHIFT BAR -->
<div class="shift-bar">
  <div class="shift-info">
    <div class="shift-stat">

</div>

<!-- CONTENT -->
<div class="content">

  </div>
</div>

<!-- START SHIFT MODAL -->
<div class="modal-overlay" id="start-shift-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">▶ פתיחת משמרת</div>

    <div class="modal-body">

    <div class="modal-body">

        <label>מכונה</label>

          <option value="">— בחר מכונה —</option>

      </div>
      <div class="form-group">
        <label>סיבת עצירה</label>

<!-- WASTE MODAL -->

      <button class="modal-close" onclick="closeModal('waste-modal')">✕</button>

      </div>

        <input type="number" class="form-control" id="waste-amount" min="0" placeholder="0">
      </div>

        <label>הערה</label>

<script>
const API = '';
let queueData = { items: [], grouped: {} };
let machines = [];
let users = [];
let stopReasons = [];
let currentShift = null;
let selectedReason = null;
let currentMachineFilter = 'all';
let currentWasteItemId = null;
const ITEM_STATUS = (window.IronBendStatus && window.IronBendStatus.ITEM_STATUS) || {
  WAITING: 'ממתין',
  IN_PRODUCTION: 'בייצור',
  DONE: 'הושלם',
};

function escHtml(value) {
  return window.IronBendSafe
    ? window.IronBendSafe.escapeHtml(value)
    : String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function jsArg(value) {
  return JSON.stringify(String(value ?? ''));
}

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadMachines(), loadUsers(), loadStopReasons()]);
  populateStopMachines();
  populateShiftMachines();
  populateShiftOperators();
  loadQueue();
  loadTonsToday();
  setInterval(() => { loadQueue(); loadTonsToday(); }, 30000);
}

async function loadMachines() {
  const data = await fetch(`${API}/api/machines`).then(r=>r.json());
  machines = Array.isArray(data) ? data : (data.machines || []);
  const tabs = document.getElementById('machine-tabs');
  tabs.innerHTML = `<button class="machine-tab active" data-machine="all" onclick="filterMachine('all',this)">🏭 כל המכונות</button>`;
  machines.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'machine-tab';
    btn.dataset.machine = m.name;
    btn.onclick = () => filterMachine(m.name, btn);
    btn.textContent = `מכונה ${m.label || m.name}`;
    tabs.appendChild(btn);
  });
}

async function loadUsers() {
  try {
    const data = await fetch(`${API}/api/users`).then(r=>r.json());
    users = Array.isArray(data) ? data : (data.users || []);
  } catch(e) { users = []; }
}

async function loadStopReasons() {
  stopReasons = await fetch(`${API}/api/downtime-reasons`).then(r=>r.json());
  const pills = document.getElementById('reason-pills');
  pills.innerHTML = '';
  stopReasons.forEach(r => {
    const p = document.createElement('div');
    p.className = 'reason-pill';
    p.textContent = r.label;
    p.dataset.code = r.code;
    p.onclick = () => selectReason(r.code, p);
    pills.appendChild(p);
  });
}

function selectReason(code, el) {
  selectedReason = code;
  document.querySelectorAll('.reason-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

async function loadQueue() {
  const url = currentMachineFilter === 'all'
    ? `${API}/api/production-queue`
    : `${API}/api/production-queue?machine=${encodeURIComponent(currentMachineFilter)}`;
  queueData = await fetch(url).then(r=>r.json());
  renderQueue();
}

async function loadTonsToday() {
  try {
    const data = await fetch(`${API}/api/kpi/tons-today`).then(r=>r.json());
    document.getElementById('shift-tons').textContent = data.tons + ' ט';
  } catch(e) {
    document.getElementById('shift-tons').textContent = 'שגיאה';
  }
}

// ── FILTER ────────────────────────────────────────────────────────
function filterMachine(machine, btn) {
  currentMachineFilter = machine;
  document.querySelectorAll('.machine-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadQueue();
}

// ── RENDER QUEUE ─────────────────────────────────────────────────
function renderQueue() {
  const grid = document.getElementById('machines-grid');
  const grouped = queueData.grouped || {};
  const keys = Object.keys(grouped);

  if (keys.length === 0) {
    grid.innerHTML = `<div class="empty-state">✅ אין פריטים ממתינים לייצור</div>`;
    return;
  }

  grid.innerHTML = '';
  keys.forEach(machineKey => {
    const items = grouped[machineKey];
    const machineInfo = machines.find(m => m.name === machineKey);
    const col = createMachineColumn(machineKey, machineInfo, items);
    grid.appendChild(col);
  });
  requestAnimationFrame(renderQueueShapes);

  // Update shift pieces count
  const totalPending = queueData.items ? queueData.items.length : 0;
  document.getElementById('shift-pieces').textContent = totalPending;
}

function createMachineColumn(machineName, machineInfo, items) {
  const col = document.createElement('div');
  col.className = 'machine-col';

  const isConnected = machineInfo && machineInfo.status === 'מחובר';
  const dotClass = isConnected ? 'dot-green' : machineInfo ? 'dot-gray' : 'dot-gray';
  const activeItems = items.filter(i => i.status === ITEM_STATUS.IN_PRODUCTION);

  col.innerHTML = `
    <div class="machine-col-header">
      <div class="machine-badge">${machineInfo ? (machineInfo.label || machineName) : machineName[0]}</div>
      <div>
        <div class="machine-col-title">${machineName}</div>
        <div class="machine-col-count">${items.length} פריטים | ${activeItems.length} פעיל</div>
      </div>
      <div class="machine-status-dot ${dotClass}"></div>
      <button class="stop-btn-small" onclick="openStopForMachine('${machineName}')">⏸ עצירה</button>
    </div>
    <div class="queue-list" id="list-${machineName.replace(/\s/g,'_')}">
      ${items.map(item => renderQueueItem(item)).join('')}
      ${items.length === 0 ? '<div class="empty-state">אין פריטים</div>' : ''}
    </div>
  `;
  return col;
}

function renderQueueItem(item) {
  const isActive = item.status === ITEM_STATUS.IN_PRODUCTION;
  const pct = item.quantity > 0 ? Math.min(100, Math.round((item.produced_qty || 0) / item.quantity * 100)) : 0;
  const priorityBadge = item.priority === 'דחוף' ? 'badge-urgent' :
                        item.priority === 'גבוה' ? 'badge-high' : 'badge-normal';

  const segments = safeJson(item.segments);
  const dims = formatSegments(segments);
  const totalLength = item.total_length_mm || segmentTotal(segments);
  const sides = itemSegments(segments);
  const angles = itemAngles(segments);

  return `
    <div class="queue-item ${isActive ? 'active-item' : ''}" onclick="toggleItemActions(${item.id})">
      <div class="queue-shape"
        data-queue-shape="1"
        data-sides="${encodeURIComponent(JSON.stringify(sides))}"
        data-angles="${encodeURIComponent(JSON.stringify(angles))}"></div>
      <div class="queue-info">
        <div class="item-top">
          <span class="item-order">${escHtml(item.order_num || '')}</span>
          <span class="item-customer">${escHtml(item.customer_name || '')}</span>
          <span class="item-priority-badge ${priorityBadge}">${escHtml(item.priority || 'רגיל')}</span>
          <span class="item-status-badge">${escHtml(item.status)}</span>
        </div>
        <div class="item-details">
          <span class="item-detail"><strong>קוטר</strong> ⌀${escHtml(item.diameter)}</span>
          <span class="item-detail"><strong>כמות</strong> ${item.produced_qty||0}/${item.quantity}</span>
          <span class="item-detail"><strong>משקל</strong> ${Math.round(item.weight||0)} ק"ג</span>
          ${totalLength ? `<span class="item-detail"><strong>אורך</strong> ${Math.round(totalLength)} מ"מ</span>` : ''}
          ${item.shape_name ? `<span class="item-detail"><strong>צורה</strong> ${escHtml(shapeLabel(item.shape_name))}</span>` : ''}
          ${dims ? `<span class="item-detail"><strong>מידות</strong> ${escHtml(dims)}</span>` : ''}
          ${item.delivery_date ? `<span class="item-detail"><strong>אספקה</strong> ${escHtml(item.delivery_date)}</span>` : ''}
        </div>
        ${isActive ? `<div class="item-progress"><div class="item-progress-fill" style="width:${pct}%"></div></div>` : ''}
        <div class="item-actions" id="actions-${item.id}" style="display:none">
          ${item.status === ITEM_STATUS.WAITING
            ? `<button class="item-btn item-btn-start" onclick="startItem(${item.id},event)">▶ התחל</button>`
            : `<button class="item-btn item-btn-done" onclick="completeItem(${item.id},event)">✅ הושלם</button>`
          }
          <button class="item-btn item-btn-waste" onclick="openWaste(${item.id},${jsArg(item.order_num)},event)">📊 פחת</button>
        </div>
      </div>
    </div>
  `;
}

function safeJson(str) {
  if (!str) return null;
  try { return typeof str === 'string' ? JSON.parse(str) : str; } catch(e) { return null; }
}

function segmentLength(segment) {
  if (segment && typeof segment === 'object') return Number(segment.length_mm ?? segment.length ?? 0);
  return Number(segment || 0);
}

function segmentTotal(segments) {
  return Array.isArray(segments) ? segments.reduce((sum, segment) => sum + segmentLength(segment), 0) : 0;
}

function formatSegments(segments) {
  if (!Array.isArray(segments) || !segments.length) return '';
  const values = segments.map(segmentLength).filter(n => Number.isFinite(n) && n > 0);
  return values.length ? `${values.join(' / ')} מ"מ` : '';
}

function itemSegments(segments) {
  if (!Array.isArray(segments)) return [];
  return segments.map(segmentLength).filter(n => Number.isFinite(n) && n > 0);
}

function itemAngles(segments) {
  if (!Array.isArray(segments)) return [];
  return segments.slice(0, -1).map(segment => {
    const angle = segment && typeof segment === 'object' ? Number(segment.angle_deg) : 180;
    return Number.isFinite(angle) && angle > 0 ? angle : 180;
  });
}

function renderQueueShapes() {
  if (!window.IronBendShapes) {
    setTimeout(renderQueueShapes, 80);
    return;
  }
  document.querySelectorAll('[data-queue-shape]').forEach(el => {
    try {
      const sides = JSON.parse(decodeURIComponent(el.dataset.sides || '%5B%5D'));
      const angles = JSON.parse(decodeURIComponent(el.dataset.angles || '%5B%5D'));
      window.IronBendShapes.render2D(el, sides, angles, {
        width: el.clientWidth || 116,
        height: el.clientHeight || 92,
        padding: 16,
        color: '#DF5000',
        strokeWidth: 4,
        showDimensions: true,
        bgColor: '#ffffff',
      });
    } catch (e) {
      el.textContent = 'אין צורה';
    }
  });
}

function shapeLabel(shapeName) {
  const name = String(shapeName || '').toLowerCase();
  if (name.includes('open u') || name.includes('open bar')) return 'צורת ח פתוחה';
  if (name.includes('closed') || name.includes('stirrup')) return 'חישוק סגור';
  if (name.includes('straight')) return 'מוט ישר';
  return shapeName;
}

function toggleItemActions(itemId) {
  const el = document.getElementById(`actions-${itemId}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

// ── ITEM ACTIONS ─────────────────────────────────────────────────
async function startItem(itemId, e) {
  e && e.stopPropagation();
  await fetch(`${API}/api/items/${itemId}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: ITEM_STATUS.IN_PRODUCTION })
  });
  loadQueue();
}

async function completeItem(itemId, e) {
  e && e.stopPropagation();
  await fetch(`${API}/api/items/${itemId}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: ITEM_STATUS.DONE })
  });
  loadQueue();
}

function openWaste(itemId, orderNum, e) {
  e && e.stopPropagation();
  currentWasteItemId = itemId;
  document.getElementById('waste-modal-title').textContent = `פחת — ${orderNum}`;
  document.getElementById('waste-produced').value = '';
  document.getElementById('waste-amount').value = '';
  document.getElementById('waste-note').value = '';
  document.getElementById('waste-modal').style.display = 'flex';
}

async function submitWaste() {
  if (!currentWasteItemId) return;
  const produced = parseInt(document.getElementById('waste-produced').value) || 0;
  const waste = parseInt(document.getElementById('waste-amount').value) || 0;
  const note = document.getElementById('waste-note').value;
  await fetch(`${API}/api/items/${currentWasteItemId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ produced_qty: produced, actual_waste: waste, note })
  });
  closeModal('waste-modal');
  loadQueue();
}

// ── SHIFT ACTIONS ─────────────────────────────────────────────────
function openStartShift() {
  document.getElementById('start-shift-modal').style.display = 'flex';
}

function populateShiftOperators() {
  const sel = document.getElementById('shift-operator-sel');
  sel.innerHTML = '<option value="">— בחר מפעיל —</option>';
  users.filter(u => ['operator','manager','admin'].includes(u.role)).forEach(u => {
    sel.innerHTML += `<option value="${u.id}">${u.display_name}</option>`;
  });
}

function populateShiftMachines() {
  const sel = document.getElementById('shift-machine-sel');
  sel.innerHTML = '<option value="">— כל המכונות —</option>';
  machines.forEach(m => {
    sel.innerHTML += `<option value="${m.id}">${m.name}</option>`;
  });
}

function populateStopMachines() {
  const sel = document.getElementById('stop-machine-sel');
  sel.innerHTML = '<option value="">— בחר מכונה —</option>';
  machines.forEach(m => {
    sel.innerHTML += `<option value="${m.id}">${m.name}</option>`;
  });
}

async function startShift() {
  const shift_type = document.getElementById('shift-type-sel').value;
  const operator_id = document.getElementById('shift-operator-sel').value;
  const machine_id = document.getElementById('shift-machine-sel').value;
  const data = await fetch(`${API}/api/shifts`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ shift_type, operator_id: operator_id || null, machine_id: machine_id || null })
  }).then(r=>r.json());
  currentShift = { id: data.id, shift_type, operator_id, machine_id };

  const typeLabels = { morning: 'בוקר', afternoon: 'צהריים', night: 'לילה' };
  document.getElementById('shift-type-label').textContent = typeLabels[shift_type] || shift_type;
  const op = users.find(u => u.id == operator_id);
  document.getElementById('shift-operator').textContent = op ? op.display_name : '—';
  document.getElementById('end-shift-btn').disabled = false;
  closeModal('start-shift-modal');
}

async function endCurrentShift() {
  if (!currentShift) return;
  if (!confirm('לסגור את המשמרת הנוכחית?')) return;
  await fetch(`${API}/api/shifts/${currentShift.id}/end`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ total_pieces: parseInt(document.getElementById('shift-pieces').textContent) || 0 })
  });
  currentShift = null;
  document.getElementById('shift-type-label').textContent = '—';
  document.getElementById('shift-operator').textContent = '—';
  document.getElementById('end-shift-btn').disabled = true;
}

function openStopModal() {
  selectedReason = null;
  document.querySelectorAll('.reason-pill').forEach(p => p.classList.remove('selected'));
  document.getElementById('stop-notes').value = '';
  document.getElementById('stop-modal').style.display = 'flex';
}

function openStopForMachine(machineName) {
  const m = machines.find(mc => mc.name === machineName);
  if (m) document.getElementById('stop-machine-sel').value = m.id;
  openStopModal();
}

async function submitStop() {
  const machine_id = document.getElementById('stop-machine-sel').value;
  if (!machine_id) return alert('בחר מכונה');
  if (!selectedReason) return alert('בחר סיבת עצירה');
  const notes = document.getElementById('stop-notes').value;
  await fetch(`${API}/api/machine-stops`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      machine_id, shift_id: currentShift?.id || null,
      reason_code: selectedReason, notes,
      reported_by: currentShift?.operator_id || null
    })
  });
  closeModal('stop-modal');
  alert('עצירה דווחה בהצלחה');
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.style.display = 'none';
  });
});

init();
</script>
</body>
</html>

<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ניהול מחירונים | IronBend</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="/auth-client.js"></script>
  <script src="/safe-dom.js"></script>
  <script src="/nav.js"></script>
  <style>
    :root {
      --bg:#f4f7fb;
      --panel:#fff;
      --ink:#172234;
      --muted:#66758a;
      --line:#dbe3ee;
      --accent:#c9621a;
      --accent-2:#0b6bcb;
      --ok:#12805c;
      --warn:#b7791f;
      --bad:#b42318;
      --shadow:0 12px 34px rgba(15,35,70,.12);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Heebo,Arial,sans-serif;
      min-height:100vh;
    }
    button, input, select, textarea { font:inherit; }
    button { cursor:pointer; }
    .wrap { max-width:1480px; margin:0 auto; padding:24px; }
    .head {
      display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
      margin-bottom:18px;
    }
    .title h1 { margin:0 0 6px; font-size:28px; line-height:1.2; }
    .title p { margin:0; color:var(--muted); font-weight:700; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .segmented {
      display:inline-flex; gap:0; border:1px solid var(--line); border-radius:8px; overflow:hidden;
      background:#fff;
    }
    .segmented button {
      min-height:38px; padding:8px 13px; border:0; border-inline-start:1px solid var(--line);
      background:#fff; color:var(--muted); font-weight:900;
    }
    .segmented button:first-child { border-inline-start:0; }
    .segmented button.active { background:#10233f; color:#fff; }
    .btn {
      border:1px solid var(--line); background:#fff; color:var(--ink);
      min-height:38px; padding:8px 13px; border-radius:7px; font-weight:900;
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
    }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.blue { background:var(--accent-2); border-color:var(--accent-2); color:#fff; }
    .btn.danger { color:var(--bad); }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .grid {
      display:grid;
      grid-template-columns:minmax(260px,340px) 1fr;
      gap:16px;
      align-items:start;
    }
    .panel {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel-head {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:14px 16px; border-bottom:1px solid var(--line);
      background:#fbfcfe;
    }
    .panel-head h2 { margin:0; font-size:16px; }
    .search { padding:12px; border-bottom:1px solid var(--line); }
    .field { display:flex; flex-direction:column; gap:6px; min-width:0; }
    .field span { color:var(--muted); font-size:12px; font-weight:900; }
    input, select, textarea {
      width:100%; border:1px solid var(--line); border-radius:7px; background:#fff;
      min-height:38px; padding:8px 10px; color:var(--ink);
    }
    textarea { min-height:78px; resize:vertical; }
    .book-list { max-height:calc(100vh - 235px); overflow:auto; }
    .book {
      width:100%; border:0; border-bottom:1px solid var(--line); background:#fff;
      padding:12px; text-align:right; display:grid; gap:6px;
    }
    .book:hover, .book.active { background:#f7fbff; }
    .book-title { display:flex; align-items:center; justify-content:space-between; gap:8px; font-weight:900; }
    .book-meta { color:var(--muted); font-size:12px; display:flex; gap:8px; flex-wrap:wrap; }
    .badge {
      display:inline-flex; align-items:center; min-height:22px; padding:2px 7px;
      border-radius:999px; font-size:11px; font-weight:900; background:#eef3f9; color:#405168;
    }
    .badge.active { background:#e7f6ef; color:var(--ok); }
    .badge.draft { background:#fff5df; color:var(--warn); }
    .form-grid {
      display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:12px;
      padding:16px; border-bottom:1px solid var(--line);
    }
    .field.wide { grid-column:span 2; }
    .field.full { grid-column:1/-1; }
    .toolbar {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 16px; border-bottom:1px solid var(--line);
    }
    .toolbar .field { max-width:360px; flex:1; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:980px; }
    th, td { border-bottom:1px solid var(--line); padding:10px; text-align:right; vertical-align:middle; }
    th { background:#f8fafc; color:#516176; font-size:12px; font-weight:900; position:sticky; top:0; }
    td { font-size:13px; }
    .num { direction:ltr; text-align:left; font-variant-numeric:tabular-nums; }
    .empty { padding:42px 20px; color:var(--muted); text-align:center; font-weight:800; }
    .row-actions { display:flex; gap:6px; justify-content:flex-start; }
    .icon-btn {
      width:32px; height:32px; border-radius:7px; border:1px solid var(--line);
      background:#fff; display:inline-flex; align-items:center; justify-content:center;
      font-weight:900;
    }
    dialog {
      width:min(760px,94vw); border:0; border-radius:8px; padding:0; box-shadow:0 30px 90px rgba(0,0,0,.32);
    }
    dialog::backdrop { background:rgba(5,16,34,.42); }
    .modal-head {
      display:flex; align-items:center; justify-content:space-between; padding:16px;
      border-bottom:1px solid var(--line);
    }
    .modal-head h3 { margin:0; font-size:18px; }
    .modal-body { padding:16px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .modal-body.import-body { grid-template-columns:repeat(4,1fr); }
    .modal-foot { padding:14px 16px; display:flex; justify-content:flex-start; gap:8px; border-top:1px solid var(--line); }
    .import-table { grid-column:1/-1; overflow:auto; border:1px solid var(--line); border-radius:8px; }
    .import-table table { min-width:980px; }
    .import-table input, .import-table select { min-height:32px; padding:5px 7px; }
    .import-status { grid-column:1/-1; color:var(--muted); font-weight:800; }
    .toast {
      position:fixed; left:24px; bottom:24px; z-index:1000;
      background:#10233f; color:#fff; padding:11px 16px; border-radius:8px;
      opacity:0; transform:translateY(8px); transition:.2s; font-weight:900;
    }
    .toast.show { opacity:1; transform:none; }
    @media(max-width:980px) {
      .grid { grid-template-columns:1fr; }
      .book-list { max-height:320px; }
      .form-grid { grid-template-columns:repeat(2,1fr); }
      .modal-body { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:640px) {
      .wrap { padding:14px; }
      .head { flex-direction:column; }
      .actions, .toolbar { width:100%; }
      .form-grid, .modal-body { grid-template-columns:1fr; }
      .field.wide { grid-column:auto; }
      .toolbar { align-items:stretch; flex-direction:column; }
      .btn { width:100%; }
    }
  </style>
</head>
<body data-page="pricing">
  <main class="wrap">
    <header class="head">
      <div class="title">
        <h1>ניהול מחירונים</h1>
        <p>מחירון כללי ומחירון לקוח עם מק״טים, קוטר, מחיר ועדכון אחרון.</p>
      </div>
      <div class="actions">
        <button class="btn" id="sampleBtn" type="button">דוגמה כללית</button>
        <button class="btn blue" id="importOcrBtn" type="button">ייבוא OCR</button>
        <button class="btn primary" id="newBookBtn" type="button">מחירון חדש</button>
      </div>
    </header>

    <section class="grid">
      <aside class="panel">
        <div class="panel-head">
          <h2 id="listTitle">מחירון כללי</h2>
          <span class="badge" id="bookCount">0</span>
        </div>
        <div class="search">
          <div class="segmented" aria-label="סוג מחירון">
            <button class="active" id="generalModeBtn" type="button" data-mode="general">מחירון כללי</button>
            <button id="customerModeBtn" type="button" data-mode="customer">מחירון לקוח</button>
          </div>
        </div>
        <div class="search">
          <label class="field">
            <span>חיפוש</span>
            <input id="bookSearch" autocomplete="off" placeholder="קוד, לקוח או שם מחירון">
          </label>
        </div>
        <div class="book-list" id="bookList"></div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <h2 id="currentTitle">בחר מחירון</h2>
          <span class="badge" id="currentStatus">טיוטה</span>
        </div>
        <form class="form-grid" id="bookForm">
          <input name="price_type" type="hidden" value="general">
          <label class="field">
            <span>קוד מחירון</span>
            <input name="code" required>
          </label>
          <label class="field wide">
            <span>שם מחירון</span>
            <input name="name" required>
          </label>
          <label class="field" id="customerIdField">
            <span>מס׳ לקוח</span>
            <input name="customer_id" type="number" min="1">
          </label>
          <label class="field" id="customerNameField">
            <span>לקוח</span>
            <input name="customer_name">
          </label>
          <label class="field">
            <span>מטבע</span>
            <select name="currency">
              <option value="ILS">ILS</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </label>
          <label class="field">
            <span>סטטוס</span>
            <select name="status">
              <option value="draft">טיוטה</option>
              <option value="active">פעיל</option>
              <option value="archived">ארכיון</option>
            </select>
          </label>
          <label class="field full">
            <span>הערות</span>
            <textarea name="notes"></textarea>
          </label>
          <div class="field full">
            <span>עודכן</span>
            <strong id="updatedAtLabel">עדיין לא נשמר</strong>
          </div>
          <div class="field full">
            <button class="btn blue" type="submit">שמור מחירון</button>
          </div>
        </form>

        <div class="toolbar">
          <label class="field">
            <span>חיפוש שורה</span>
            <input id="itemSearch" autocomplete="off" placeholder="מק״ט, תיאור או קטגוריה">
          </label>
          <button class="btn primary" id="addItemBtn" type="button">הוסף שורת מק״ט</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>מק״ט</th>
                <th>קוטר</th>
                <th>קטגוריה</th>
                <th>תיאור</th>
                <th>כמות</th>
                <th>יחידה</th>
                <th>מחיר לפני מע״מ</th>
                <th>מטבע</th>
                <th>חריג</th>
                <th>תוקף</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="itemBody">
              <tr><td class="empty" colspan="11">עדיין לא נבחר מחירון.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <dialog id="itemDialog">
    <form id="itemForm" method="dialog">
      <div class="modal-head">
        <h3 id="itemDialogTitle">שורת מחירון</h3>
        <button class="icon-btn" value="cancel" type="submit">×</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span>מק״ט</span>
          <input name="sku" required>
        </label>
        <label class="field">
          <span>קוטר</span>
          <input name="diameter" type="number" step="1" min="0" placeholder="8">
        </label>
        <label class="field">
          <span>קטגוריה</span>
          <input name="category" list="categories">
        </label>
        <label class="field">
          <span>יחידה</span>
          <select name="unit">
            <option value="kg">ק״ג</option>
            <option value="ton">טון</option>
            <option value="unit">יח׳</option>
            <option value="m">מטר</option>
          </select>
        </label>
        <label class="field full">
          <span>תיאור</span>
          <input name="description" required>
        </label>
        <label class="field">
          <span>כמות</span>
          <input name="quantity" type="number" step="0.001" value="1">
        </label>
        <label class="field">
          <span>מחיר לפני מע״מ</span>
          <input name="price_before_vat" type="number" step="0.01" value="0">
        </label>
        <label class="field">
          <span>מטבע</span>
          <select name="currency">
            <option value="ILS">ILS</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
          </select>
        </label>
        <label class="field">
          <span>תקף מ</span>
          <input name="valid_from" type="date">
        </label>
        <label class="field">
          <span>תקף עד</span>
          <input name="valid_to" type="date">
        </label>
        <label class="field">
          <span>סדר</span>
          <input name="sort_order" type="number" step="1" value="0">
        </label>
        <label class="field full">
          <span>הערות</span>
          <textarea name="notes"></textarea>
        </label>
        <label class="field">
          <span>חריג מחיר</span>
          <select name="exception_flag">
            <option value="0">לא</option>
            <option value="1">כן</option>
          </select>
        </label>
      </div>
      <div class="modal-foot">
        <button class="btn primary" id="saveItemBtn" value="default" type="submit">שמור שורה</button>
        <button class="btn" value="cancel" type="submit">ביטול</button>
      </div>
    </form>
  </dialog>

  <dialog id="importDialog">
    <form id="importForm" method="dialog">
      <div class="modal-head">
        <h3>ייבוא מחירון מ־OCR</h3>
        <button class="icon-btn" value="cancel" type="submit">×</button>
      </div>
      <div class="modal-body import-body">
        <label class="field full">
          <span>PDF או תמונה של מחירון</span>
          <input name="file" type="file" accept="image/*,.pdf,application/pdf" required>
        </label>
        <label class="field">
          <span>סוג מחירון</span>
          <select name="price_type">
            <option value="general">מחירון כללי</option>
            <option value="customer">מחירון לקוח</option>
          </select>
        </label>
        <label class="field">
          <span>מס׳ לקוח</span>
          <input name="customer_id" type="number" min="1">
        </label>
        <label class="field wide">
          <span>לקוח</span>
          <input name="customer_name">
        </label>
        <label class="field">
          <span>קוד מחירון</span>
          <input name="code">
        </label>
        <label class="field wide">
          <span>שם מחירון</span>
          <input name="name">
        </label>
        <label class="field">
          <span>מטבע</span>
          <select name="currency">
            <option value="ILS">ILS</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
          </select>
        </label>
        <label class="field full">
          <span>הערות</span>
          <textarea name="notes"></textarea>
        </label>
        <div class="import-status" id="importStatus">בחר קובץ ולחץ “זהה מחירון”.</div>
        <div class="import-table" id="importTable"></div>
      </div>
      <div class="modal-foot">
        <button class="btn blue" id="analyzeImportBtn" value="analyze" type="submit">זהה מחירון</button>
        <button class="btn primary" id="saveImportBtn" value="save" type="submit" disabled>צור טיוטת מחירון</button>
        <button class="btn" value="cancel" type="submit">ביטול</button>
      </div>
    </form>
  </dialog>

  <datalist id="categories">
    <option value="ברזל מעובד"></option>
    <option value="מוטות"></option>
    <option value="עיבודי ברזל"></option>
    <option value="רשת"></option>
    <option value="הובלות"></option>
  </datalist>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      books: [],
      currentBook: null,
      items: [],
      editingItem: null,
      importDraft: null,
      mode: 'general',
    };

    const $ = selector => document.querySelector(selector);
    const bookForm = $('#bookForm');
    const itemForm = $('#itemForm');
    const itemDialog = $('#itemDialog');
    const importForm = $('#importForm');
    const importDialog = $('#importDialog');

    function authHeaders(extra = {}) {
      const headers = { ...extra };
      const token = localStorage.getItem('jwtToken') || localStorage.getItem('authToken') || '';
      if (token) headers.Authorization = `Bearer ${token}`;
      return headers;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: authHeaders({
          ...(options.body ? { 'Content-Type': 'application/json' } : {}),
          ...(options.headers || {}),
        }),
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        const error = new Error((data && data.error) || `HTTP ${response.status}`);
        error.status = response.status;
        throw error;
      }
      return data;
    }

    function toast(message) {
      const el = $('#toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    function formData(form) {
      return Object.fromEntries(new FormData(form).entries());
    }

    function setForm(form, data = {}) {
      for (const field of form.elements) {
        if (!field.name) continue;
        if (field.type === 'file') continue;
        field.value = data[field.name] ?? '';
      }
    }

    function statusLabel(status) {
      return status === 'active' ? 'פעיל' : status === 'archived' ? 'ארכיון' : 'טיוטה';
    }

    function modeLabel(mode = state.mode) {
      return mode === 'customer' ? 'מחירון לקוח' : 'מחירון כללי';
    }

    function formatDateTime(value) {
      if (!value) return 'עדיין לא נשמר';
      const date = new Date(String(value).replace(' ', 'T'));
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'short' });
    }

    function applyModeUi() {
      $('#listTitle').textContent = modeLabel();
      $('#newBookBtn').textContent = `${modeLabel()} חדש`;
      $('#bookSearch').placeholder = state.mode === 'customer' ? 'קוד, לקוח או שם מחירון' : 'קוד או שם מחירון';
      $('#customerIdField').style.display = state.mode === 'customer' ? '' : 'none';
      $('#customerNameField').style.display = state.mode === 'customer' ? '' : 'none';
      $('#generalModeBtn').classList.toggle('active', state.mode === 'general');
      $('#customerModeBtn').classList.toggle('active', state.mode === 'customer');
      bookForm.elements.price_type.value = state.mode;
    }

    function renderBooks() {
      const query = $('#bookSearch').value.trim().toLowerCase();
      const books = state.books.filter(book => {
        const haystack = `${book.code} ${book.name} ${book.customer_name}`.toLowerCase();
        return !query || haystack.includes(query);
      });
      $('#bookCount').textContent = String(books.length);
      $('#bookList').innerHTML = books.length ? books.map(book => `
        <button class="book ${state.currentBook && state.currentBook.id === book.id ? 'active' : ''}" type="button" data-id="${book.id}">
          <span class="book-title">
            <span>${escapeHtml(book.code)} · ${escapeHtml(book.name)}</span>
            <span class="badge ${book.status === 'active' ? 'active' : 'draft'}">${statusLabel(book.status)}</span>
          </span>
          <span class="book-meta">
            <span>${escapeHtml(book.price_type === 'customer' ? (book.customer_name || 'לקוח ללא שם') : 'כללי')}</span>
            <span>${Number(book.active_item_count || 0)} שורות</span>
            <span>עודכן ${escapeHtml(formatDateTime(book.updated_at))}</span>
          </span>
        </button>
      `).join('') : '<div class="empty">אין מחירונים להצגה.</div>';
    }

    function renderCurrentBook() {
      const book = state.currentBook;
      if (!book) {
        $('#currentTitle').textContent = `בחר ${modeLabel()}`;
        $('#currentStatus').textContent = 'טיוטה';
        $('#currentStatus').className = 'badge draft';
        $('#updatedAtLabel').textContent = 'עדיין לא נשמר';
        setForm(bookForm, { currency: 'ILS', price_type: state.mode, status: 'draft' });
        applyModeUi();
        renderItems();
        return;
      }
      $('#currentTitle').textContent = `${book.code} · ${book.name}`;
      $('#currentStatus').textContent = statusLabel(book.status);
      $('#currentStatus').className = `badge ${book.status === 'active' ? 'active' : 'draft'}`;
      setForm(bookForm, book);
      $('#updatedAtLabel').textContent = formatDateTime(book.updated_at);
      applyModeUi();
    }

    function renderItems() {
      const tbody = $('#itemBody');
      if (!state.currentBook) {
        tbody.innerHTML = '<tr><td class="empty" colspan="11">עדיין לא נבחר מחירון.</td></tr>';
        return;
      }
      const query = $('#itemSearch').value.trim().toLowerCase();
      const rows = state.items.filter(item => {
        const haystack = `${item.sku} ${item.diameter || ''} ${item.category} ${item.description}`.toLowerCase();
        return !query || haystack.includes(query);
      });
      if (!rows.length) {
        tbody.innerHTML = '<tr><td class="empty" colspan="11">אין שורות במחירון הזה.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(item => `
        <tr>
          <td><strong>${escapeHtml(item.sku)}</strong></td>
          <td class="num">${item.diameter ? formatNumber(item.diameter) : ''}</td>
          <td>${escapeHtml(item.category || '')}</td>
          <td>${escapeHtml(item.description)}</td>
          <td class="num">${formatNumber(item.quantity)}</td>
          <td>${escapeHtml(item.unit)}</td>
          <td class="num">${formatNumber(item.price_before_vat)}</td>
          <td>${escapeHtml(item.currency)}</td>
          <td>${item.exception_flag ? '<span class="badge draft">כן</span>' : ''}</td>
          <td>${escapeHtml([item.valid_from, item.valid_to].filter(Boolean).join(' - '))}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" type="button" title="עריכה" data-edit="${item.id}">✎</button>
              <button class="icon-btn" type="button" title="מחיקה" data-delete="${item.id}">×</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('he-IL', { maximumFractionDigits: 3 });
    }

    function openImportDialog() {
      state.importDraft = null;
      setForm(importForm, { price_type: state.mode, currency: 'ILS' });
      $('#importStatus').textContent = 'בחר קובץ ולחץ “זהה מחירון”.';
      $('#importTable').innerHTML = '';
      $('#saveImportBtn').disabled = true;
      importDialog.showModal();
    }

    function renderImportDraft() {
      const draft = state.importDraft || { items: [] };
      $('#importTable').innerHTML = draft.items.length ? `
        <table>
          <thead>
            <tr>
              <th>מק״ט</th>
              <th>קוטר</th>
              <th>קטגוריה</th>
              <th>תיאור</th>
              <th>כמות</th>
              <th>יחידה</th>
              <th>מחיר לפני מע״מ</th>
              <th>הערות</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${draft.items.map((item, index) => `
              <tr data-import-row="${index}">
                <td><input data-import-field="sku" value="${escapeHtml(item.sku || '')}"></td>
                <td><input data-import-field="diameter" type="number" step="1" value="${escapeHtml(item.diameter ?? '')}"></td>
                <td><input data-import-field="category" value="${escapeHtml(item.category || '')}"></td>
                <td><input data-import-field="description" value="${escapeHtml(item.description || '')}"></td>
                <td><input data-import-field="quantity" type="number" step="0.001" value="${escapeHtml(item.quantity ?? 1)}"></td>
                <td>
                  <select data-import-field="unit">
                    ${['kg','ton','unit','m'].map(unit => `<option value="${unit}" ${item.unit === unit ? 'selected' : ''}>${unit}</option>`).join('')}
                  </select>
                </td>
                <td><input data-import-field="price_before_vat" type="number" step="0.01" value="${escapeHtml(item.price_before_vat ?? 0)}"></td>
                <td><input data-import-field="notes" value="${escapeHtml(item.notes || '')}"></td>
                <td><button class="icon-btn" type="button" data-remove-import-row="${index}">×</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div class="empty">לא זוהו שורות מחיר. אפשר לנסות קובץ ברור יותר.</div>';
      $('#saveImportBtn').disabled = !draft.items.length;
    }

    function syncImportDraftFromTable() {
      if (!state.importDraft) return;
      state.importDraft.items = Array.from(document.querySelectorAll('[data-import-row]')).map(row => {
        const item = {};
        row.querySelectorAll('[data-import-field]').forEach(field => {
          item[field.dataset.importField] = field.value;
        });
        item.diameter = item.diameter === '' ? null : Number(item.diameter);
        item.quantity = Number(item.quantity || 1);
        item.price_before_vat = Number(item.price_before_vat || 0);
        item.currency = importForm.elements.currency.value || state.importDraft.currency || 'ILS';
        return item;
      });
    }

    async function analyzeImport() {
      const file = importForm.elements.file.files[0];
      if (!file) return toast('צריך לבחור קובץ מחירון');
      $('#importStatus').textContent = 'מזהה מחירון...';
      $('#analyzeImportBtn').disabled = true;
      try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('currency', importForm.elements.currency.value || 'ILS');
        fd.append('requested_by_module', 'pricing');
        fd.append('requested_use_case', 'price_list_import');
        fd.append('target_module', 'pricing');
        fd.append('document_type_hint', 'price_list');
        const response = await fetch('/api/pricing/price-books/analyze-upload', {
          method: 'POST',
          headers: authHeaders(),
          body: fd,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        state.importDraft = data.draft || { items: [] };
        setForm(importForm, {
          ...formData(importForm),
          code: state.importDraft.code,
          name: state.importDraft.name,
          customer_name: importForm.elements.customer_name.value || state.importDraft.customer_name,
          currency: state.importDraft.currency || 'ILS',
          notes: state.importDraft.notes,
        });
        $('#importStatus').textContent = `זוהו ${state.importDraft.items.length} שורות. ערוך לפני שמירה.`;
        renderImportDraft();
      } finally {
        $('#analyzeImportBtn').disabled = false;
      }
    }

    async function saveImportDraft() {
      if (!state.importDraft) return;
      syncImportDraftFromTable();
      const meta = formData(importForm);
      const priceType = meta.price_type === 'customer' ? 'customer' : 'general';
      const data = await api('/api/pricing/price-books', {
        method: 'POST',
        body: JSON.stringify({
          code: meta.code || state.importDraft.code,
          name: meta.name || state.importDraft.name,
          price_type: priceType,
          customer_id: priceType === 'customer' ? (meta.customer_id || null) : null,
          customer_name: priceType === 'customer' ? meta.customer_name : '',
          currency: meta.currency || 'ILS',
          status: 'draft',
          source_type: 'ocr',
          source_ref: importForm.elements.file.files[0]?.name || '',
          notes: meta.notes || '',
        }),
      });
      for (const [index, item] of state.importDraft.items.entries()) {
        if (!item.sku || !item.description) continue;
        await api(`/api/pricing/price-books/${data.price_book.id}/items`, {
          method: 'POST',
          body: JSON.stringify({
            ...item,
            sort_order: index + 1,
            currency: meta.currency || item.currency || 'ILS',
          }),
        });
      }
      state.mode = priceType;
      state.currentBook = data.price_book;
      importDialog.close();
      toast('נוצרה טיוטת מחירון מה־OCR');
      await loadBooks(data.price_book.id);
    }

    async function loadBooks(selectId) {
      applyModeUi();
      state.books = await api(`/api/pricing/price-books?type=${state.mode}`);
      if (selectId) state.currentBook = state.books.find(book => book.id === selectId) || state.currentBook;
      if (!state.currentBook && state.books.length) state.currentBook = state.books[0];
      renderBooks();
      renderCurrentBook();
      if (state.currentBook) await loadItems(state.currentBook.id);
    }

    async function loadItems(bookId) {
      const data = await api(`/api/pricing/price-books/${bookId}/items`);
      state.currentBook = data.price_book;
      state.items = data.items || [];
      renderCurrentBook();
      renderBooks();
      renderItems();
    }

    async function saveBook(event) {
      event.preventDefault();
      const body = formData(bookForm);
      body.price_type = state.mode;
      if (state.mode === 'general') {
        body.customer_id = null;
        body.customer_name = '';
      }
      const method = state.currentBook ? 'PATCH' : 'POST';
      const url = state.currentBook ? `/api/pricing/price-books/${state.currentBook.id}` : '/api/pricing/price-books';
      const data = await api(url, { method, body: JSON.stringify(body) });
      state.currentBook = data.price_book;
      toast('המחירון נשמר');
      await loadBooks(state.currentBook.id);
    }

    function openItem(item = null) {
      state.editingItem = item;
      $('#itemDialogTitle').textContent = item ? 'עריכת שורת מחירון' : 'שורת מחירון חדשה';
      setForm(itemForm, item || {
        quantity: 1,
        unit: 'kg',
        price_before_vat: 0,
        currency: (state.currentBook && state.currentBook.currency) || 'ILS',
        exception_flag: 0,
        sort_order: state.items.length + 1,
      });
      itemDialog.showModal();
    }

    async function saveItem(event) {
      event.preventDefault();
      if (!state.currentBook) return;
      const body = formData(itemForm);
      body.exception_flag = body.exception_flag === '1';
      const method = state.editingItem ? 'PATCH' : 'POST';
      const suffix = state.editingItem ? `/${state.editingItem.id}` : '';
      await api(`/api/pricing/price-books/${state.currentBook.id}/items${suffix}`, { method, body: JSON.stringify(body) });
      itemDialog.close();
      toast('שורת המחירון נשמרה');
      await loadItems(state.currentBook.id);
      await loadBooks(state.currentBook.id);
    }

    async function deleteItem(itemId) {
      if (!state.currentBook || !confirm('למחוק את שורת המחירון?')) return;
      await api(`/api/pricing/price-books/${state.currentBook.id}/items/${itemId}`, { method: 'DELETE' });
      toast('השורה נמחקה');
      await loadItems(state.currentBook.id);
      await loadBooks(state.currentBook.id);
    }

    async function createSample() {
      const stamp = new Date().toISOString().slice(0, 10).replaceAll('-', '');
      const data = await api('/api/pricing/price-books', {
        method: 'POST',
        body: JSON.stringify({
          code: `GENERAL-SAMPLE-${stamp}`,
          name: 'מחירון כללי לדוגמה',
          customer_name: '',
          price_type: 'general',
          currency: 'ILS',
          status: 'draft',
          source_type: 'sample',
          source_ref: 'general-sample',
        }),
      });
      const rows = [
        ['D8', 8, 'ברזל מעובד', 'ברזל מעובד קוטר 8', 1, 'kg', 3.52],
        ['D10', 10, 'ברזל מעובד', 'ברזל מעובד קוטר 10', 1, 'kg', 3.62],
        ['D12', 12, 'ברזל מעובד', 'ברזל מעובד קוטר 12', 1, 'kg', 3.72],
        ['729020', null, 'רשת', 'רשת מרותכת לפי מפרט', 1, 'unit', 64],
        ['729040', null, 'הובלות', 'הובלה לאתר לקוח', 1, 'unit', 450],
      ];
      for (const [sku, diameter, category, description, quantity, unit, price_before_vat] of rows) {
        await api(`/api/pricing/price-books/${data.price_book.id}/items`, {
          method: 'POST',
          body: JSON.stringify({ sku, diameter, category, description, quantity, unit, price_before_vat, currency: 'ILS' }),
        });
      }
      state.currentBook = data.price_book;
      state.mode = 'general';
      toast('נוצר מחירון דוגמה');
      await loadBooks(data.price_book.id);
    }

    $('#bookList').addEventListener('click', event => {
      const button = event.target.closest('[data-id]');
      if (!button) return;
      const id = Number(button.dataset.id);
      const book = state.books.find(candidate => candidate.id === id);
      if (!book) return;
      state.currentBook = book;
      loadItems(id).catch(err => toast(err.message));
    });
    $('#bookSearch').addEventListener('input', renderBooks);
    $('#itemSearch').addEventListener('input', renderItems);
    document.querySelectorAll('[data-mode]').forEach(button => {
      button.addEventListener('click', async () => {
        state.mode = button.dataset.mode;
        state.currentBook = null;
        state.items = [];
        $('#bookSearch').value = '';
        renderCurrentBook();
        renderItems();
        await loadBooks();
      });
    });
    $('#newBookBtn').addEventListener('click', () => {
      state.currentBook = null;
      state.items = [];
      renderBooks();
      renderCurrentBook();
      renderItems();
      bookForm.elements.code.focus();
    });
    $('#addItemBtn').addEventListener('click', () => {
      if (!state.currentBook) return toast('צריך לבחור או לשמור מחירון קודם');
      openItem();
    });
    $('#itemBody').addEventListener('click', event => {
      const edit = event.target.closest('[data-edit]');
      const del = event.target.closest('[data-delete]');
      if (edit) {
        const item = state.items.find(candidate => candidate.id === Number(edit.dataset.edit));
        if (item) openItem(item);
      }
      if (del) deleteItem(Number(del.dataset.delete)).catch(err => toast(err.message));
    });
    bookForm.addEventListener('submit', event => saveBook(event).catch(err => toast(err.message)));
    itemForm.addEventListener('submit', event => {
      if (event.submitter && event.submitter.value === 'cancel') return;
      saveItem(event).catch(err => toast(err.message));
    });
    $('#sampleBtn').addEventListener('click', () => createSample().catch(err => toast(err.message)));
    $('#importOcrBtn').addEventListener('click', openImportDialog);
    $('#importTable').addEventListener('click', event => {
      const remove = event.target.closest('[data-remove-import-row]');
      if (!remove || !state.importDraft) return;
      syncImportDraftFromTable();
      state.importDraft.items.splice(Number(remove.dataset.removeImportRow), 1);
      renderImportDraft();
    });
    importForm.addEventListener('submit', event => {
      if (!event.submitter || event.submitter.value === 'cancel') return;
      event.preventDefault();
      if (event.submitter.value === 'analyze') {
        analyzeImport().catch(err => {
          $('#importStatus').textContent = err.message;
          toast(err.message);
        });
      } else if (event.submitter.value === 'save') {
        saveImportDraft().catch(err => toast(err.message));
      }
    });

    loadBooks().catch(err => toast(err.message));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>דשבורד – IronBend</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e07b39">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronBend">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --steel:#0f1923; --steel-mid:#1a2637; --steel-light:#243447;
    --iron:#2e4a6e; --accent:#e07b39; --accent-light:#f0954d;
    --success:#27ae60; --danger:#e74c3c; --warning:#f39c12;
    --text:#e8edf3; --text-dim:#7a93ab;
    --border:rgba(255,255,255,0.07); --card:rgba(255,255,255,0.04);
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Heebo',sans-serif;background:var(--steel);color:var(--text);min-height:100vh;}

  /* TOP NAV */
  .topnav{
    background:var(--steel-mid);border-bottom:1px solid var(--border);
    padding:0 20px;height:56px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:100;
    box-shadow:0 2px 16px rgba(0,0,0,0.4);
  }
  .logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-light));
    border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .top-nav-links{display:flex;gap:2px;}
  .nav-link{padding:7px 13px;border-radius:7px;text-decoration:none;color:var(--text-dim);
    font-size:13px;font-weight:600;transition:all 0.2s;white-space:nowrap;}
  .nav-link:hover{background:rgba(255,255,255,0.06);color:var(--text);}
  .nav-link.active{background:rgba(224,123,57,0.15);color:var(--accent);}
  .ws-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;transition:background 0.3s;flex-shrink:0;}
  .ws-dot.connected{background:var(--success);}
  #navTime{font-size:12px;color:var(--text-dim);}

  /* PAGE */
  .page{max-width:1280px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px;}

  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .kpi-card{background:var(--steel-mid);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;display:flex;flex-direction:column;gap:6px;}
  .kpi-icon{font-size:22px;}
  .kpi-label{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;}
  .kpi-value{font-size:36px;font-weight:900;line-height:1;}
  .kpi-sub{font-size:11px;color:var(--text-dim);}
  .c-accent{color:var(--accent);}
  .c-success{color:var(--success);}
  .c-warning{color:var(--warning);}
  .c-danger{color:var(--danger);}

  /* SECTION TITLE */
  .section-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

  /* MACHINES */
  .machines-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .machine-card{background:var(--steel-mid);border:2px solid var(--border);border-radius:var(--radius);
    padding:18px;position:relative;overflow:hidden;transition:border-color 0.3s;}
  .machine-card.online {border-color:rgba(39,174,96,0.35);}
  .machine-card.running{border-color:rgba(224,123,57,0.5);}
  .machine-card.error  {border-color:rgba(231,76,60,0.5);}
  .machine-card::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:var(--text-dim);}
  .machine-card.online::before {background:var(--success);}
  .machine-card.running::before{background:var(--accent);animation:pulse 1.5s infinite;}
  .machine-card.error::before  {background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .machine-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .machine-name{font-weight:800;font-size:14px;}
  .machine-port{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .machine-status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,0.07);color:var(--text-dim);}
  .machine-status-badge.running{background:rgba(224,123,57,0.2);color:var(--accent);}
  .machine-status-badge.online {background:rgba(39,174,96,0.15);color:var(--success);}
  .machine-status-badge.error  {background:rgba(231,76,60,0.15);color:var(--danger);}
  .machine-counter{display:flex;align-items:baseline;gap:7px;margin-bottom:10px;}
  .counter-num{font-size:44px;font-weight:900;color:var(--accent);line-height:1;}
  .counter-label{font-size:12px;color:var(--text-dim);font-weight:600;}
  .machine-job{background:rgba(255,255,255,0.04);border-radius:7px;padding:10px;font-size:12px;}
  .machine-job-label{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
  .machine-job-value{font-weight:700;}
  .machine-lastseen{font-size:10px;color:var(--text-dim);margin-top:10px;}

  /* ORDERS TABLE */
  .table-card{background:var(--steel-mid);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .table-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;min-width:600px;}
  th{text-align:right;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;
    letter-spacing:0.5px;padding:11px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
  td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .order-num-cell{color:var(--accent);font-weight:800;}
  .weight-cell{color:var(--accent);font-weight:700;}
  .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .s-wait{background:rgba(122,147,171,0.15);color:var(--text-dim);}
  .s-prod{background:rgba(224,123,57,0.2);color:var(--accent);}
  .s-done{background:rgba(39,174,96,0.15);color:var(--success);}
  .btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);
    color:var(--text-dim);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
    cursor:pointer;transition:all 0.2s;text-decoration:none;white-space:nowrap;display:inline-block;}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent);}

  /* ── MOBILE ── */
  @media(max-width:640px){
    .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;}
    .kpi-value{font-size:28px;}
    .kpi-card{padding:14px;}
    .machines-grid{grid-template-columns:1fr;}
    .counter-num{font-size:36px;}
    /* Orders table → cards */
    .table-wrap table,
    .table-wrap thead,
    .table-wrap tbody,
    .table-wrap th,
    .table-wrap td,
    .table-wrap tr{display:block;min-width:unset;}
    .table-wrap thead{display:none;}
    .table-wrap tr{
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
      border-radius:10px;margin:10px 16px;padding:14px;
    }
    .table-wrap tr:hover td{background:transparent;}
    .table-wrap td{
      padding:5px 0;border:none;font-size:13px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .table-wrap td::before{
      content:attr(data-label);color:var(--text-dim);font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:0.4px;flex-shrink:0;margin-left:10px;
    }
    .page{padding:14px 12px;gap:16px;}
    .section-title{font-size:14px;}
  }
  @media(max-width:400px){
    .kpi-grid{grid-template-columns:1fr 1fr;}
    .kpi-value{font-size:24px;}
  }
</style>
</head>
<body data-page="dashboard">
<script src="/nav.js"></script>

<nav class="topnav">
  <div class="logo">
    <div class="logo-icon">🔩</div>
    <span>IronBend</span>
  </div>
  <div class="top-nav-links">
    <a href="/dashboard.html" class="nav-link active">📊 דשבורד</a>
    <a href="/orders.html"    class="nav-link">📋 הזמנות</a>
    <a href="/index.html"     class="nav-link">➕ חדשה</a>
    <a href="/machine.html"   class="nav-link">🔧 מכונה</a>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="ws-dot" id="wsDot"></span>
    <span id="navTime"></span>
  </div>
</nav>

<div class="page">

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label">הזמנות היום</div>
      <div class="kpi-value c-accent" id="kpiOrdersToday">—</div>
      <div class="kpi-sub" id="kpiWeightToday">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">⚙️</div>
      <div class="kpi-label">בייצור</div>
      <div class="kpi-value c-warning" id="kpiInProd">—</div>
      <div class="kpi-sub" id="kpiItemsProd">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">✅</div>
      <div class="kpi-label">הושלמו היום</div>
      <div class="kpi-value c-success" id="kpiDone">—</div>
      <div class="kpi-sub" id="kpiItemsDone">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">⏳</div>
      <div class="kpi-label">ממתינות</div>
      <div class="kpi-value c-danger" id="kpiPending">—</div>
      <div class="kpi-sub">לאישור</div>
    </div>
  </div>

  <div>
    <div class="section-title">🔧 מצב מכונות</div>
    <div class="machines-grid" id="machinesGrid">
      <div style="color:var(--text-dim);font-size:14px">טוען...</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="section-title" style="margin:0">📋 הזמנות אחרונות</div>
      <a href="/orders.html" class="btn-sm">הכל</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>מספר</th><th>לקוח</th><th>אספקה</th><th>משקל</th><th>סטטוס</th><th></th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-dim)">טוען...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => document.getElementById('wsDot').classList.add('connected');
  ws.onclose = () => { document.getElementById('wsDot').classList.remove('connected'); setTimeout(connectWS,3000); };
  ws.onmessage = e => {
    const { type, data } = JSON.parse(e.data);
    if (type === 'machines_state') renderMachines(data);
    if (type === 'machine_update') updateMachineTile(data);
    if (['new_order','order_status','order_complete'].includes(type)) fetchDashboard();
  };
}

async function fetchDashboard() {
  try {
    const r = await fetch('/api/dashboard');
    const d = await r.json();
    document.getElementById('kpiOrdersToday').textContent = d.ordersToday;
    document.getElementById('kpiWeightToday').textContent = d.totalWeightToday.toFixed(0) + ' ק"ג';
    document.getElementById('kpiInProd').textContent      = d.inProduction;
    document.getElementById('kpiItemsProd').textContent   = d.itemsInProduction + ' פריטים';
    document.getElementById('kpiDone').textContent        = d.completedToday;
    document.getElementById('kpiItemsDone').textContent   = d.itemsDone + ' פריטים';
    document.getElementById('kpiPending').textContent     = d.pending;
    renderMachines(d.machines);
    renderOrdersTable(d.recentOrders);
  } catch { /* offline – cached data shown by SW */ }
}

function machineClass(m) {
  if (m.status === 'בייצור') return 'running';
  if (m.status === 'תקלה' || m.status === 'שגיאת תקשורת') return 'error';
  if (m.connected) return 'online';
  return '';
}

function renderMachines(machines) {
  if (!machines?.length) { document.getElementById('machinesGrid').innerHTML = '<div style="color:var(--text-dim)">אין מכונות</div>'; return; }
  document.getElementById('machinesGrid').innerHTML = machines.map(m => {
    const cls = machineClass(m);
    const badgeCls = cls === 'running' ? 'running' : cls === 'error' ? 'error' : cls === 'online' ? 'online' : '';
    return `<div class="machine-card ${cls}" id="machine-${m.id}">
      <div class="machine-header">
        <div><div class="machine-name">${m.name}</div><div class="machine-port">${m.port??''}</div></div>
        <div class="machine-status-badge ${badgeCls}">${m.status??'לא מחובר'}</div>
      </div>
      <div class="machine-counter">
        <div class="counter-num">${m.counter??0}</div>
        <div class="counter-label">יח'</div>
      </div>
      ${m.current_order_num
        ? `<div class="machine-job"><div class="machine-job-label">הזמנה פעילה</div><div class="machine-job-value">${m.current_order_num}</div></div>`
        : `<div class="machine-job" style="color:var(--text-dim)">אין עבודה פעילה</div>`}
      ${m.lastSeen ? `<div class="machine-lastseen">עדכון: ${new Date(m.lastSeen).toLocaleTimeString('he-IL')}</div>` : ''}
    </div>`;
  }).join('');
}

function updateMachineTile(data) {
  const el = document.getElementById(`machine-${data.id}`);
  if (!el) return;
  const cls = machineClass(data);
  el.className = `machine-card ${cls}`;
  const cEl = el.querySelector('.counter-num');
  const bEl = el.querySelector('.machine-status-badge');
  if (cEl) cEl.textContent = data.counter ?? 0;
  if (bEl) { bEl.textContent = data.status; bEl.className = `machine-status-badge ${cls === 'running' ? 'running' : cls === 'error' ? 'error' : cls === 'online' ? 'online' : ''}`; }
}

function statusBadgeClass(o) {
  if (o.status?.includes('הושלם')) return 's-done';
  if (o.status === 'בייצור') return 's-prod';
  return 's-wait';
}

function renderOrdersTable(orders) {
  if (!orders?.length) { document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-dim)">אין הזמנות</td></tr>'; return; }
  document.getElementById('ordersTableBody').innerHTML = orders.map(o => `
    <tr onclick="location.href='/orders.html?id=${o.id}'" style="cursor:pointer">
      <td data-label="מספר"><span class="order-num-cell">${o.order_num}</span></td>
      <td data-label="לקוח">${o.customer_name??'—'}</td>
      <td data-label="אספקה">${o.delivery_date??'—'}</td>
      <td data-label="משקל" class="weight-cell">${(o.total_weight||0).toFixed(0)} ק"ג</td>
      <td data-label="סטטוס"><span class="status-badge ${statusBadgeClass(o)}">${o.status}</span></td>
      <td><a href="/orders.html?id=${o.id}" class="btn-sm" onclick="event.stopPropagation()">פתח</a></td>
    </tr>`).join('');
}

function updateTime() {
  document.getElementById('navTime').textContent = new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}

connectWS();
fetchDashboard();
setInterval(fetchDashboard, 15000);
setInterval(updateTime, 1000);
updateTime();
</script>
</body>
</html>

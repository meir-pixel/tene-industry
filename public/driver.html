<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>נהג – IronBend</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a2332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="IronBend נהג">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --steel:#f0f4f8;--steel-mid:#ffffff;--steel-light:#e8edf4;
  --accent:#c9621a;--accent-light:#e07b39;--accent-dim:rgba(201,98,26,0.10);
  --success:#1a7a42;--success-dim:rgba(26,122,66,0.10);
  --danger:#b83227;--danger-dim:rgba(184,50,39,0.10);
  --warning:#a86b00;--warning-dim:rgba(168,107,0,0.10);
  --text:#1a2533;--text-dim:#526070;--text-muted:#8fa0b0;
  --border:rgba(0,0,0,0.09);--border-bright:rgba(0,0,0,0.15);
  --card:rgba(0,0,0,0.02);--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Heebo',sans-serif;background:var(--steel);color:var(--text);min-height:100vh;max-width:500px;margin:0 auto;}

.topnav{background:var(--steel-mid);border-bottom:1px solid var(--border);padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-light));
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}

.page{padding:16px;display:flex;flex-direction:column;gap:14px;}

/* DRIVER SELECT */
.driver-bar{background:var(--steel-mid);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;display:flex;align-items:center;gap:12px;}
.driver-icon{font-size:28px;}
.driver-info{flex:1;}
.driver-name{font-weight:700;font-size:16px;}
.driver-sub{font-size:12px;color:var(--text-dim);}
.change-btn{padding:7px 14px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid var(--border);
  color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'Heebo',sans-serif;}

/* DATE SELECTOR */
.date-row{display:flex;align-items:center;gap:10px;}
.date-label{font-size:13px;color:var(--text-dim);}
.date-input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;}

/* DELIVERY CARD */
.delivery-card{background:var(--steel-mid);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.2s;}
.delivery-card.done{opacity:0.5;}
.dc-header{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.dc-num{font-size:12px;font-weight:700;color:var(--text-dim);}
.dc-order{font-size:16px;font-weight:800;color:var(--text);}
.dc-customer{font-size:14px;color:var(--accent);font-weight:600;margin-top:2px;}
.dc-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-pending{background:rgba(243,156,18,0.15);color:var(--warning);}
.badge-departed{background:rgba(52,152,219,0.15);color:#3498db;}
.badge-done{background:rgba(39,174,96,0.15);color:var(--success);}
.badge-problem{background:rgba(231,76,60,0.15);color:var(--danger);}

.dc-details{padding:0 16px 10px;display:flex;gap:8px;flex-wrap:wrap;}
.dc-detail{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim);}
.dc-detail strong{color:var(--text);}

.dc-address{padding:0 16px 12px;font-size:13px;color:var(--text-dim);}
.dc-address strong{color:var(--text);display:block;margin-bottom:2px;}

.dc-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:700;transition:all 0.2s;min-height:44px;display:flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;flex:1;}
.btn-primary:active{background:var(--accent-light);}
.btn-nav{background:rgba(52,152,219,0.15);color:#3498db;border:1px solid rgba(52,152,219,0.3);}
.btn-danger{background:rgba(231,76,60,0.1);color:var(--danger);border:1px solid rgba(231,76,60,0.2);}
.btn-success{background:rgba(39,174,96,0.15);color:var(--success);border:1px solid rgba(39,174,96,0.3);flex:1;}
.btn-sm{font-size:12px;padding:8px 12px;min-height:38px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--steel-mid);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:12px;color:var(--text-dim);margin-bottom:6px;display:block;}
.modal-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.03);
  color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;direction:rtl;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;justify-content:center;}

/* SIGNATURE */
.sig-canvas{width:100%;height:160px;background:#fff;border-radius:10px;cursor:crosshair;touch-action:none;display:block;}
.sig-clear{margin-top:8px;font-size:12px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* SELECT DRIVER OVERLAY */
.overlay{position:fixed;inset:0;background:var(--steel);z-index:300;display:flex;flex-direction:column;}
.overlay-header{padding:20px;font-size:20px;font-weight:800;}
.driver-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.driver-item{padding:16px;background:var(--steel-mid);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;display:flex;align-items:center;gap:14px;font-size:15px;font-weight:600;}
.driver-item:active{background:rgba(224,123,57,0.1);}
</style>
<link rel="stylesheet" href="/theme.css">
<script src="/nav.js"></script></head>
<body data-page="driver">

<!-- Driver selection overlay -->
<div class="overlay" id="driverOverlay">
  <div class="overlay-header">🚚 בחר נהג</div>
  <div class="driver-list" id="driverList"></div>
</div>

<nav class="topnav">
  <div class="logo">
    <div class="logo-icon">🔩</div>
    <span>IronBend נהג</span>
  </div>
  <a href="/dashboard.html" style="color:var(--text-dim);font-size:12px;text-decoration:none;">← ניהול</a>
</nav>

<div class="page">
  <!-- Driver bar -->
  <div class="driver-bar">
    <div class="driver-icon">🚚</div>
    <div class="driver-info">
      <div class="driver-name" id="driverNameDisplay">טוען...</div>
      <div class="driver-sub" id="driverDate"></div>
    </div>
    <button class="change-btn" onclick="showDriverSelect()">החלף</button>
  </div>

  <!-- Date selector -->
  <div class="date-row">
    <span class="date-label">תאריך אספקה:</span>
    <input type="date" class="date-input" id="deliveryDate" onchange="loadDeliveries()">
  </div>

  <!-- Delivery list -->
  <div id="deliveryList"></div>
</div>

<!-- Delivery confirmation modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title">✅ אישור מסירה</div>
    <div class="modal-field">
      <label class="modal-label">חתימת לקוח:</label>
      <canvas id="sigCanvas" class="sig-canvas" width="400" height="160"></canvas>
      <button class="sig-clear" onclick="clearSignature()">נקה חתימה</button>
    </div>
    <div class="modal-field">
      <label class="modal-label">הערות:</label>
      <input type="text" class="modal-input" id="deliveryNotes" placeholder="הערות למסירה (אופציונלי)">
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" onclick="closeModal('confirmModal')">ביטול</button>
      <button class="btn btn-success" onclick="submitConfirm()">✅ אישור מסירה</button>
    </div>
  </div>
</div>

<!-- Problem report modal -->
<div class="modal-overlay" id="problemModal">
  <div class="modal">
    <div class="modal-title">⚠️ דיווח בעיה</div>
    <div class="modal-field">
      <label class="modal-label">סוג בעיה:</label>
      <select class="modal-input" id="problemType">
        <option value="לא נמצא">לקוח לא נמצא</option>
        <option value="סירב לקבל">לקוח סירב לקבל</option>
        <option value="כתובת שגויה">כתובת שגויה</option>
        <option value="חסר ברזל">חסר ברזל</option>
        <option value="נזק בהובלה">נזק בהובלה</option>
        <option value="אחר">אחר</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">פירוט:</label>
      <input type="text" class="modal-input" id="problemNotes" placeholder="תאר את הבעיה...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" onclick="closeModal('problemModal')">ביטול</button>
      <button class="btn btn-primary" onclick="submitProblem()">שלח דיווח</button>
    </div>
  </div>
</div>

<script>
let currentDriver = null;
let currentDeliveryId = null;
let sigCanvas, sigCtx, sigDrawing = false;
let lastPos = null;

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('deliveryDate').value = today;
  document.getElementById('driverDate').textContent = formatDate(today);

  // Signature canvas setup
  sigCanvas = document.getElementById('sigCanvas');
  sigCtx    = sigCanvas.getContext('2d');
  setupSignature();

  // GPS tracking
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      if (!currentDriver) return;
      fetch(`/api/drivers/${currentDriver.id}/location`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      }).catch(() => {});
    }, null, { enableHighAccuracy: true, maximumAge: 30000 });
  }

  loadDrivers();
});

async function loadDrivers() {
  const res  = await fetch('/api/drivers');
  const list = await res.json();
  const el   = document.getElementById('driverList');

  if (!list.length) {
    el.innerHTML = `<div style="padding:20px;color:var(--text-dim);text-align:center">אין נהגים מוגדרים במערכת</div>`;
    return;
  }

  el.innerHTML = list.map(d => `
    <div class="driver-item" onclick="selectDriver(${JSON.stringify(JSON.stringify(d))})">
      <span style="font-size:24px">🚚</span>
      <div>
        <div>${d.name}</div>
        <div style="font-size:12px;color:var(--text-dim)">${d.phone || ''}</div>
      </div>
    </div>
  `).join('');
}

function selectDriver(jsonStr) {
  currentDriver = JSON.parse(jsonStr);
  document.getElementById('driverNameDisplay').textContent = currentDriver.name;
  document.getElementById('driverOverlay').style.display = 'none';
  loadDeliveries();
}

function showDriverSelect() {
  document.getElementById('driverOverlay').style.display = 'flex';
}

// ── DELIVERIES ────────────────────────────────────────────────────
async function loadDeliveries() {
  if (!currentDriver) return;
  const date = document.getElementById('deliveryDate').value;
  const res  = await fetch(`/api/deliveries?driverId=${currentDriver.id}&date=${date}`);
  const list = await res.json();
  renderDeliveries(list);
}

function renderDeliveries(list) {
  const el = document.getElementById('deliveryList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div>אין משלוחים לתאריך זה</div></div>`;
    return;
  }
  el.innerHTML = list.map((d, i) => deliveryCard(d, i + 1)).join('');
}

function deliveryCard(d, num) {
  const statusBadge = {
    'ממתין':  ['badge-pending',  'ממתין'],
    'יצא':    ['badge-departed', 'בדרך'],
    'סופק':   ['badge-done',     'סופק ✓'],
    'בעיה':   ['badge-problem',  'בעיה ⚠️'],
  }[d.status] || ['badge-pending', d.status];

  const isDone    = ['סופק','ביטול'].includes(d.status);
  const departed  = d.status === 'יצא';
  const canDepart = d.status === 'ממתין';

  const wazeUrl  = `https://waze.com/ul?q=${encodeURIComponent(d.delivery_address || '')}`;
  const mapsUrl  = `https://maps.google.com/?q=${encodeURIComponent(d.delivery_address || '')}`;

  return `
  <div class="delivery-card ${isDone ? 'done' : ''}">
    <div class="dc-header">
      <div>
        <div class="dc-num">אספקה #${num}</div>
        <div class="dc-order">${d.order_num}</div>
        <div class="dc-customer">${d.customer_name || ''}</div>
      </div>
      <span class="dc-badge ${statusBadge[0]}">${statusBadge[1]}</span>
    </div>
    <div class="dc-address">
      <strong>📍 כתובת:</strong>
      ${d.delivery_address || 'לא הוזנה'}
    </div>
    <div class="dc-details">
      <div class="dc-detail">📦 <strong>${d.pallets_count}</strong> משטחים</div>
      <div class="dc-detail">⚖️ <strong>${(d.billing_weight || d.total_weight || 0).toFixed(1)}</strong> ק"ג</div>
      <div class="dc-detail">📞 <strong>${d.customer_phone || '—'}</strong></div>
    </div>
    <div class="dc-actions">
      ${!isDone ? `
        <button class="btn btn-nav btn-sm" onclick="navigate('${wazeUrl}')">🗺️ Waze</button>
        <button class="btn btn-nav btn-sm" onclick="navigate('${mapsUrl}')">📍 Maps</button>
        ${d.customer_phone ? `<button class="btn btn-nav btn-sm" onclick="callCustomer('${d.customer_phone}')">📞</button>` : ''}
      ` : ''}
      ${canDepart ? `<button class="btn btn-primary" onclick="depart(${d.id})">🚚 יצאתי – בדרך</button>` : ''}
      ${departed ? `
        <button class="btn btn-success" onclick="openConfirm(${d.id})">✅ אישור מסירה</button>
        <button class="btn btn-danger btn-sm" onclick="openProblem(${d.id})">⚠️ בעיה</button>
      ` : ''}
      ${isDone && d.status === 'סופק' ? `<div style="color:var(--success);font-size:13px;padding:4px 0">✅ סופק ב-${formatTime(d.delivered_at)}</div>` : ''}
    </div>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────
async function depart(deliveryId) {
  if (!confirm('לאשר יציאה לאספקה?')) return;
  await fetch(`/api/deliveries/${deliveryId}/depart`, { method: 'POST' });
  loadDeliveries();
}

function openConfirm(deliveryId) {
  currentDeliveryId = deliveryId;
  clearSignature();
  document.getElementById('deliveryNotes').value = '';
  openModal('confirmModal');
}

async function submitConfirm() {
  const sig   = sigCanvas.toDataURL('image/png');
  const notes = document.getElementById('deliveryNotes').value;

  // Get GPS
  let lat = null, lng = null;
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 3000 }));
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
  } catch {}

  await fetch(`/api/deliveries/${currentDeliveryId}/confirm`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ signatureData: sig, notes, lat, lng }),
  });
  closeModal('confirmModal');
  loadDeliveries();
}

function openProblem(deliveryId) {
  currentDeliveryId = deliveryId;
  openModal('problemModal');
}

async function submitProblem() {
  const problemType  = document.getElementById('problemType').value;
  const problemNotes = document.getElementById('problemNotes').value;
  await fetch(`/api/deliveries/${currentDeliveryId}/problem`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ problemType, problemNotes }),
  });
  closeModal('problemModal');
  loadDeliveries();
}

function navigate(url) { window.open(url, '_blank'); }
function callCustomer(phone) { window.open(`tel:${phone}`); }

// ── SIGNATURE ─────────────────────────────────────────────────────
function setupSignature() {
  const getPos = (e) => {
    const rect = sigCanvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * (sigCanvas.width / rect.width),
      y: (src.clientY - rect.top)  * (sigCanvas.height / rect.height),
    };
  };
  const start = (e) => { e.preventDefault(); sigDrawing = true; lastPos = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(lastPos.x, lastPos.y); };
  const draw  = (e) => { if (!sigDrawing) return; e.preventDefault(); const p = getPos(e); sigCtx.lineWidth = 2; sigCtx.strokeStyle = '#000'; sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); lastPos = p; };
  const stop  = () => { sigDrawing = false; };
  sigCanvas.addEventListener('mousedown', start); sigCanvas.addEventListener('mousemove', draw); sigCanvas.addEventListener('mouseup', stop);
  sigCanvas.addEventListener('touchstart', start, { passive: false }); sigCanvas.addEventListener('touchmove', draw, { passive: false }); sigCanvas.addEventListener('touchend', stop);
}

function clearSignature() {
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
}

// ── MODALS ────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── UTILS ─────────────────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
}

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}
</script>
<script src="/help.js"></script>
</body>

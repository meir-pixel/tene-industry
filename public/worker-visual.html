<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>דשבורד איסוף כרטיסים – IronBend</title>
  <style>
    :root{--navy:#0b4262;--blue:#0c567a;--teal:#17766d;--ink:#072e49;--line:#c8dce6;--bg:#edf5f7;--soft:#f8fcfd;--wait:#b56c14;--done:#467c3b;--supplied:#625194}
    *{box-sizing:border-box}html{min-width:0}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif;direction:rtl;min-width:0;overflow-x:hidden}
    header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;gap:18px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:4;min-width:0}
    header h1{margin:0;font-size:24px}.brand{min-width:0}.brand small{display:block;letter-spacing:2px;color:#bce0ed;margin-bottom:3px}
    .live{display:flex;align-items:center;gap:8px;font-weight:700}.dot{width:11px;height:11px;border-radius:50%;background:#4fe083;box-shadow:0 0 0 5px #ffffff18}
    .progress{background:#073653;padding:9px 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;color:#fff;position:sticky;top:67px;z-index:3}
    .scan-panel{max-width:1500px;margin:14px auto 0;padding:0 18px}.scan-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.scan-box input{width:100%;border:1px solid var(--line);border-radius:10px;padding:13px 12px;font-size:16px;font-weight:700;color:var(--ink);direction:ltr}.scan-box button{border:0;background:var(--teal);color:#fff;border-radius:10px;padding:13px 16px;font-size:14px;font-weight:800;cursor:pointer}.scan-hint{font-size:12px;color:#55737e;margin-top:6px}.scan-result{margin-top:8px;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:800;display:none}.scan-result.ok{display:block;background:#e5f5f2;color:#0f5f56;border:1px solid #99d8cd}.scan-result.err{display:block;background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .metric{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;font-size:12px;font-weight:700}
    .bar{height:8px;background:#ffffff2c;border-radius:6px;overflow:hidden}.bar i{height:100%;display:block;background:#7cd8cf;border-radius:6px}
    main{padding:18px;max-width:1500px;margin:auto}.tabs{display:none;margin-bottom:12px;gap:8px}.tabs button{flex:1;padding:12px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:700;color:var(--ink)}
    .columns{display:grid;grid-template-columns:minmax(240px,285px) minmax(0,1fr);gap:16px;min-width:0}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;min-width:0}
    .panel h2{font-size:17px;margin:0;padding:15px;border-bottom:1px solid var(--line)}#orders{padding:10px;display:grid;gap:8px;max-height:calc(100vh - 190px);overflow:auto}
    .order{border:1px solid var(--line);border-radius:10px;padding:11px;text-align:right;background:var(--soft);color:var(--ink);cursor:pointer}.order.active{border:2px solid var(--teal);background:#e5f5f2}
    .order strong,.order span{display:block}.order span{font-size:12px;margin-top:4px;color:#446777}
    .stage{min-width:0}.order-head{background:var(--blue);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .order-head h2{font-size:21px;margin:0}.order-head span{display:block;margin-top:4px;font-size:13px;color:#d8f2fa}.order-head .badge{background:#ffffff22;border-radius:20px;padding:7px 12px;font-weight:700}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:16px;min-width:0}.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;min-width:0;box-shadow:0 10px 26px rgba(7,46,73,.08)}.card.scanned{border-color:var(--teal);box-shadow:0 0 0 4px #17766d22,0 12px 26px #063a4f18}.card.scanned .card-head{background:#e8f7f4}.card.scanned::before{content:'כרטיס נסרק';display:block;background:var(--teal);color:#fff;font-weight:900;text-align:center;padding:7px 10px}
    .card-head{background:#f6fbfc;padding:12px 14px;display:grid;gap:10px;min-width:0;border-bottom:1px solid #d9e9ef}.worker-card-title{display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0}.worker-card-title b{font-size:20px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.worker-status-pill{border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#fff;color:var(--ink);border:1px solid var(--line);white-space:nowrap}.worker-status-pill.production{background:#fff7ed;border-color:#fdba74;color:#9a3412}.worker-status-pill.done{background:#ecfdf5;border-color:#86efac;color:#166534}.worker-status-pill.supplied{background:#f4f0ff;border-color:#c4b5fd;color:#4c1d95}.worker-card-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.worker-metric{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center;min-width:0}.worker-metric span{display:block;color:#55737e;font-size:11px;font-weight:800}.worker-metric strong{display:block;margin-top:2px;color:var(--ink);font-size:22px;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .drawing{height:245px;padding:8px 8px 2px;background:#fff;position:relative}.drawing svg{width:100%;height:100%;display:block}.shape{fill:none;stroke:#0c5475;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.angle{fill:none;stroke:#0c5475;stroke-width:4}.measure{fill:#062c46;font-size:15px;font-weight:700}.detail{fill:#79510a;font-size:13px;font-weight:700}.shape-scale-note{position:absolute;left:8px;bottom:7px;border:1px solid var(--line);background:#ffffffde;border-radius:999px;padding:4px 8px;color:#55737e;font-size:10px;font-weight:700}
    .worker-primary-actions{padding:10px 12px;background:#fff;display:grid;grid-template-columns:1fr;gap:8px}.worker-action{border:1px solid var(--teal);background:var(--teal);color:#fff;border-radius:12px;padding:14px 12px;font-size:16px;font-weight:900;cursor:pointer}.worker-action.waiting{background:var(--teal);border-color:var(--teal)}.worker-action.production{background:var(--done);border-color:var(--done)}.worker-action.done,.worker-action.supplied{background:#fff;color:#55737e;border-color:var(--line)}
    .worker-inline-panel{border-top:1px solid #e3eef2;background:#f8fcfd;padding:10px 12px 12px;display:grid;gap:10px}.worker-inline-title{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#31566a;font-size:13px;font-weight:900}.worker-fields{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;align-items:end}.worker-field{display:grid;gap:4px;min-width:0}.worker-field label{font-size:10px;font-weight:800;color:#55737e}.worker-field input,.worker-field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 7px;font-size:14px;font-weight:700;color:var(--ink);background:#fff}.worker-field textarea{min-height:38px;resize:vertical;font-size:12px}.worker-field.note-field{grid-column:span 2}.worker-save{border:1px solid var(--teal);background:var(--teal);color:#fff;border-radius:8px;padding:9px 10px;font-weight:900;cursor:pointer}.unit-progress{grid-column:1/-1;display:grid;grid-template-columns:auto 1fr auto;gap:7px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px}.unit-progress button{border:1px solid var(--teal);background:#fff;color:var(--teal);border-radius:8px;padding:8px 10px;font-weight:900;cursor:pointer}.unit-progress button.plus{background:var(--teal);color:#fff}.unit-progress strong{text-align:center;font-size:14px}.weight-chip{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 7px;font-size:14px;font-weight:900;text-align:center;min-height:35px}.weight-chip.warn{border-color:#f59e0b;background:#fff7ed;color:#9a3412}.weight-chip.bad{border-color:#dc2626;background:#fef2f2;color:#991b1b}
    .worker-status-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.worker-status-actions button{padding:9px 4px;border:1px solid #b8cfd8;border-radius:9px;background:#fff;color:var(--ink);font-size:11px;font-weight:800;cursor:pointer}.worker-status-actions button.active{background:var(--teal);color:#fff;border-color:var(--teal)}.worker-status-actions button.done.active{background:var(--done)}.worker-status-actions button.supplied.active{background:var(--supplied)}.meta{font-size:11px;color:#55737e;display:flex;gap:8px;justify-content:space-between}
    .empty{background:#fff;border:1px dashed var(--line);padding:38px;border-radius:14px;text-align:center;color:#567784}
    body.scan-entry .queue-link,body.scan-entry .scan-panel,body.scan-entry .tabs,body.scan-entry .panel{display:none!important}
    body.scan-entry .columns{display:block}
    body.scan-entry main{max-width:760px;padding:12px}
    @media(max-width:760px){
      header{padding:10px 12px;gap:10px;align-items:flex-start}
      header h1{font-size:17px;line-height:1.15}
      .brand small{font-size:10px;letter-spacing:.8px}
      header a{padding:7px 9px!important;font-size:12px;white-space:nowrap}
      .live{font-size:12px;white-space:nowrap}
      .progress{top:58px;padding:8px;gap:6px;grid-template-columns:repeat(2,minmax(0,1fr))}
      .metric{grid-template-columns:1fr auto;font-size:11px;min-width:0}
      .metric .bar{grid-column:1/-1}
      .scan-panel{padding:0 10px;margin-top:10px}.scan-box{grid-template-columns:1fr}.scan-box input,.scan-box button{font-size:16px;padding:14px 12px}
      main{padding:10px}
      .columns{display:block}
      .tabs{display:flex;position:sticky;top:122px;z-index:2}
      .panel{margin-bottom:12px}
      .panel.mobile-hidden,.stage.mobile-hidden{display:none}
      #orders{max-height:calc(100dvh - 225px)}
      .order-head{padding:12px;margin-bottom:10px}
      .order-head h2{font-size:18px}
      .grid{grid-template-columns:1fr;gap:10px}
      .card-head{gap:8px;padding:9px}
      .worker-card-title b{font-size:17px}
      .worker-card-summary{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
      .worker-metric{padding:7px 5px}.worker-metric strong{font-size:18px}
      .drawing{height:220px}
      .worker-fields{grid-template-columns:1fr 1fr;gap:8px}
      .worker-field.note-field{grid-column:1/-1}
      .worker-save{grid-column:1/-1}
      .worker-status-actions{grid-template-columns:repeat(2,1fr)}
      .worker-status-actions button{font-size:12px;padding:12px 6px}
    }
  </style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
  <header>
    <div class="brand"><small>טנא תעשיות · תחנת עובד</small><h1>דשבורד איסוף כרטיסים</h1></div>
    <div class="live"><i class="dot"></i><span id="sync">מסנכרן</span></div>
    <a class="queue-link" href="/production-queue.html" style="color:#fff;text-decoration:none;border:1px solid #ffffff55;border-radius:8px;padding:8px 11px;font-weight:700">תור ייצור</a>
  </header>
  <div class="progress" id="progress"></div>
  <section class="scan-panel">
    <div class="scan-box">
      <input id="cardScanInput" autocomplete="off" inputmode="text" placeholder="סרוק QR או הקלד מספר כרטיס">
      <button type="button" onclick="openScannedCard()">פתח כרטיס</button>
    </div>
    <div class="scan-hint">סריקת QR מהכרטיס המודפס תפתח כאן ישירות את הכרטיס לעדכון סטטוס, משקל ועבודה נוכחית.</div>
    <div id="scanResult" class="scan-result"></div>
  </section>
  <main>
    <nav class="tabs"><button data-pane="stage">הזמנה פתוחה</button><button data-pane="panel">הזמנות ממתינות</button></nav>
    <div class="columns">
      <aside class="panel"><h2>הזמנות ממתינות <span id="count"></span></h2><div id="orders"></div></aside>
      <section class="stage"><div id="orderHead"></div><div class="grid" id="cards"></div></section>
    </div>
  </main>
  <script src="/auth-client.js"></script>
  <script src="/status-contracts-client.js"></script>
  <script>
    const state={items:[],selected:null,focusItemId:null,scanToken:null};
    const ENTRY_PARAMS=new URLSearchParams(location.search);
    const SCAN_ENTRY=ENTRY_PARAMS.get('scan')==='1'||ENTRY_PARAMS.has('card')||ENTRY_PARAMS.has('item');
    document.body.classList.toggle('scan-entry',SCAN_ENTRY);
    const ITEM_STATUS=(window.IronBendStatus&&window.IronBendStatus.ITEM_STATUS)||{WAITING:'ממתין',IN_PRODUCTION:'בייצור',DONE:'הושלם',DELIVERED:'סופק'};
    const statusKey=s=>s===ITEM_STATUS.IN_PRODUCTION?'production':s===ITEM_STATUS.DONE?'done':s===ITEM_STATUS.DELIVERED?'supplied':'waiting';
    const statusText={waiting:'ממתין',production:'בייצור',done:'בוצע',supplied:'סופק'};
    const apiStatus={waiting:ITEM_STATUS.WAITING,production:ITEM_STATUS.IN_PRODUCTION,done:ITEM_STATUS.DONE,supplied:ITEM_STATUS.DELIVERED};
    const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const segments=item=>{try{return JSON.parse(item.segments||'[]')}catch{return[]}};
    const total=item=>Number(item.total_length_mm)||segments(item).reduce((n,s)=>n+Number(s.length_mm||0),0);
    const supplied=o=>/סופק|נשלח/.test(o.order_status||'');
    function parseCardToken(raw){
      const value=String(raw||'').trim();
      if(!value)return null;
      let token=value;
      try{const url=new URL(value,location.origin);token=url.searchParams.get('card')||url.searchParams.get('item')||value}catch{}
      const clean=String(token||'').trim();
      const itemParam=/^\d+$/.test(clean)?Number(clean):null;
      const match=clean.match(/-(\d{1,12})(?:-[A-Z]+[A-Z0-9]*)*(?:-C(\d+)OF(\d+))?$/i);
      return {raw:value,token:clean,itemId:itemParam||(match?Number(match[1]):null),cardIndex:match&&match[2]?Number(match[2]):1,cardTotal:match&&match[3]?Number(match[3]):1};
    }
    function scanFromLocation(){
      const params=new URLSearchParams(location.search);
      return parseCardToken(params.get('card')||params.get('item')||'');
    }
    function showScanResult(message,kind='ok'){const el=document.querySelector('#scanResult');if(!el)return;el.textContent=message;el.className=`scan-result ${kind}`;}
    function focusScannedCard(parsed){
      if(!parsed||!parsed.itemId)return false;
      const item=state.items.find(row=>Number(row.id)===Number(parsed.itemId));
      if(!item)return false;
      state.focusItemId=Number(item.id);
      state.scanToken=parsed.token;
      state.selected=item.order_id;
      const input=document.querySelector('#cardScanInput');
      if(input)input.value=parsed.token||String(item.id);
      render();
      requestAnimationFrame(()=>document.querySelector(`[data-item-id="${item.id}"]`)?.scrollIntoView({behavior:'smooth',block:'start'}));
      showScanResult(`נפתח כרטיס ${parsed.cardTotal>1?parsed.cardIndex+'/'+parsed.cardTotal+' · ':''}${item.order_num||item.order_id}`,'ok');
      return true;
    }
    function openScannedCard(){
      const parsed=parseCardToken(document.querySelector('#cardScanInput')?.value||'');
      if(!focusScannedCard(parsed))showScanResult('לא נמצא כרטיס מתאים בתור הייצור. בדוק שההזמנה קיימת ושהקוד נסרק במלואו.','err');
    }
    function grouped(){const map=new Map();state.items.forEach(item=>{if(!map.has(item.order_id))map.set(item.order_id,{...item,items:[]});map.get(item.order_id).items.push(item)});return [...map.values()]}
    function allProgress(){
      const orders=grouped(),selectedOrder=orders.find(o=>o.order_id===state.selected),items=selectedOrder?selectedOrder.items:state.items,totalItems=items.length||1;
      const counts={waiting:0,production:0,done:0,supplied:0};
      items.forEach(i=>counts[supplied(i)?'supplied':statusKey(i.status)]++);
      document.querySelector('#progress').innerHTML=Object.keys(counts).map(k=>{
        const pct=Math.round(counts[k]*100/totalItems);
        return `<div class="metric"><span>${statusText[k]}</span><span class="bar"><i style="width:${pct}%"></i></span><b>${counts[k]} · ${pct}%</b></div>`
      }).join('');
      document.querySelector('#count').textContent=`(${orders.length})`;
    }
    function render(){
      const orders=grouped();
      if(!orders.some(o=>o.order_id===state.selected))state.selected=orders[0]?.order_id||null;
      allProgress();
      document.querySelector('#orders').innerHTML=orders.length?orders.map(o=>`<button class="order ${o.order_id===state.selected?'active':''}" onclick="selectOrder(${o.order_id})"><strong>${esc(o.order_num||`הזמנה ${o.order_id}`)}</strong><span>${esc(o.customer_name||'לקוח')} · ${o.items.length} כרטיסים</span><span>${o.items.filter(i=>statusKey(i.status)==='done').length}/${o.items.length} בוצעו</span></button>`).join(''):'<div class="empty">אין הזמנות ממתינות</div>';
      const order=orders.find(o=>o.order_id===state.selected);
      document.querySelector('#orderHead').innerHTML=order?`<div class="order-head"><div><h2>${esc(order.order_num||`הזמנה ${order.order_id}`)}</h2><span>${esc(order.customer_name||'לקוח')} · עדיפות ${esc(order.priority||'רגיל')}</span></div><div class="badge">${order.items.length} כרטיסים</div></div>`:'';
      const visibleItems=order?(SCAN_ENTRY?(state.focusItemId?order.items.filter(item=>Number(item.id)===Number(state.focusItemId)):[]):order.items):[];
      document.querySelector('#cards').innerHTML=order&&visibleItems.length?visibleItems.map((item,index)=>card(item,index)).join(''):order?'<div class="empty">הכרטיס שנסרק לא נמצא בהזמנה הפתוחה</div>':'<div class="empty">אין הזמנה פתוחה</div>';
    }
    function card(item,index){
      const key=supplied(item)?'supplied':statusKey(item.status);
      const scanned=Number(item.id)===Number(state.focusItemId);
      const mainKey=key==='waiting'?'production':key==='production'?'done':key;
      const mainText=key==='waiting'?'התחל ייצור':key==='production'?'סיים כרטיס':statusText[key];
      const disabled=key==='done'||key==='supplied'?' disabled':'';
      const cardTitle=scanned&&state.scanToken?esc(state.scanToken):index+1;
      return `<article class="card ${scanned?'scanned':''}" data-item-id="${item.id}"><div class="card-head"><div class="worker-card-title"><b>כרטיס ${cardTitle}</b><span class="worker-status-pill ${key}">${statusText[key]}</span></div><div class="worker-card-summary"><div class="worker-metric"><span>כמות</span><strong>${Number(item.quantity)||0} יח׳</strong></div><div class="worker-metric"><span>קוטר</span><strong>Ø ${esc(item.diameter||'-')}</strong></div><div class="worker-metric"><span>אורך</span><strong>${total(item)} מ״מ</strong></div></div></div><div class="drawing">${drawing(item)}<span class="shape-scale-note">תצוגה קריאה</span></div><div class="worker-primary-actions"><button class="worker-action ${key}" onclick="setStatus(${item.id},'${mainKey}')" ${disabled}>${mainText}</button></div>${inlineProductionPanel(item,key)}</article>`
    }
    function targetWeight(item){return Number(item.weight ?? item.total_weight ?? 0)||0}
    function actualWeight(item){return Number(item.actual_weight_kg ?? 0)||0}
    function requestedQty(item){return Number(item.quantity)||0}
    function isUnitProgressItem(item){return /pile|cage|כלונס|כלונסאות|כלוב|כלובי/.test([item.shape_id,item.shape_name,item.note].map(v=>String(v||'').toLowerCase()).join(' '))}
    function producedQty(item){return Number(item.produced_qty ?? 0)||0}
    function fmtWeight(value){const n=Number(value)||0;return n?`${n.toFixed(n>=10?1:2)} ק״ג`:'—'}
    function weightDeviation(item){
      const target=targetWeight(item),actual=actualWeight(item);
      if(!target||!actual)return null;
      return ((actual-target)/target)*100;
    }
    function weightClass(pct){
      if(pct==null)return '';
      const abs=Math.abs(pct);
      return abs>10?'bad':abs>5?'warn':'';
    }
    function inlineProductionPanel(item,key){
      const target=targetWeight(item),actual=actualWeight(item),pct=weightDeviation(item),cls=weightClass(pct),produced=producedQty(item),requested=requestedQty(item);
      const pctText=pct==null?'—':`${pct>0?'+':''}${pct.toFixed(1)}%`;
      const note=esc(item.note||'');
      const unitProgress=isUnitProgressItem(item)?`<div class="unit-progress"><button type="button" onclick="adjustProducedQty(${item.id},-1,event)">-</button><strong>${produced}/${requested||'?'} יחידות הושלמו</strong><button class="plus" type="button" onclick="adjustProducedQty(${item.id},1,event)">+ יחידה</button></div>`:'';
      return `<div class="worker-inline-panel" onclick="event.stopPropagation()"><div class="worker-inline-title"><span>עדכון עבודה</span><span>${esc(item.machine||'ללא מכונה')}</span></div><div class="worker-fields"><div class="worker-field"><label>יוצר</label><input id="produced-qty-${item.id}" type="number" min="0" max="${requested||''}" step="1" value="${produced||''}" placeholder="יח׳"></div><div class="worker-field"><label>משקל רצוי</label><div class="weight-chip">${fmtWeight(target)}</div></div><div class="worker-field"><label>משקל מצוי</label><input id="actual-weight-${item.id}" type="number" min="0" step="0.01" value="${actual||''}" placeholder="ק״ג"></div><div class="worker-field"><label>סטייה</label><div class="weight-chip ${cls}">${esc(pctText)}</div></div>${unitProgress}<div class="worker-field note-field"><label>הערה</label><textarea id="production-note-${item.id}" rows="1" placeholder="הערת ייצור">${note}</textarea></div><button class="worker-save" onclick="saveProductionFields(${item.id},event)">שמור</button></div><div class="worker-status-actions">${['waiting','production','done','supplied'].map(k=>`<button class="${k==='done'?'done ':''}${k==='supplied'?'supplied ':''}${k===key?'active':''}" onclick="setStatus(${item.id},'${k}')">${statusText[k]}</button>`).join('')}</div><div class="meta"><span>${key==='supplied'?'סופק':statusText[key]}</span><span>${esc(item.shape_name||'צורה')}</span></div></div>`;
    }
    function drawing(item){
      if(item.shape_svg)return item.shape_svg;
      return '<svg data-shape-kind="worker-canonical-missing" viewBox="0 0 360 190"><rect x="26" y="32" width="308" height="126" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text class="detail" x="180" y="87" text-anchor="middle">אין תצוגת צורה</text><text class="measure" x="180" y="116" text-anchor="middle">נדרש shape_svg מהשרת</text></svg>';
    }
    async function saveProductionFields(id,event){
      event&&event.stopPropagation();
      const weightInput=document.getElementById(`actual-weight-${id}`);
      const qtyInput=document.getElementById(`produced-qty-${id}`);
      const noteInput=document.getElementById(`production-note-${id}`);
      const weightText=(weightInput?.value||'').trim();
      const qtyText=(qtyInput?.value||'').trim();
      const actual=Number(weightText||0);
      const produced=Number(qtyText||0);
      const item=state.items.find(item=>item.id===id);
      const requested=item?requestedQty(item):0;
      if((weightText&&!Number.isFinite(actual))||actual<0)return;
      if((qtyText&&!Number.isFinite(produced))||produced<0||!Number.isInteger(produced))return;
      if(qtyText&&requested&&produced>requested)return;
      const payload={note:noteInput?.value||''};
      if(weightText)payload.actual_weight_kg=actual;
      if(qtyText)payload.produced_qty=produced;
      const r=await fetch(`/api/items/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(r.ok){const item=state.items.find(item=>item.id===id);if(item){if(weightText){item.actual_weight_kg=actual;const target=targetWeight(item);item.weight_deviation_pct=target?((actual-target)/target)*100:null}if(qtyText)item.produced_qty=produced;item.note=payload.note}render()}
    }
    async function adjustProducedQty(id,delta,event){
      event&&event.stopPropagation();
      const item=state.items.find(item=>item.id===id);
      if(!item)return;
      const requested=requestedQty(item);
      const next=Math.max(0,Math.min(requested||Number.MAX_SAFE_INTEGER,producedQty(item)+delta));
      const input=document.getElementById(`produced-qty-${id}`);
      if(input)input.value=next||'';
      await saveProductionFields(id,event);
    }
    async function setStatus(id,key){const r=await fetch(`/api/items/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:apiStatus[key]})});if(r.ok){const item=state.items.find(item=>item.id===id);if(item)item.status=apiStatus[key];render()}}
    function selectOrder(id){state.selected=id;state.focusItemId=null;state.scanToken=null;render();document.querySelector('.panel').classList.add('mobile-hidden');document.querySelector('.stage').classList.remove('mobile-hidden')}
    async function load(){try{const r=await fetch('/api/production-queue?visual=1');if(!r.ok)throw Error(r.status);state.items=(await r.json()).items||[];document.querySelector('#sync').textContent='חי';const parsed=state.focusItemId?null:scanFromLocation();if(parsed&&parsed.itemId){if(!focusScannedCard(parsed)){render();showScanResult('הקוד נסרק, אבל הכרטיס לא נמצא בתור הייצור הנוכחי.','err')}}else render()}catch{document.querySelector('#sync').textContent='מתחבר מחדש'}}
    document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelector('.panel').classList.toggle('mobile-hidden',b.dataset.pane!=='panel');document.querySelector('.stage').classList.toggle('mobile-hidden',b.dataset.pane!=='stage')});
    function ws(){try{const socket=new WebSocket(window.IronBendAuth?.webSocketUrl?.('/')||`${location.protocol==='https:'?'wss':'ws'}://${location.host}`);socket.onmessage=event=>{try{if(['item_status','item_progress','new_order','order_status'].includes(JSON.parse(event.data).type))load()}catch{}};socket.onclose=()=>setTimeout(ws,2000)}catch{}}
    load();ws();
  </script>
<script src="/production-i18n.js" defer></script>
</body>
</html>

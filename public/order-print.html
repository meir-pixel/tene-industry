<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronBend - print</title>
<script src="/auth-client.js"></script>
<style>
  body{margin:0;font-family:Arial,sans-serif;background:#f6f8fb;color:#142033;display:grid;place-items:center;min-height:100vh}
  .box{width:min(520px,calc(100vw - 32px));background:white;border:1px solid #d7e0ea;border-radius:14px;box-shadow:0 18px 50px rgba(15,35,60,.12);padding:28px;text-align:center}
  .mark{font-size:34px;margin-bottom:10px}.title{font-weight:800;font-size:22px;margin-bottom:8px}.msg{color:#64748b;line-height:1.6}.err{color:#b42318;font-weight:800;margin-top:14px;white-space:pre-wrap}.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{display:inline-block;padding:12px 18px;border-radius:10px;background:#e05a00;color:#fff;text-decoration:none;font-weight:800}.btn.secondary{background:#142033}
</style>
</head>
<body>
  <div class="box" id="status">
    <div class="mark">&#128424;&#65039;</div>
    <div class="title">&#1496;&#1493;&#1506;&#1503; &#1502;&#1505;&#1502;&#1498; &#1500;&#1492;&#1491;&#1508;&#1505;&#1492;</div>
    <div class="msg">&#1489;&#1493;&#1491;&#1511; &#1492;&#1512;&#1513;&#1488;&#1492; &#1493;&#1502;&#1499;&#1497;&#1503; &#1488;&#1514; &#1492;&#1491;&#1507;...</div>
  </div>
<script>
(function(){
  const kinds = new Set(['print-cards','print-a4','delivery-certificate']);
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const kind = params.get('kind');
  const status = document.getElementById('status');

  function fail(message, options = {}){
    const actions = ['<a class="btn" href="/orders.html">&#1495;&#1494;&#1512;&#1492; &#1500;&#1492;&#1494;&#1502;&#1504;&#1493;&#1514;</a>'];
    if (options.orderId) {
      actions.unshift('<a class="btn secondary" href="/orders.html?id=' + encodeURIComponent(options.orderId) + '">&#1508;&#1514;&#1495; &#1492;&#1494;&#1502;&#1504;&#1492; &#1500;&#1488;&#1497;&#1513;&#1493;&#1512;</a>');
    }
    status.innerHTML = '<div class="mark">&#9888;&#65039;</div><div class="title">&#1500;&#1488; &#1504;&#1497;&#1514;&#1503; &#1500;&#1508;&#1514;&#1493;&#1495; &#1492;&#1491;&#1508;&#1505;&#1492;</div><div class="err"></div><div class="actions">' + actions.join('') + '</div>';
    status.querySelector('.err').textContent = message;
  }

  async function load(){
    if (!id || !/^\d+$/.test(id) || !kinds.has(kind)) {
      fail('Invalid print request.');
      return;
    }
    const apiPath = '/api/orders/' + encodeURIComponent(id) + '/' + kind;
    const auth = window.IronBendAuth;
    const fetcher = auth && auth.fetch ? auth.fetch.bind(auth) : window.fetch.bind(window);
    let response;
    try {
      response = await fetcher(apiPath, { credentials: 'same-origin' });
    } catch (err) {
      fail(err && err.message ? err.message : 'Network error');
      return;
    }
    if (response.status === 401) {
      location.href = '/login.html?next=' + encodeURIComponent('/order-print.html' + location.search);
      return;
    }
    if (response.status === 403) {
      fail('No permission for this print action.');
      return;
    }
    if (!response.ok) {
      const text = await response.text().catch(() => '');
      if (response.status === 409 && kind === 'print-cards') {
        fail('הכרטיסיות זמינות להדפסה רק אחרי אישור/תכנון ייצור. פתח את ההזמנה הספציפית כדי לראות, לבדוק ולאשר אותה.', { orderId: id });
        return;
      }
      fail('Print failed: HTTP ' + response.status + (text ? '\n' + text.slice(0, 500) : ''));
      return;
    }
    const html = await response.text();
    document.open();
    document.write(html);
    document.close();
  }

  load();
})();
</script>
</body>
</html>

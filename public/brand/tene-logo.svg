<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">TNA IronBend</title>
  <desc id="desc">Clean TNA steel industry logo for IronBend</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06306f"/>
      <stop offset="1" stop-color="#021A48"/>

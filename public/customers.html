<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לקוחות – IronBend</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/nav.js" defer></script>
<style>
:root {
  --steel: #f0f4f8;
  --steel-mid: #ffffff;
  --steel-light: #e8edf4;
  --iron: #d0dcea;
  --accent: #c9621a;
  --accent-light: #e07b39;
  --accent-bg: rgba(201,98,26,0.08);
  --success: #1a7a42;
  --success-bg: rgba(26,122,66,0.08);
  --danger: #b83227;
  --danger-bg: rgba(184,50,39,0.08);
  --warning: #a86b00;
  --warning-bg: rgba(168,107,0,0.08);
  --info: #1a5fa8;
  --info-bg: rgba(26,95,168,0.08);
  --text: #1a2533;
  --text-dim: #526070;
  --text-faint: #8fa0b0;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.15);
  --card: rgba(0,0,0,0.02);
  --card-hover: rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:#f0f4f8; color:var(--text); min-height:100vh; }

/* ── LAYOUT ── */
.page-wrap {
  display:flex;
  height:calc(100vh - 56px);
  overflow:hidden;
}

/* LEFT — customer list */
.list-panel {
  width:360px;
  flex-shrink:0;
  background:#fff;
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.list-head {
  padding:16px;
  border-bottom:1px solid var(--border);
  background:#fff;
}
.list-title {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.list-title h2 { font-size:17px; font-weight:800; }
.btn-new {
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:7px 14px;
  font-family:'Heebo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:background .15s;
}
.btn-new:hover { background:#b45517; }
.search-wrap {
  position:relative;
}
.search-wrap input {
  width:100%;
  border:1px solid var(--border-strong);
  border-radius:9px;
  padding:9px 36px 9px 12px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  background:#f8fafc;
  color:var(--text);
  outline:none;
  transition:border-color .15s, background .15s;
}
.search-wrap input:focus {
  border-color:var(--accent);
  background:#fff;
}
.search-icon {
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-faint);
  pointer-events:none;
  font-size:14px;
}
.list-count {
  font-size:12px;
  color:var(--text-faint);
  padding:8px 16px 4px;
}
.customer-list {
  flex:1;
  overflow-y:auto;
  padding:6px 8px;
}
.cust-card {
  border-radius:10px;
  padding:12px 14px;
  cursor:pointer;
  transition:background .13s;
  border:1px solid transparent;
  margin-bottom:3px;
}
.cust-card:hover { background:var(--card-hover); }
.cust-card.active {
  background:var(--accent-bg);
  border-color:rgba(201,98,26,0.2);
}
.cust-card-top {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:4px;
}
.cust-avatar {
  width:38px; height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,#e07b39,#c9621a);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800;
  color:#fff;
  flex-shrink:0;
}
.cust-name {
  font-weight:700;
  font-size:14px;
  color:var(--text);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.cust-orders-badge {
  background:var(--steel);
  color:var(--text-dim);
  border-radius:20px;
  padding:2px 8px;
  font-size:11px;
  font-weight:700;
  flex-shrink:0;
}
.cust-card.active .cust-orders-badge {
  background:rgba(201,98,26,0.15);
  color:var(--accent);
}
.cust-meta {
  display:flex;
  gap:12px;
  font-size:12px;
  color:var(--text-faint);
  padding-right:48px;
}
.cust-meta span { display:flex; align-items:center; gap:3px; }

.list-empty {
  text-align:center;
  padding:48px 20px;
  color:var(--text-faint);
  font-size:14px;
}
.list-empty .list-empty-icon { font-size:40px; margin-bottom:12px; }

/* RIGHT — detail panel */
.detail-panel {
  flex:1;
  overflow-y:auto;
  padding:24px;
  min-width:0;
}

.detail-empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text-faint);
  gap:12px;
}
.detail-empty .de-icon { font-size:56px; }
.detail-empty p { font-size:15px; font-weight:600; }
.detail-empty small { font-size:13px; color:var(--text-faint); }

.detail-header {
  display:flex;
  align-items:flex-start;
  gap:16px;
  margin-bottom:20px;
}
.detail-avatar {
  width:56px; height:56px;
  border-radius:14px;
  background:linear-gradient(135deg,#e07b39,#c9621a);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; font-weight:900;
  color:#fff;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(201,98,26,0.30);
}
.detail-header-info { flex:1; min-width:0; }
.detail-name {
  font-size:22px;
  font-weight:900;
  margin-bottom:4px;
}
.detail-sub {
  font-size:13px;
  color:var(--text-dim);
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.detail-actions {
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.btn-action {
  border:1px solid var(--border-strong);
  background:#fff;
  border-radius:8px;
  padding:7px 14px;
  font-family:'Heebo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  color:var(--text-dim);
  transition:all .15s;
  display:flex;
  align-items:center;
  gap:5px;
}
.btn-action:hover { background:var(--steel); color:var(--text); }
.btn-action.primary {
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.btn-action.primary:hover { background:#b45517; }

/* Stats row */
.stats-row {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}
.stat-card {
  background:#fff;
  border-radius:10px;
  padding:14px 16px;
  border:1px solid var(--border);
}
.stat-label {
  font-size:11px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:4px;
}
.stat-value {
  font-size:22px;
  font-weight:900;
  color:var(--text);
}
.stat-unit {
  font-size:12px;
  font-weight:600;
  color:var(--text-dim);
  margin-right:2px;
}

/* Info sections */
.info-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:20px;
}
.info-section {
  background:#fff;
  border-radius:12px;
  padding:16px;
  border:1px solid var(--border);
}
.info-section h4 {
  font-size:12px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:6px;
}
.info-row {
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:8px;
  font-size:13.5px;
}
.info-row:last-child { margin-bottom:0; }
.info-key {
  color:var(--text-faint);
  font-size:12px;
  font-weight:600;
  min-width:80px;
  flex-shrink:0;
}
.info-val {
  color:var(--text);
  font-weight:500;
  flex:1;
  word-break:break-word;
}
.info-val a {
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
}
.info-val a:hover { text-decoration:underline; }
.info-empty { color:var(--text-faint); font-size:12px; font-style:italic; }

/* Orders table section */
.orders-section {
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:20px;
  overflow:hidden;
}
.orders-section-head {
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.orders-section-head h4 {
  font-size:14px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:7px;
}
.orders-table-wrap { overflow-x:auto; }
.orders-table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.orders-table th {
  background:#f8fafc;
  padding:8px 12px;
  font-size:11px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.4px;
  text-align:right;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.orders-table td {
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  color:var(--text);
  vertical-align:middle;
}
.orders-table tr:last-child td { border-bottom:none; }
.orders-table tr:hover td { background:var(--card); }
.orders-table a {
  color:var(--accent);
  font-weight:700;
  text-decoration:none;
}
.orders-table a:hover { text-decoration:underline; }
.status-badge {
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}
.status-ממתינה { background:var(--warning-bg); color:var(--warning); }
.status-אושרה  { background:var(--info-bg);    color:var(--info); }
.status-בייצור { background:rgba(50,100,200,0.09); color:#2455aa; }
.status-מוכנה  { background:var(--success-bg); color:var(--success); }
.status-נמסרה  { background:#f0f0f0; color:#666; }
.status-בוטלה  { background:var(--danger-bg);  color:var(--danger); }

/* Notes section */
.notes-section {
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  padding:16px;
  margin-bottom:20px;
}
.notes-section h4 {
  font-size:12px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}
.notes-text {
  font-size:14px;
  line-height:1.6;
  color:var(--text);
  white-space:pre-wrap;
}

/* Portal section */
.portal-section {
  background: linear-gradient(135deg, rgba(201,98,26,0.04), rgba(224,123,57,0.06));
  border:1px solid rgba(201,98,26,0.18);
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.portal-info h4 { font-size:14px; font-weight:800; margin-bottom:4px; }
.portal-info p { font-size:12px; color:var(--text-dim); }
.portal-link-box {
  display:flex;
  align-items:center;
  gap:8px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 10px;
  font-size:12px;
  font-family:monospace;
  color:var(--text-dim);
  max-width:280px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  cursor:pointer;
}
.portal-link-box:hover { border-color:var(--accent); color:var(--accent); }

/* ── MODAL ── */
.modal-backdrop {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:1000;
  align-items:center;
  justify-content:center;
}
.modal-backdrop.open { display:flex; }
.modal {
  background:#fff;
  border-radius:16px;
  width:520px;
  max-width:calc(100vw - 32px);
  max-height:calc(100vh - 80px);
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
}
.modal-head {
  padding:20px 24px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.modal-head h3 { font-size:18px; font-weight:900; }
.modal-close {
  background:none; border:none; cursor:pointer;
  font-size:20px; color:var(--text-faint);
  padding:4px; border-radius:6px;
  transition:background .15s;
}
.modal-close:hover { background:var(--steel); color:var(--text); }
.modal-body { padding:20px 24px; }
.form-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:14px;
}
.form-row.full { grid-template-columns:1fr; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label {
  font-size:12px;
  font-weight:700;
  color:var(--text-dim);
}
.form-group input,
.form-group textarea,
.form-group select {
  border:1px solid var(--border-strong);
  border-radius:8px;
  padding:9px 12px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  color:var(--text);
  background:#fafbfc;
  outline:none;
  transition:border-color .15s, background .15s;
  width:100%;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color:var(--accent);
  background:#fff;
}
.form-group textarea { resize:vertical; min-height:72px; }
.form-divider {
  font-size:11px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin:18px 0 12px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.modal-foot {
  padding:16px 24px 20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  border-top:1px solid var(--border);
}
.btn-cancel {
  border:1px solid var(--border-strong);
  background:#fff;
  border-radius:8px;
  padding:9px 20px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  color:var(--text-dim);
  transition:background .15s;
}
.btn-cancel:hover { background:var(--steel); }
.btn-save {
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:9px 24px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  transition:background .15s;
}
.btn-save:hover { background:#b45517; }
.btn-save:disabled { background:#ccc; cursor:not-allowed; }

/* spinner */
.spinner {
  display:inline-block;
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── RESPONSIVE ── */

/* Tablet: narrow list panel */
@media(max-width:1100px) {
  .list-panel { width:300px; }
}
@media(max-width:900px) {
  .list-panel { width:260px; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .info-grid { grid-template-columns:1fr; }
}

/* Mobile: single-panel mode (list OR detail, never both) */
@media(max-width:700px) {
  .page-wrap {
    display:block;
    height:auto;
    overflow:visible;
  }

  /* List panel full width, shown by default */
  .list-panel {
    width:100%;
    height:auto;
    border-left:none;
    border-bottom:none;
    /* height is managed by JS show/hide */
  }
  .customer-list { max-height:none; }

  /* Detail panel full width, hidden until a customer is selected */
  .detail-panel {
    padding:12px;
    min-height:0;
  }

  /* Mobile: when detail is active, list hides and detail shows */
  .page-wrap.detail-open .list-panel { display:none; }
  .page-wrap.detail-open .detail-panel { display:block; }

  /* Back button visible only on mobile */
  .mobile-back {
    display:flex !important;
    align-items:center;
    gap:8px;
    background:none;
    border:none;
    font-family:'Heebo',sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--accent);
    cursor:pointer;
    padding:4px 0 14px;
    margin-bottom:4px;
  }

  /* Detail layout adjustments */
  .detail-header {
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
  .detail-actions {
    width:100%;
    flex-wrap:wrap;
  }
  .detail-actions .btn-action {
    flex:1;
    justify-content:center;
    min-width:0;
  }

  .stats-row { grid-template-columns:1fr 1fr; gap:8px; }
  .stat-card { padding:10px 12px; }
  .stat-value { font-size:18px; }

  .info-grid { grid-template-columns:1fr; }
  .info-section { padding:12px; }

  .portal-section { flex-direction:column; align-items:flex-start; gap:10px; }
  .portal-section .btn-action { width:100%; justify-content:center; }

  .orders-table { font-size:12px; }
  .orders-table th,
  .orders-table td { padding:8px 8px; }
  /* Hide less-important columns on very small screens */
  .orders-table .col-priority,
  .orders-table .col-weight { display:none; }
}

/* Small phones */
@media(max-width:400px) {
  .stats-row { grid-template-columns:1fr 1fr; }
  .stat-value { font-size:16px; }
  .form-row { grid-template-columns:1fr; }
  .list-head { padding:12px; }
  .list-title h2 { font-size:15px; }
  .btn-new { padding:6px 10px; font-size:12px; }
}

/* Modal full-screen on mobile */
@media(max-width:560px) {
  .modal {
    width:100%;
    max-width:100%;
    max-height:100%;
    border-radius:16px 16px 0 0;
    margin-top:auto;
  }
  .modal-backdrop {
    align-items:flex-end;
  }
  .form-row { grid-template-columns:1fr; }
  .modal-body { padding:16px 20px; }
  .modal-foot { padding:12px 20px 20px; }
}

/* Always hide back button on desktop */
.mobile-back { display:none; }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- LEFT: Customer List -->
  <aside class="list-panel">
    <div class="list-head">
      <div class="list-title">
        <h2>👥 לקוחות</h2>
        <button class="btn-new" onclick="openModal()">＋ לקוח חדש</button>
      </div>
      <div class="search-wrap">
        <input type="search" id="searchInput" placeholder="חיפוש לפי שם, טלפון..."
          oninput="onSearch(this.value)" autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
    </div>
    <div class="list-count" id="listCount"></div>
    <div class="customer-list" id="customerList">
      <div class="list-empty">
        <div class="list-empty-icon">⏳</div>
        <div>טוען...</div>
      </div>
    </div>
  </aside>

  <!-- RIGHT: Detail Panel -->
  <main class="detail-panel" id="detailPanel">
    <button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>
    <div class="detail-empty">
      <div class="de-icon">👥</div>
      <p>בחר לקוח מהרשימה</p>
      <small>לצפייה בפרטים, הזמנות והיסטוריה</small>
    </div>
  </main>

</div>

<!-- Add / Edit Customer Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">לקוח חדש</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label>שם עסק / לקוח *</label>
          <input type="text" id="fName" placeholder="כגון: חברת הבנייה בע&quot;מ">
        </div>
        <div class="form-group">
          <label>טלפון</label>
          <input type="tel" id="fPhone" placeholder="05X-XXXXXXX" dir="ltr">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>אימייל</label>
          <input type="email" id="fEmail" placeholder="info@example.com" dir="ltr">
        </div>
        <div class="form-group">
          <label>מזהה Priority</label>
          <input type="text" id="fPriorityId" placeholder="קוד לקוח ב-Priority" dir="ltr">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>כתובת</label>
          <input type="text" id="fAddress" placeholder="רחוב, עיר">
        </div>
      </div>

      <div class="form-divider">איש קשר</div>
      <div class="form-row">
        <div class="form-group">
          <label>שם איש קשר</label>
          <input type="text" id="fContactName" placeholder="שם מלא">
        </div>
        <div class="form-group">
          <label>נייד איש קשר</label>
          <input type="tel" id="fContactPhone" placeholder="05X-XXXXXXX" dir="ltr">
        </div>
      </div>

      <div class="form-divider">הערות</div>
      <div class="form-row full">
        <div class="form-group">
          <label>הערות פנימיות</label>
          <textarea id="fNotes" placeholder="הנחות מחיר, תנאי תשלום, הוראות מיוחדות..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-save" id="saveBtn" onclick="saveCustomer()">שמור לקוח</button>
    </div>
  </div>
</div>

<script>
'use strict';

let customers  = [];
let activeId   = null;
let searchTimer;

// ── STATUS mapping ──
const STATUS_CLS = {
  'ממתינה לאישור': 'ממתינה',
  'אושרה'        : 'אושרה',
  'בייצור'       : 'בייצור',
  'מוכנה לאיסוף' : 'מוכנה',
  'נמסרה'        : 'נמסרה',
  'בוטלה'        : 'בוטלה',
};
function statusBadge(s) {
  const cls = STATUS_CLS[s] || 'ממתינה';
  return '<span class="status-badge status-' + cls + '">' + esc(s||'–') + '</span>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(name) {
  const parts = (name||'?').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].charAt(0);
  return parts[0].charAt(0) + parts[parts.length-1].charAt(0);
}

function fmtDate(d) {
  if (!d) return '–';
  try { return new Date(d).toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'2-digit' }); }
  catch { return d; }
}

function fmtWeight(w) {
  const n = Number(w) || 0;
  if (n >= 1000) return (n/1000).toFixed(1) + ' ט';
  return n.toFixed(0) + ' ק"ג';
}

// ── LOAD LIST ──
async function loadList(q) {
  try {
    const r  = await fetch('/api/customers?q=' + encodeURIComponent(q||'') + '&limit=100');
    customers = await r.json();
    renderList();
  } catch(e) {
    document.getElementById('customerList').innerHTML =
      '<div class="list-empty"><div class="list-empty-icon">⚠️</div><div>שגיאה בטעינה</div></div>';
  }
}

function renderList() {
  const el = document.getElementById('customerList');
  document.getElementById('listCount').textContent =
    customers.length ? customers.length + ' לקוחות' : '';

  if (!customers.length) {
    el.innerHTML = '<div class="list-empty"><div class="list-empty-icon">🔍</div><div>לא נמצאו לקוחות</div></div>';
    return;
  }

  el.innerHTML = customers.map(c => {
    const active = c.id === activeId ? ' active' : '';
    const cnt    = c.order_count || 0;
    const phone  = c.phone ? '📞 ' + c.phone : '';
    const last   = c.last_order_at ? '🗓 ' + fmtDate(c.last_order_at) : '';
    return '<div class="cust-card'+active+'" onclick="selectCustomer('+c.id+')" data-id="'+c.id+'">' +
      '<div class="cust-card-top">' +
        '<div class="cust-avatar">'+esc(initials(c.name))+'</div>' +
        '<div class="cust-name">'+esc(c.name)+'</div>' +
        '<div class="cust-orders-badge">'+cnt+' הזמנות</div>' +
      '</div>' +
      '<div class="cust-meta">' +
        (phone ? '<span>'+esc(phone)+'</span>' : '') +
        (last  ? '<span>'+esc(last)+'</span>'  : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadList(val), 250);
}

// ── MOBILE NAV ──
function isMobile() { return window.innerWidth <= 700; }

function mobileShowDetail() {
  if (isMobile()) {
    document.querySelector('.page-wrap').classList.add('detail-open');
    window.scrollTo(0, 0);
  }
}

function mobileBack() {
  document.querySelector('.page-wrap').classList.remove('detail-open');
  activeId = null;
  document.querySelectorAll('.cust-card').forEach(el => el.classList.remove('active'));
  // restore empty detail
  document.getElementById('detailPanel').innerHTML =
    '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>' +
    '<div class="detail-empty"><div class="de-icon">👥</div><p>בחר לקוח מהרשימה</p><small>לצפייה בפרטים, הזמנות והיסטוריה</small></div>';
}

// ── SELECT / LOAD DETAIL ──
async function selectCustomer(id) {
  activeId = id;
  // highlight in list
  document.querySelectorAll('.cust-card').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.id) === id);
  });
  // show loading + switch to detail on mobile
  document.getElementById('detailPanel').innerHTML =
    '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>' +
    '<div class="detail-empty"><div class="de-icon" style="animation:spin .8s linear infinite;font-size:36px">⏳</div></div>';
  mobileShowDetail();

  try {
    const r = await fetch('/api/customers/' + id);
    const c = await r.json();
    renderDetail(c);
  } catch(e) {
    document.getElementById('detailPanel').innerHTML =
      '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>' +
      '<div class="detail-empty"><div class="de-icon">⚠️</div><p>שגיאה בטעינה</p></div>';
  }
}

function renderDetail(c) {
  const stats   = c.stats || {};
  const orders  = c.orders || [];
  const initAvg = orders.length ? (stats.total_weight_sum / orders.length).toFixed(0) : 0;

  // mobile back button always at top (hidden via CSS on desktop)
  let html = '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>';

  // ── Header ──
  html += '<div class="detail-header">' +
    '<div class="detail-avatar">'+esc(initials(c.name))+'</div>' +
    '<div class="detail-header-info">' +
      '<div class="detail-name">'+esc(c.name)+'</div>' +
      '<div class="detail-sub">' +
        (c.phone    ? '<span>📞 <a href="tel:'+esc(c.phone)+'">'+esc(c.phone)+'</a></span>' : '') +
        (c.email    ? '<span>✉️ <a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a></span>' : '') +
        (c.address  ? '<span>📍 '+esc(c.address)+'</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="detail-actions">' +
      '<button class="btn-action primary" onclick="newOrderFor('+c.id+',\''+esc(c.name)+'\')">➕ הזמנה חדשה</button>' +
      '<button class="btn-action" onclick="openModal('+c.id+')">✏️ עריכה</button>' +
    '</div>' +
  '</div>';

  // ── Stats ──
  html += '<div class="stats-row">' +
    stat('הזמנות',        stats.order_count || 0,          '',        '📋') +
    stat('סה"כ משקל',     fmtWeight(stats.total_weight_sum),'',        '⚖️') +
    stat('ממוצע להזמנה',  fmtWeight(initAvg),              '',        '📊') +
    stat('הזמנה אחרונה',  fmtDate(stats.last_order_at),    '',        '🗓') +
  '</div>';

  // ── Info grid ──
  html += '<div class="info-grid">';

  // Contact info
  html += '<div class="info-section"><h4>📇 פרטי קשר</h4>';
  html += infoRow('טלפון',     c.phone    ? '<a href="tel:'+esc(c.phone)+'">'+esc(c.phone)+'</a>' : null);
  html += infoRow('אימייל',    c.email    ? '<a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a>' : null);
  html += infoRow('כתובת',     c.address);
  html += infoRow('Priority',  c.priority_id);
  html += infoRow('תאריך הצטרפות', fmtDate(c.created_at));
  html += '</div>';

  // Contact person
  html += '<div class="info-section"><h4>👤 איש קשר</h4>';
  if (c.contact_name || c.contact_phone) {
    html += infoRow('שם',    c.contact_name);
    html += infoRow('נייד',  c.contact_phone ? '<a href="tel:'+esc(c.contact_phone)+'">'+esc(c.contact_phone)+'</a>' : null);
  } else {
    html += '<div class="info-empty">לא הוזן איש קשר</div>';
  }
  html += '</div>';
  html += '</div>'; // info-grid

  // ── Notes ──
  if (c.notes) {
    html += '<div class="notes-section">' +
      '<h4>📝 הערות</h4>' +
      '<div class="notes-text">'+esc(c.notes)+'</div>' +
    '</div>';
  }

  // ── Portal ──
  html += '<div class="portal-section">' +
    '<div class="portal-info">' +
      '<h4>🔗 פורטל לקוח</h4>' +
      '<p>שלח ללקוח קישור אישי להגשת הזמנות ומעקב</p>' +
    '</div>' +
    '<button class="btn-action" onclick="getPortalLink('+c.id+')">🔑 קבל קישור</button>' +
  '</div>';

  // ── Orders table ──
  html += '<div class="orders-section">';
  html += '<div class="orders-section-head">' +
    '<h4>📋 הזמנות (' + orders.length + ')</h4>' +
    '<a href="/orders.html?customer='+c.id+'" class="btn-action" style="font-size:12px;padding:5px 10px">כל ההזמנות ←</a>' +
  '</div>';

  if (!orders.length) {
    html += '<div style="padding:32px;text-align:center;color:var(--text-faint);font-size:13px">אין הזמנות עדיין</div>';
  } else {
    html += '<div class="orders-table-wrap"><table class="orders-table">' +
      '<thead><tr>' +
        '<th>מספר הזמנה</th>' +
        '<th>סטטוס</th>' +
        '<th class="col-priority">עדיפות</th>' +
        '<th>תאריך מסירה</th>' +
        '<th class="col-weight">משקל</th>' +
        '<th>תאריך יצירה</th>' +
      '</tr></thead>' +
      '<tbody>';
    orders.forEach(o => {
      html += '<tr>' +
        '<td><a href="/orders.html?id='+o.id+'">'+esc(o.order_num)+'</a></td>' +
        '<td>'+statusBadge(o.status)+'</td>' +
        '<td class="col-priority">'+esc(o.priority||'רגיל')+'</td>' +
        '<td>'+fmtDate(o.delivery_date)+'</td>' +
        '<td class="col-weight">'+(o.total_weight ? fmtWeight(o.total_weight) : '–')+'</td>' +
        '<td>'+fmtDate(o.created_at)+'</td>' +
      '</tr>';
    });
    html += '</tbody></table></div>';
  }

  html += '</div>'; // orders-section

  document.getElementById('detailPanel').innerHTML = html;
}

function stat(label, value, unit, icon) {
  return '<div class="stat-card">' +
    '<div class="stat-label">'+icon+' '+label+'</div>' +
    '<div class="stat-value">'+esc(String(value))+'<span class="stat-unit">'+esc(unit)+'</span></div>' +
  '</div>';
}

function infoRow(key, val) {
  if (!val) return '';
  return '<div class="info-row"><span class="info-key">'+key+'</span><span class="info-val">'+val+'</span></div>';
}

// ── NEW ORDER for customer ──
function newOrderFor(id, name) {
  window.location.href = '/index.html?customer_id=' + id + '&customer_name=' + encodeURIComponent(name);
}

// ── PORTAL LINK ──
async function getPortalLink(id) {
  try {
    const r = await fetch('/api/customers/' + id + '/token');
    const d = await r.json();
    if (d.link) {
      await navigator.clipboard.writeText(d.link).catch(() => {});
      window.showToast && window.showToast('הקישור הועתק ✓');
      // show inline
      const ps = document.querySelector('.portal-section');
      if (ps) {
        const existing = ps.querySelector('.portal-link-box');
        if (existing) existing.remove();
        const box = document.createElement('div');
        box.className = 'portal-link-box';
        box.title = 'לחץ להעתקה';
        box.textContent = d.link;
        box.onclick = () => { navigator.clipboard.writeText(d.link).catch(()=>{}); window.showToast && window.showToast('הועתק ✓'); };
        ps.appendChild(box);
      }
    }
  } catch(e) {
    window.showToast && window.showToast('שגיאה בקבלת קישור', true);
  }
}

// ── MODAL ──
function openModal(id) {
  const modal = document.getElementById('modalBackdrop');
  const title = document.getElementById('modalTitle');
  if (id) {
    title.textContent = 'עריכת לקוח';
    document.getElementById('editId').value = id;
    const c = customers.find(x => x.id === id);
    if (c) {
      document.getElementById('fName').value         = c.name         || '';
      document.getElementById('fPhone').value        = c.phone        || '';
      document.getElementById('fEmail').value        = c.email        || '';
      document.getElementById('fAddress').value      = c.address      || '';
      document.getElementById('fPriorityId').value   = c.priority_id  || '';
      document.getElementById('fContactName').value  = c.contact_name || '';
      document.getElementById('fContactPhone').value = c.contact_phone|| '';
      document.getElementById('fNotes').value        = c.notes        || '';
    } else {
      // load from server if not in list
      fetch('/api/customers/' + id).then(r=>r.json()).then(c => {
        document.getElementById('fName').value         = c.name         || '';
        document.getElementById('fPhone').value        = c.phone        || '';
        document.getElementById('fEmail').value        = c.email        || '';
        document.getElementById('fAddress').value      = c.address      || '';
        document.getElementById('fPriorityId').value   = c.priority_id  || '';
        document.getElementById('fContactName').value  = c.contact_name || '';
        document.getElementById('fContactPhone').value = c.contact_phone|| '';
        document.getElementById('fNotes').value        = c.notes        || '';
      });
    }
  } else {
    title.textContent = 'לקוח חדש';
    document.getElementById('editId').value       = '';
    document.getElementById('fName').value        = '';
    document.getElementById('fPhone').value       = '';
    document.getElementById('fEmail').value       = '';
    document.getElementById('fAddress').value     = '';
    document.getElementById('fPriorityId').value  = '';
    document.getElementById('fContactName').value = '';
    document.getElementById('fContactPhone').value= '';
    document.getElementById('fNotes').value       = '';
  }
  modal.classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 80);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

async function saveCustomer() {
  const name = document.getElementById('fName').value.trim();
  if (!name) {
    document.getElementById('fName').focus();
    document.getElementById('fName').style.borderColor = 'var(--danger)';
    return;
  }
  document.getElementById('fName').style.borderColor = '';

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const body = {
    name,
    phone:        document.getElementById('fPhone').value.trim()        || null,
    email:        document.getElementById('fEmail').value.trim()        || null,
    address:      document.getElementById('fAddress').value.trim()      || null,
    priorityId:   document.getElementById('fPriorityId').value.trim()   || null,
    contactName:  document.getElementById('fContactName').value.trim()  || null,
    contactPhone: document.getElementById('fContactPhone').value.trim() || null,
    notes:        document.getElementById('fNotes').value.trim()        || null,
  };

  const editId = document.getElementById('editId').value;

  try {
    let r, d;
    if (editId) {
      r = await fetch('/api/customers/' + editId, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      d = await r.json();
      window.showToast && window.showToast('הלקוח עודכן ✓');
    } else {
      r = await fetch('/api/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      d = await r.json();
      window.showToast && window.showToast('הלקוח נוצר ✓');
    }
    closeModal();
    await loadList(document.getElementById('searchInput').value);
    if (editId) selectCustomer(Number(editId));
    else if (d.id) selectCustomer(d.id);
  } catch(e) {
    window.showToast && window.showToast('שגיאה בשמירה', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'שמור לקוח';
  }
}

// close modal on backdrop click
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter submits modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('modalBackdrop').classList.contains('open')) {
    if (e.target.tagName !== 'TEXTAREA') saveCustomer();
  }
  if (e.key === 'Escape') closeModal();
});

// ── BROWSER BACK BUTTON (mobile) ──
window.addEventListener('popstate', () => {
  if (isMobile() && document.querySelector('.page-wrap').classList.contains('detail-open')) {
    mobileBack();
  }
});

// Push a history entry when navigating to detail on mobile
const _origSelectCustomer = selectCustomer;
// (already modifies URL implicitly via mobileShowDetail; no extra push needed here)

// Resize: if going from mobile→desktop while in detail-open mode, remove the class
window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.querySelector('.page-wrap').classList.remove('detail-open');
  }
});

// ── INIT ──
loadList('');
</script>
</body>
</html>

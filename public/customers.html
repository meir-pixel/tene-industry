<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לקוחות – IronBend</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/safe-dom.js" defer></script>
<script src="/auth-client.js" defer></script>
<script src="/nav.js" defer></script>
<style>
:root {
  --steel: #f0f4f8;
  --steel-mid: #ffffff;
  --steel-light: #e8edf4;
  --iron: #d0dcea;
  --accent: #c9621a;
  --accent-light: #e07b39;
  --accent-bg: rgba(201,98,26,0.08);
  --success: #1a7a42;
  --success-bg: rgba(26,122,66,0.08);
  --danger: #b83227;
  --danger-bg: rgba(184,50,39,0.08);
  --warning: #a86b00;
  --warning-bg: rgba(168,107,0,0.08);
  --info: #1a5fa8;
  --info-bg: rgba(26,95,168,0.08);
  --text: #1a2533;
  --text-dim: #526070;
  --text-faint: #8fa0b0;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.15);
  --card: rgba(0,0,0,0.02);
  --card-hover: rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:#f0f4f8; color:var(--text); min-height:100vh; }

/* ── LAYOUT ── */
.page-wrap {
  display:flex;
  height:calc(100vh - 56px);
  overflow:hidden;
}

/* LEFT — customer list */
.list-panel {
  width:360px;
  flex-shrink:0;
  background:#fff;
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.list-head {
  padding:16px;
  border-bottom:1px solid var(--border);
  background:#fff;
}
.list-title {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.list-title h2 { font-size:17px; font-weight:800; }
.btn-new {
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:7px 14px;
  font-family:'Heebo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:background .15s;
}
.btn-new:hover { background:#b45517; }
.search-wrap {
  position:relative;
}
.search-wrap input {
  width:100%;
  border:1px solid var(--border-strong);
  border-radius:9px;
  padding:9px 36px 9px 12px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  background:#f8fafc;
  color:var(--text);
  outline:none;
  transition:border-color .15s, background .15s;
}
.search-wrap input:focus {
  border-color:var(--accent);
  background:#fff;
}
.search-icon {
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-faint);
  pointer-events:none;
  font-size:14px;
}
.list-count {
  font-size:12px;
  color:var(--text-faint);
  padding:8px 16px 4px;
  min-height:24px;
}
.list-alert {
  margin:8px 16px 0;
  border:1px solid #f2c5c0;
  background:#fff7f5;
  color:#9b2c24;
  border-radius:8px;
  padding:8px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  font-weight:800;
}
.list-alert button {
  border:0;
  background:var(--accent);
  color:#fff;
  border-radius:7px;
  padding:6px 10px;
  font:inherit;
  cursor:pointer;
  white-space:nowrap;
}
.customer-list {
  flex:1;
  overflow-y:auto;
  padding:6px 8px;
}
.cust-card {
  border-radius:10px;
  padding:12px 14px;
  cursor:pointer;
  transition:background .13s;
  border:1px solid transparent;
  margin-bottom:3px;
}
.cust-card:hover { background:var(--card-hover); }
.cust-card.active {
  background:var(--accent-bg);
  border-color:rgba(201,98,26,0.2);
}
.cust-card-top {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:4px;
}
.cust-avatar {
  width:38px; height:38px;
  border-radius:50%;
  background:linear-gradient(135deg,#e07b39,#c9621a);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800;
  color:#fff;
  flex-shrink:0;
}
.cust-name {
  font-weight:700;
  font-size:14px;
  color:var(--text);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.cust-orders-badge {
  background:var(--steel);
  color:var(--text-dim);
  border-radius:20px;
  padding:2px 8px;
  font-size:11px;
  font-weight:700;
  flex-shrink:0;
}
.cust-card.active .cust-orders-badge {
  background:rgba(201,98,26,0.15);
  color:var(--accent);
}
.cust-meta {
  display:flex;
  gap:12px;
  font-size:12px;
  color:var(--text-faint);
  padding-right:48px;
}
.cust-meta span { display:flex; align-items:center; gap:3px; }

.list-empty {
  text-align:center;
  padding:40px 20px;
  color:var(--text-faint);
  font-size:14px;
  display:grid;
  justify-items:center;
  gap:8px;
}
.list-empty .list-empty-icon { font-size:34px; }
.list-empty strong { color:var(--text); font-size:15px; }
.list-empty small { color:var(--text-faint); line-height:1.5; }
.list-empty .btn-new { margin-top:6px; }
.customer-skeleton { display:grid; gap:8px; padding:6px 8px; }
.customer-skeleton-row {
  height:66px;
  border-radius:10px;
  background:linear-gradient(90deg,#eef3f8 0%,#f8fafc 50%,#eef3f8 100%);
  background-size:200% 100%;
  animation:customerPulse 1.1s linear infinite;
}
@keyframes customerPulse { from { background-position:200% 0; } to { background-position:-200% 0; } }

/* RIGHT — detail panel */
.detail-panel {
  flex:1;
  overflow-y:auto;
  padding:24px;
  min-width:0;
}

.detail-empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text-faint);
  gap:12px;
}
.detail-empty .de-icon { font-size:56px; }
.detail-empty p { font-size:15px; font-weight:600; }
.detail-empty small { font-size:13px; color:var(--text-faint); }

.detail-header {
  display:flex;
  align-items:flex-start;
  gap:16px;
  margin-bottom:20px;
}
.detail-avatar {
  width:56px; height:56px;
  border-radius:14px;
  background:linear-gradient(135deg,#e07b39,#c9621a);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; font-weight:900;
  color:#fff;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(201,98,26,0.30);
}
.detail-header-info { flex:1; min-width:0; }
.detail-name {
  font-size:22px;
  font-weight:900;
  margin-bottom:4px;
}
.detail-sub {
  font-size:13px;
  color:var(--text-dim);
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.detail-actions {
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.btn-action {
  border:1px solid var(--border-strong);
  background:#fff;
  border-radius:8px;
  padding:7px 14px;
  font-family:'Heebo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  color:var(--text-dim);
  transition:all .15s;
  display:flex;
  align-items:center;
  gap:5px;
}
.btn-action:hover { background:var(--steel); color:var(--text); }
.btn-action.primary {
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.btn-action.primary:hover { background:#b45517; }

/* Stats row */
.stats-row {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}
.stat-card {
  background:#fff;
  border-radius:10px;
  padding:14px 16px;
  border:1px solid var(--border);
}
.stat-label {
  font-size:11px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:4px;
}
.stat-value {
  font-size:22px;
  font-weight:900;
  color:var(--text);
}
.stat-unit {
  font-size:12px;
  font-weight:600;
  color:var(--text-dim);
  margin-right:2px;
}

/* Info sections */
.info-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:20px;
}
.info-section {
  background:#fff;
  border-radius:12px;
  padding:16px;
  border:1px solid var(--border);
}
.info-section h4 {
  font-size:12px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:6px;
}
.info-row {
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:8px;
  font-size:13.5px;
}
.info-row:last-child { margin-bottom:0; }
.info-key {
  color:var(--text-faint);
  font-size:12px;
  font-weight:600;
  min-width:80px;
  flex-shrink:0;
}
.info-val {
  color:var(--text);
  font-weight:500;
  flex:1;
  word-break:break-word;
}
.info-val a {
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
}
.info-val a:hover { text-decoration:underline; }
.info-empty { color:var(--text-faint); font-size:12px; font-style:italic; }

/* Orders table section */
.orders-section {
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:20px;
  overflow:hidden;
}
.orders-section-head {
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.orders-section-head h4 {
  font-size:14px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:7px;
}
.customer-jump-nav {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:14px 0 12px;
}
.customer-jump-nav .btn-action {
  background:#fff;
  min-height:34px;
}
.orders-table-wrap { overflow-x:auto; }
.orders-table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.orders-table th {
  background:#f8fafc;
  padding:8px 12px;
  font-size:11px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.4px;
  text-align:right;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.orders-table td {
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  color:var(--text);
  vertical-align:middle;
}
.orders-table tr:last-child td { border-bottom:none; }
.orders-table tr:hover td { background:var(--card); }
.orders-table a {
  color:var(--accent);
  font-weight:700;
  text-decoration:none;
}
.orders-table a:hover { text-decoration:underline; }
.status-badge {
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}
.status-ממתינה { background:var(--warning-bg); color:var(--warning); }
.status-אושרה  { background:var(--info-bg);    color:var(--info); }
.status-בייצור { background:rgba(50,100,200,0.09); color:#2455aa; }
.status-מוכנה  { background:var(--success-bg); color:var(--success); }
.status-נמסרה  { background:#f0f0f0; color:#666; }
.status-בוטלה  { background:var(--danger-bg);  color:var(--danger); }

/* Notes section */
.notes-section {
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  padding:16px;
  margin-bottom:20px;
}
.notes-section h4 {
  font-size:12px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}
.notes-text {
  font-size:14px;
  line-height:1.6;
  color:var(--text);
  white-space:pre-wrap;
}

/* Portal section */
.portal-section {
  background: linear-gradient(135deg, rgba(201,98,26,0.04), rgba(224,123,57,0.06));
  border:1px solid rgba(201,98,26,0.18);
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.portal-info h4 { font-size:14px; font-weight:800; margin-bottom:4px; }
.portal-info p { font-size:12px; color:var(--text-dim); }
.portal-link-box {
  display:flex;
  align-items:center;
  gap:8px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 10px;
  font-size:12px;
  font-family:monospace;
  color:var(--text-dim);
  max-width:280px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  cursor:pointer;
}
.portal-link-box:hover { border-color:var(--accent); color:var(--accent); }
.portal-section.portal-section-open {
  align-items:stretch;
  flex-wrap:wrap;
}
.portal-access-card {
  flex:1 1 100%;
  background:#fff;
  border:1px solid rgba(201,98,26,0.22);
  border-radius:10px;
  padding:12px;
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(170px,220px);
  gap:10px;
  align-items:start;
}
.portal-access-label {
  font-size:11px;
  font-weight:800;
  color:var(--text-faint);
  margin-bottom:4px;
}
.portal-access-value {
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  background:#f8fafc;
  font-size:12px;
  color:var(--text-dim);
  direction:ltr;
  text-align:left;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.portal-access-code {
  font-size:18px;
  font-weight:900;
  letter-spacing:1.5px;
  color:var(--accent);
}
.portal-access-actions {
  grid-column:1/-1;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.portal-access-actions button {
  border:1px solid var(--border-strong);
  background:#fff;
  border-radius:8px;
  padding:7px 12px;
  font-family:'Heebo',sans-serif;
  font-weight:800;
  cursor:pointer;
  color:var(--text-dim);
}
.portal-access-actions button:hover {
  border-color:var(--accent);
  color:var(--accent);
}
@media(max-width:760px) {
  .portal-access-card { grid-template-columns:1fr; }
}

/* ── MODAL ── */
.modal-backdrop {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:1000;
  align-items:center;
  justify-content:center;
}
.modal-backdrop.open { display:flex; }
.modal {
  background:#fff;
  border-radius:16px;
  width:520px;
  max-width:calc(100vw - 32px);
  max-height:calc(100vh - 80px);
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
}
.modal-head {
  padding:20px 24px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.modal-head h3 { font-size:18px; font-weight:900; }
.modal-close {
  background:none; border:none; cursor:pointer;
  font-size:20px; color:var(--text-faint);
  padding:4px; border-radius:6px;
  transition:background .15s;
}
.modal-close:hover { background:var(--steel); color:var(--text); }
.modal-body { padding:20px 24px; }
.form-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:14px;
}
.form-row.full { grid-template-columns:1fr; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label {
  font-size:12px;
  font-weight:700;
  color:var(--text-dim);
}
.form-group input,
.form-group textarea,
.form-group select {
  border:1px solid var(--border-strong);
  border-radius:8px;
  padding:9px 12px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  color:var(--text);
  background:#fafbfc;
  outline:none;
  transition:border-color .15s, background .15s;
  width:100%;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color:var(--accent);
  background:#fff;
}
.form-group textarea { resize:vertical; min-height:72px; }
.form-divider {
  font-size:11px;
  font-weight:700;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin:18px 0 12px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.modal-foot {
  padding:16px 24px 20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  border-top:1px solid var(--border);
}
.btn-cancel {
  border:1px solid var(--border-strong);
  background:#fff;
  border-radius:8px;
  padding:9px 20px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  color:var(--text-dim);
  transition:background .15s;
}
.btn-cancel:hover { background:var(--steel); }
.btn-save {
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:9px 24px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  transition:background .15s;
}
.btn-save:hover { background:#b45517; }
.btn-save:disabled { background:#ccc; cursor:not-allowed; }

/* spinner */
.spinner {
  display:inline-block;
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── RESPONSIVE ── */

/* Tablet: narrow list panel */
@media(max-width:1100px) {
  .list-panel { width:300px; }
}
@media(max-width:900px) {
  .list-panel { width:260px; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .info-grid { grid-template-columns:1fr; }
}

/* Mobile: single-panel mode (list OR detail, never both) */
@media(max-width:700px) {
  .page-wrap {
    display:block;
    height:auto;
    overflow:visible;
  }

  /* List panel full width, shown by default */
  .list-panel {
    width:100%;
    height:auto;
    border-left:none;
    border-bottom:none;
    /* height is managed by JS show/hide */
  }
  .customer-list { max-height:none; }

  /* Detail panel full width, hidden until a customer is selected */
  .detail-panel {
    padding:12px;
    min-height:0;
  }

  /* Mobile: when detail is active, list hides and detail shows */
  .page-wrap.detail-open .list-panel { display:none; }
  .page-wrap.detail-open .detail-panel { display:block; }

  /* Back button visible only on mobile */
  .mobile-back {
    display:flex !important;
    align-items:center;
    gap:8px;
    background:none;
    border:none;
    font-family:'Heebo',sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--accent);
    cursor:pointer;
    padding:4px 0 14px;
    margin-bottom:4px;
  }

  /* Detail layout adjustments */
  .detail-header {
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
  .detail-actions {
    width:100%;
    flex-wrap:wrap;
  }
  .detail-actions .btn-action {
    flex:1;
    justify-content:center;
    min-width:0;
  }

  .stats-row { grid-template-columns:1fr 1fr; gap:8px; }
  .stat-card { padding:10px 12px; }
  .stat-value { font-size:18px; }

  .info-grid { grid-template-columns:1fr; }
  .info-section { padding:12px; }

  .portal-section { flex-direction:column; align-items:flex-start; gap:10px; }
  .portal-section .btn-action { width:100%; justify-content:center; }

  .orders-table { font-size:12px; }
  .orders-table th,
  .orders-table td { padding:8px 8px; }
  /* Hide less-important columns on very small screens */
  .orders-table .col-priority,
  .orders-table .col-weight { display:none; }
}

/* Small phones */
@media(max-width:400px) {
  .stats-row { grid-template-columns:1fr 1fr; }
  .stat-value { font-size:16px; }
  .form-row { grid-template-columns:1fr; }

  .list-title h2 { font-size:15px; }

}

@media(max-width:560px) {

}

/* Always hide back button on desktop */
.mobile-back { display:none; }

<script>
'use strict';

let customers  = [];
let activeId   = null;
let searchTimer;
let lastCustomerQuery = '';
let initialListRetryTimer = null;
let initialListRetryCount = 0;
const requestedCustomerId = Number(new URLSearchParams(window.location.search).get('customer_id') || 0) || null;
let requestedCustomerSelected = false;

// ── STATUS mapping ──
const STATUS_CLS = {
  'ממתינה לאישור': 'ממתינה',
  'אושרה'        : 'אושרה',
  'בייצור'       : 'בייצור',
  'מוכנה לאיסוף' : 'מוכנה',
  'נמסרה'        : 'נמסרה',
  'בוטלה'        : 'בוטלה',
};
function statusBadge(s) {
  const cls = STATUS_CLS[s] || 'ממתינה';
  return '<span class="status-badge status-' + cls + '">' + esc(s||'–') + '</span>';
}

function esc(s) {
  return window.IronBendSafe
    ? window.IronBendSafe.escapeHtml(s)
    : String(s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function initials(name) {
  const parts = (name||'?').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].charAt(0);
  return parts[0].charAt(0) + parts[parts.length-1].charAt(0);
}

function fmtDate(d) {
  if (!d) return '–';
  try { return new Date(d).toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'2-digit' }); }
  catch { return d; }
}

function fmtWeight(w) {
  const n = Number(w) || 0;
  if (n >= 1000) return (n/1000).toFixed(1) + ' ט';
  return n.toFixed(0) + ' ק"ג';
}

function fmtMoney(value) {
  const n = Number(value) || 0;
  return '₪' + n.toLocaleString('he-IL', { maximumFractionDigits: 0 });
}

function fmtPct(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return '–';
  return n.toLocaleString('he-IL', { maximumFractionDigits: 1 }) + '%';
}

async function approveProfileChange(customerId, requestId) {
  const r = await fetch('/api/customers/' + customerId + '/profile-change-requests/' + requestId + '/approve', { method: 'POST' });
  if (!r.ok) return alert('לא ניתן לאשר את בקשת השינוי');
  await loadCustomers(lastCustomerQuery);
  selectCustomer(customerId);
}

async function rejectProfileChange(customerId, requestId) {
  const r = await fetch('/api/customers/' + customerId + '/profile-change-requests/' + requestId + '/reject', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ notes: 'נדחה ממסך לקוחות' }) });
  if (!r.ok) return alert('לא ניתן לדחות את בקשת השינוי');
  selectCustomer(customerId);
}

function priceListVisibilityLabel(value) {
  return ({
    none: 'ללא מחירון',
    general: 'מחירון כללי',
    customer: 'מחירון לקוח',
  })[value] || 'ללא מחירון';
}

// ── LOAD LIST ──
function renderListLoading(q) {
  const count = document.getElementById('listCount');
  const alert = document.getElementById('listAlert');
  const el = document.getElementById('customerList');
  if (alert) alert.innerHTML = '';
  if (count) count.textContent = q ? 'מחפש לקוחות...' : 'טוען לקוחות...';
  if (el) el.innerHTML = '<div class="customer-skeleton"><div class="customer-skeleton-row"></div><div class="customer-skeleton-row"></div><div class="customer-skeleton-row"></div></div>';
}

async function loadList(q, opts = {}) {
  lastCustomerQuery = (q || '').trim();
  const isInitial = Boolean(opts.initial);
  renderListLoading(lastCustomerQuery);
  try {
    const r  = await fetch('/api/customers?q=' + encodeURIComponent(lastCustomerQuery) + '&limit=100');
    if (!r.ok) throw new Error('customers list failed: ' + r.status);
    const rows = await r.json();
    if (!Array.isArray(rows)) throw new Error('customers list response is not an array');
    customers = rows;
    initialListRetryCount = 0;
    if (initialListRetryTimer) clearTimeout(initialListRetryTimer);
    initialListRetryTimer = null;
    document.getElementById('listAlert').innerHTML = '';
    renderList();
    if (requestedCustomerId && !requestedCustomerSelected && customers.some(row => Number(row.id) === requestedCustomerId)) {
      requestedCustomerSelected = true;
      selectCustomer(requestedCustomerId);
    }
  } catch(e) {
    if (isInitial && !customers.length && initialListRetryCount < 3) {
      initialListRetryCount += 1;
      const delay = 350 * initialListRetryCount;
      initialListRetryTimer = setTimeout(() => loadList(lastCustomerQuery, { initial: true }), delay);
      document.getElementById('listCount').textContent = 'טוען לקוחות...';
      document.getElementById('listAlert').innerHTML = '';
      return;
    }
    document.getElementById('listCount').textContent = customers.length ? customers.length + ' לקוחות מוצגים' : '';
    document.getElementById('listAlert').innerHTML =
      '<div class="list-alert"><span>לא הצלחנו לטעון לקוחות. אפשר לנסות שוב בלי לעזוב את המסך.</span><button onclick="loadList(document.getElementById(\'searchInput\').value)">נסה שוב</button></div>';
    if (!customers.length) {
      document.getElementById('customerList').innerHTML = '<div class="list-empty"><div class="list-empty-icon">!</div><strong>אין רשימה להצגה כרגע</strong><small>בדוק חיבור או נסה שוב.</small></div>';
    }
  }
}

function renderList() {
  const el = document.getElementById('customerList');
  const query = lastCustomerQuery;
  document.getElementById('listCount').textContent = customers.length
    ? customers.length + (query ? ' תוצאות' : ' לקוחות')
    : '';

  if (!customers.length) {
    el.innerHTML = query
      ? '<div class="list-empty"><div class="list-empty-icon">⌕</div><strong>לא נמצאו לקוחות</strong><small>נסה שם אחר, טלפון או מספר לקוח.</small><button class="btn-new" onclick="openModal()">+ לקוח חדש</button></div>'
      : '<div class="list-empty"><div class="list-empty-icon">⌕</div><strong>עדיין אין לקוחות להצגה</strong><small>כאן תופיע רשימת הלקוחות לאחר טעינה או יצירה.</small><button class="btn-new" onclick="openModal()">+ לקוח חדש</button></div>';
    return;
  }

  el.innerHTML = customers.map(c => {
    const active = c.id === activeId ? ' active' : '';
    const cnt    = c.order_count || 0;
    const phone  = c.phone ? 'טל׳ ' + c.phone : '';
    const last   = c.last_order_at ? 'עודכן ' + fmtDate(c.last_order_at) : '';
    return '<div class="cust-card'+active+'" onclick="selectCustomer('+c.id+')" data-id="'+c.id+'">' +
      '<div class="cust-card-top">' +
        '<div class="cust-avatar">'+esc(initials(c.name))+'</div>' +
        '<div class="cust-name">'+esc(c.name)+'</div>' +
        '<div class="cust-orders-badge">'+cnt+' הזמנות</div>' +
      '</div>' +
      '<div class="cust-meta">' +
        (phone ? '<span>'+esc(phone)+'</span>' : '') +
        (last  ? '<span>'+esc(last)+'</span>'  : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function onSearch(val) {
  if (initialListRetryTimer) clearTimeout(initialListRetryTimer);
  initialListRetryTimer = null;
  initialListRetryCount = 0;
  clearTimeout(searchTimer);
  renderListLoading((val || '').trim());
  searchTimer = setTimeout(() => loadList(val), 120);
}

// ── MOBILE NAV ──
function isMobile() { return window.innerWidth <= 700; }

function mobileShowDetail() {
  if (isMobile()) {
    document.querySelector('.page-wrap').classList.add('detail-open');
    window.scrollTo(0, 0);
  }
}

function mobileBack() {
  document.querySelector('.page-wrap').classList.remove('detail-open');
  activeId = null;
  document.querySelectorAll('.cust-card').forEach(el => el.classList.remove('active'));
  // restore empty detail
  document.getElementById('detailPanel').innerHTML =
    '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>' +
    '<div class="detail-empty"><div class="de-icon">👥</div><p>בחר לקוח מהרשימה</p><small>לצפייה בפרטים, הזמנות והיסטוריה</small></div>';
}

// ── SELECT / LOAD DETAIL ──
async function selectCustomer(id) {
  activeId = id;
  // highlight in list
  document.querySelectorAll('.cust-card').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.id) === id);
  });
  // show loading + switch to detail on mobile
  document.getElementById('detailPanel').innerHTML =
    '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>' +
    '<div class="detail-empty"><div class="de-icon" style="animation:spin .8s linear infinite;font-size:36px">⏳</div></div>';
  mobileShowDetail();

  try {
    const r = await fetch('/api/customers/' + id);
    const c = await r.json();
    renderDetail(c);
  } catch(e) {
    document.getElementById('detailPanel').innerHTML =
      '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>' +
      '<div class="detail-empty"><div class="de-icon">⚠️</div><p>שגיאה בטעינה</p></div>';
  }
}

function renderDetail(c) {
  const stats   = c.stats || {};
  const orders  = c.orders || [];
  const initAvg = orders.length ? (stats.total_weight_sum / orders.length).toFixed(0) : 0;

  // mobile back button always at top (hidden via CSS on desktop)
  let html = '<button class="mobile-back" id="mobileBackBtn" onclick="mobileBack()">← חזרה לרשימה</button>';

  // ── Header ──
  html += '<div class="detail-header">' +
    '<div class="detail-avatar">'+esc(initials(c.name))+'</div>' +
    '<div class="detail-header-info">' +
      '<div class="detail-name">'+esc(c.name)+'</div>' +
      '<div class="detail-sub">' +
        (c.phone    ? '<span>📞 <a href="tel:'+esc(c.phone)+'">'+esc(c.phone)+'</a></span>' : '') +
        (c.email    ? '<span>✉️ <a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a></span>' : '') +
        (c.address  ? '<span>📍 '+esc(c.address)+'</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="detail-actions">' +
      '<button class="btn-action primary" onclick="newOrderFor('+c.id+')">➕ הזמנה חדשה</button>' +
      '<button class="btn-action" onclick="openSiteModal('+c.id+')">🏗 אתר חדש</button>' +
      '<button class="btn-action" onclick="openPriceListFor('+c.id+')">🏷 מחירון</button>' +
      '<button class="btn-action" onclick="openModal('+c.id+')">✏️ עריכה</button>' +
    '</div>' +
  '</div>';

  // ── Stats ──
  html += '<div class="stats-row">' +
    stat('הזמנות',        stats.order_count || 0,          '',        '📋') +
    stat('סה"כ משקל',     fmtWeight(stats.total_weight_sum),'',        '⚖️') +
    stat('ממוצע להזמנה',  fmtWeight(initAvg),              '',        '📊') +
    stat('הזמנה אחרונה',  fmtDate(stats.last_order_at),    '',        '🗓') +
  '</div>';
  html += renderCustomerWorkbench(c);
  html += renderCustomerJumpNav(c);
  html += renderCustomerOrders(c, orders);
  html += renderCustomerBillingQueue(c);
  html += renderCustomerSitesSummary(c);

  // ── Info grid ──
  html += '<div class="info-grid" id="customerDetailsSection">';

  // Contact info
  html += '<div class="info-section"><h4>📇 פרטי קשר</h4>';
  html += infoRow('טלפון',     c.phone    ? '<a href="tel:'+esc(c.phone)+'">'+esc(c.phone)+'</a>' : null);
  html += infoRow('אימייל',    c.email    ? '<a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a>' : null);
  html += infoRow('ח.פ',        c.tax_id);
  html += infoRow('כתובת',     c.address);
  html += infoRow('Priority',  c.priority_id);
  html += infoRow('תאריך הצטרפות', fmtDate(c.created_at));
  html += '</div>';

  // Contact person
  html += '<div class="info-section"><h4>👤 איש קשר</h4>';
  if (c.contact_name || c.contact_phone) {
    html += infoRow('שם',    c.contact_name);
    html += infoRow('נייד',  c.contact_phone ? '<a href="tel:'+esc(c.contact_phone)+'">'+esc(c.contact_phone)+'</a>' : null);
  } else {
    html += '<div class="info-empty">לא הוזן איש קשר</div>';
  }
  html += '</div>';
  html += '</div>'; // info-grid

  const pendingProfileRequests = (c.profile_change_requests || []).filter(r => r.status === 'pending');
  if (pendingProfileRequests.length) {
    html += '<div class="notes-section">' +
      '<h4>🪪 בקשות שינוי פרטי לקוח</h4>' +
      pendingProfileRequests.map(r => '<div class="order-row" style="align-items:flex-start">' +
        '<div><b>בקשה #' + esc(r.id) + '</b><div style="font-size:12px;color:var(--text-muted);margin-top:4px">' +
          'שם: ' + esc(r.requested?.name || '-') + ' · אימייל: ' + esc(r.requested?.email || '-') + ' · כתובת: ' + esc(r.requested?.address || '-') +
        '</div></div>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
          '<button class="btn-action primary" onclick="approveProfileChange(' + c.id + ',' + r.id + ')">אשר</button>' +
          '<button class="btn-action" onclick="rejectProfileChange(' + c.id + ',' + r.id + ')">דחה</button>' +
        '</div>' +
      '</div>').join('') +
    '</div>';
  }

  html += '<div class="info-grid">';
  html += '<div class="info-section"><h4>💳 תנאי לקוח</h4>';
  html += infoRow('תנאי תשלום', c.payment_terms);
  const activePriceBook = c.workbench?.pricing?.active_price_book;
  html += infoRow('תצוגת מחירון בפורטל', priceListVisibilityLabel(c.portal_price_list_visibility));
  html += infoRow('סוג חישוב מחיר', c.price_tier === 'customer' ? 'מחירון לקוח' : 'מחירון כללי');
  html += infoRow('מחירון מחובר', activePriceBook ? esc(activePriceBook.name || activePriceBook.code || ('#' + activePriceBook.id)) : 'לא מחובר מחירון לקוח פעיל');

async function recordCustomerBilling(customerId, orderId) {
  const amountEl = document.getElementById('billAmount-' + orderId);
  const refEl = document.getElementById('billRef-' + orderId);
  const billedAmount = Number(amountEl?.value || 0);
  if (!Number.isFinite(billedAmount) || billedAmount <= 0) {
    window.showToast ? window.showToast('צריך להזין סכום חיוב תקין', true) : alert('צריך להזין סכום חיוב תקין');
    return;
  }
  const res = await fetch('/api/orders/' + orderId + '/costs/billing', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      billed_amount: billedAmount,
      billed_date: new Date().toISOString().slice(0, 10),
      priority_invoice_ref: refEl?.value || '',
      billing_notes: 'נרשם מכרטיס לקוח',
    }),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    const msg = data.error || 'לא ניתן לרשום חיוב';
    window.showToast ? window.showToast(msg, true) : alert(msg);
    return;
  }
  window.showToast && window.showToast('החיוב נרשם והרווחיות עודכנה ✓');
  await loadList(lastCustomerQuery);
  selectCustomer(customerId);
}

// ── NEW ORDER for customer ──
function newOrderFor(id, siteId = null) {
  const c = customers.find(x => Number(x.id) === Number(id)) || {};
  const site = (c.sites_summary || []).find(row => Number(row.id) === Number(siteId)) || null;
  try {
    localStorage.setItem('ironbend:new-order:draft:v1', JSON.stringify({
      customer: {
        id: Number(id),
        name: c.name || '',
        phone: c.phone || '',
        priorityId: c.priority_id || '',
        contactName: c.contact_name || '',
        contactPhone: c.contact_phone || '',
      },
      delivery: {
        siteId: site?.id || '',
        siteName: site?.name || '',
        address: site?.address || c.address || '',
        driverNotes: [site?.manager_name, site?.manager_phone].filter(Boolean).join(' | '),
      },
      source: site ? 'customer-site-card' : 'customer-card',
      savedAt: new Date().toISOString(),
    }));
  } catch {}
  const params = new URLSearchParams({
    customer_id: String(id),
    customer_name: c.name || '',
    source: site ? 'customer-site-card' : 'customer-card',
  });
  if (site) params.set('site_id', String(site.id));
  window.location.href = '/index.html?' + params.toString();
}

  });

}

// ── PORTAL LINK ──
function portalTokenFromResponse(d) {
  if (d?.token) return String(d.token);
  try {
    return new URL(d?.link || '', location.origin).searchParams.get('token') || '';
  } catch {
    return '';
  }
}

function formatPortalAccessCode(token) {
  const clean = String(token || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
  return clean.match(/.{1,4}/g)?.join('-') || '';
}

function copyPortalText(text, msg) {
  navigator.clipboard.writeText(text).catch(() => {});
  window.showToast && window.showToast(msg || 'הועתק ✓');
}

function portalMessage(customerName, link, code) {
  return [
    'שלום ' + (customerName || ''),
    'זה הקישור האישי שלך לפורטל ההזמנות של טנא:',
    link,
    'קוד כניסה ידני: ' + code
  ].join('\n');
}

function portalPasswordMessage(customerName, link, phone, password) {
  return [
    'שלום ' + (customerName || ''),
    'פרטי כניסה לפורטל ההזמנות של טנא:',
    link,
    'טלפון: ' + (phone || ''),
    'סיסמה זמנית: ' + (password || ''),
    'לאחר הכניסה ניתן להחליף סיסמה.'
  ].join('\n');
}

function showPortalAccess(d, toastMsg) {
  const token = portalTokenFromResponse(d);
  const link = d?.link || (token ? location.origin + '/customer.html?token=' + encodeURIComponent(token) : '');
  const code = formatPortalAccessCode(token);
  if (!link || !code) return;

  const ps = document.querySelector('.portal-section');
  if (!ps) return;
  ps.classList.add('portal-section-open');
  const existing = ps.querySelector('.portal-access-card');
  if (existing) existing.remove();

  const customerName = document.querySelector('.detail-name')?.textContent?.trim() || '';
  const card = document.createElement('div');
  card.className = 'portal-access-card';

  const linkWrap = document.createElement('div');
  linkWrap.innerHTML = '<div class="portal-access-label">קישור אישי ללקוח</div>';
  const linkBox = document.createElement('div');
  linkBox.className = 'portal-access-value';
  linkBox.title = 'לחץ להעתקת קישור';
  linkBox.textContent = link;
  linkBox.onclick = () => copyPortalText(link, 'הקישור הועתק ✓');
  linkWrap.appendChild(linkBox);

  const codeWrap = document.createElement('div');
  codeWrap.innerHTML = '<div class="portal-access-label">קוד כניסה ידני</div>';
  const codeBox = document.createElement('div');
  codeBox.className = 'portal-access-value portal-access-code';
  codeBox.title = 'לחץ להעתקת קוד';
  codeBox.textContent = code;
  codeBox.onclick = () => copyPortalText(code, 'קוד הכניסה הועתק ✓');
  codeWrap.appendChild(codeBox);

  let passwordWrap = null;
  if (d?.temporaryPassword) {
    passwordWrap = document.createElement('div');
    passwordWrap.innerHTML = '<div class="portal-access-label">סיסמה זמנית</div>';
    const passwordBox = document.createElement('div');
    passwordBox.className = 'portal-access-value portal-access-code';
    passwordBox.title = 'לחץ להעתקת סיסמה זמנית';
    passwordBox.textContent = d.temporaryPassword;
    passwordBox.onclick = () => copyPortalText(d.temporaryPassword, 'הסיסמה הזמנית הועתקה ✓');
    passwordWrap.appendChild(passwordBox);
  }

  const actions = document.createElement('div');
  actions.className = 'portal-access-actions';
  const copyLink = document.createElement('button');
  copyLink.type = 'button';
  copyLink.textContent = 'העתק קישור';
  copyLink.onclick = () => copyPortalText(link, 'הקישור הועתק ✓');
  const copyCode = document.createElement('button');
  copyCode.type = 'button';
  copyCode.textContent = 'העתק קוד';
  copyCode.onclick = () => copyPortalText(code, 'קוד הכניסה הועתק ✓');
  const copyMsg = document.createElement('button');
  copyMsg.type = 'button';
  copyMsg.textContent = 'העתק הודעה ללקוח';
  copyMsg.onclick = () => copyPortalText(portalMessage(customerName, link, code), 'הודעה מוכנה הועתקה ✓');
  const copyPasswordMsg = document.createElement('button');
  copyPasswordMsg.type = 'button';
  copyPasswordMsg.textContent = 'העתק הודעת סיסמה';
  copyPasswordMsg.style.display = d?.temporaryPassword ? '' : 'none';
  copyPasswordMsg.onclick = () => copyPortalText(portalPasswordMessage(customerName, link, d?.phone, d?.temporaryPassword), 'הודעת סיסמה הועתקה ✓');
  actions.append(copyLink, copyCode, copyMsg, copyPasswordMsg);

  if (passwordWrap) card.append(linkWrap, codeWrap, passwordWrap, actions);
  else card.append(linkWrap, codeWrap, actions);
  ps.appendChild(card);
  window.showToast && window.showToast(toastMsg || 'קישור וקוד כניסה מוכנים ✓');
}

async function getPortalLink(id) {
  try {
    const r = await fetch('/api/customers/' + id + '/token');
    const d = await r.json();
    if (d.link) {
      showPortalAccess(d, 'קישור וקוד כניסה מוכנים ✓');
    }
  } catch(e) {
    window.showToast && window.showToast('שגיאה בקבלת קישור', true);
  }
}

async function rotatePortalLink(id) {
  if (!confirm('להחליף את הקישור? הקישור הישן יפסיק לעבוד.')) return;
  try {
    const r = await fetch('/api/customers/' + id + '/token/rotate', { method: 'POST' });
    const d = await r.json();
    if (d.link) {
      showPortalAccess(d, 'קישור חדש וקוד כניסה חדשים מוכנים ✓');
    }
  } catch(e) {
    window.showToast && window.showToast('שגיאה ביצירת קישור חדש', true);
  }
}

async function resetPortalPassword(id) {
  if (!confirm('ליצור סיסמה זמנית חדשה לפורטל הלקוח?')) return;
  try {
    const linkResp = await fetch('/api/customers/' + id + '/token').then(r => r.json());
    const r = await fetch('/api/customers/' + id + '/portal-password/reset', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d?.error || 'reset failed');
    showPortalAccess(Object.assign({}, linkResp, d), 'סיסמה זמנית נוצרה ✓');
  } catch(e) {
    window.showToast && window.showToast(e.message || 'שגיאה ביצירת סיסמה זמנית', true);
  }
}

async function revokePortalLink(id) {
  if (!confirm('לבטל את גישת הלקוח לפורטל?')) return;
  try {
    const r = await fetch('/api/customers/' + id + '/token', { method: 'DELETE' });
    if (!r.ok) throw new Error('revoke failed');
    const ps = document.querySelector('.portal-section');
    const existing = ps && ps.querySelector('.portal-access-card, .portal-link-box');
    if (existing) existing.remove();
    if (ps) ps.classList.remove('portal-section-open');
    window.showToast && window.showToast('הגישה בוטלה');
  } catch(e) {
    window.showToast && window.showToast('שגיאה בביטול גישה', true);
  }
}

    const c = customers.find(x => x.id === id);
    if (c) {
      document.getElementById('fName').value         = c.name         || '';
      document.getElementById('fPhone').value        = c.phone        || '';
      document.getElementById('fEmail').value        = c.email        || '';
      document.getElementById('fAddress').value      = c.address      || '';
      document.getElementById('fTaxId').value        = c.tax_id       || '';
      document.getElementById('fPaymentTerms').value = c.payment_terms|| '';
      document.getElementById('fPortalPriceListVisibility').value = c.portal_price_list_visibility || 'none';
      document.getElementById('fPriorityId').value   = c.priority_id  || '';
      document.getElementById('fContactName').value  = c.contact_name || '';
      document.getElementById('fContactPhone').value = c.contact_phone|| '';
      document.getElementById('fNotes').value        = c.notes        || '';
    } else {
      // load from server if not in list
      fetch('/api/customers/' + id).then(r=>r.json()).then(c => {
        document.getElementById('fName').value         = c.name         || '';
        document.getElementById('fPhone').value        = c.phone        || '';
        document.getElementById('fEmail').value        = c.email        || '';
        document.getElementById('fAddress').value      = c.address      || '';
        document.getElementById('fTaxId').value        = c.tax_id       || '';
        document.getElementById('fPaymentTerms').value = c.payment_terms|| '';
        document.getElementById('fPortalPriceListVisibility').value = c.portal_price_list_visibility || 'none';
        document.getElementById('fPriorityId').value   = c.priority_id  || '';
        document.getElementById('fContactName').value  = c.contact_name || '';
        document.getElementById('fContactPhone').value = c.contact_phone|| '';
        document.getElementById('fNotes').value        = c.notes        || '';
      });
    }
  } else {
    title.textContent = 'לקוח חדש';
    document.getElementById('editId').value       = '';
    document.getElementById('fName').value        = '';
    document.getElementById('fPhone').value       = '';
    document.getElementById('fEmail').value       = '';
    document.getElementById('fAddress').value     = '';
    document.getElementById('fTaxId').value       = '';
    document.getElementById('fPaymentTerms').value= '';
    document.getElementById('fPortalPriceListVisibility').value = 'none';
    document.getElementById('fPriorityId').value  = '';
    document.getElementById('fContactName').value = '';
    document.getElementById('fContactPhone').value= '';
    document.getElementById('fNotes').value       = '';
  }
  modal.classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 80);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

async function saveCustomer() {
  const name = document.getElementById('fName').value.trim();
  if (!name) {
    document.getElementById('fName').focus();
    document.getElementById('fName').style.borderColor = 'var(--danger)';
    return;
  }
  document.getElementById('fName').style.borderColor = '';

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const body = {
    name,
    phone:        document.getElementById('fPhone').value.trim()        || null,
    email:        document.getElementById('fEmail').value.trim()        || null,
    address:      document.getElementById('fAddress').value.trim()      || null,
    taxId:        document.getElementById('fTaxId').value.trim()        || null,
    paymentTerms: document.getElementById('fPaymentTerms').value.trim() || null,
    portalPriceListVisibility: document.getElementById('fPortalPriceListVisibility').value || 'none',
    priorityId:   document.getElementById('fPriorityId').value.trim()   || null,
    contactName:  document.getElementById('fContactName').value.trim()  || null,
    contactPhone: document.getElementById('fContactPhone').value.trim() || null,
    notes:        document.getElementById('fNotes').value.trim()        || null,
  };

  const editId = document.getElementById('editId').value;

  try {
    let r, d;
    if (editId) {
      r = await fetch('/api/customers/' + editId, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      d = await r.json();
      window.showToast && window.showToast('הלקוח עודכן ✓');
    } else {
      r = await fetch('/api/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      d = await r.json();
      window.showToast && window.showToast('הלקוח נוצר ✓');
    }
    closeModal();
    await loadList(document.getElementById('searchInput').value);
    if (editId) selectCustomer(Number(editId));
    else if (d.id) selectCustomer(d.id);
  } catch(e) {
    window.showToast && window.showToast('שגיאה בשמירה', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'שמור לקוח';
  }
}

// close modal on backdrop click
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter submits modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('modalBackdrop').classList.contains('open')) {
    if (e.target.tagName !== 'TEXTAREA') saveCustomer();
  }
  if (e.key === 'Escape') closeModal();
});

// ── BROWSER BACK BUTTON (mobile) ──
window.addEventListener('popstate', () => {
  if (isMobile() && document.querySelector('.page-wrap').classList.contains('detail-open')) {
    mobileBack();
  }
});

// Push a history entry when navigating to detail on mobile
const _origSelectCustomer = selectCustomer;
// (already modifies URL implicitly via mobileShowDetail; no extra push needed here)

// Resize: if going from mobile→desktop while in detail-open mode, remove the class
window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.querySelector('.page-wrap').classList.remove('detail-open');
  }
});

// ── INIT ──
function bootstrapCustomerList() {
  loadList('', { initial: true });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootstrapCustomerList, { once: true });
} else {
  setTimeout(bootstrapCustomerList, 0);
}
</script>

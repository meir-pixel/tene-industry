services:
  - type: web
    name: ironbend
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
      - key: DB_PATH
        value: "./ironbend.db"
      - key: BACKUP_DIR
        value: "./backups"
      - key: ALLOW_EMPTY_DB_INIT
        value: "false"
      - key: ALLOW_DATABASE_UPLOAD
        value: "false"
      - key: AI_ENABLED
        value: "false"
      - key: INTAKE_AI_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-5.4-mini"
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
